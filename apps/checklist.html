<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QC Checklist → OneDrive PDF</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; background:#0b1423; color:#e9eefc; padding:20px; }
.section { margin-bottom:20px; padding:15px; border:1px solid #2a3a63; border-radius:10px; }
button { padding:10px; margin:5px; cursor:pointer; }
input, textarea { width:100%; margin:5px 0; padding:8px; }
</style>
</head>

<body>

<h1>QC Checklist (OneDrive Upload)</h1>

<div class="section">
<h2>Login</h2>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<p id="status">Not logged in</p>
</div>

<div class="section">
<h2>Checklist</h2>
<input id="site" placeholder="Site Number">
<input id="lead" placeholder="QC Lead">

<label><input type="checkbox" id="c1"> Cameras Installed</label><br>
<label><input type="checkbox" id="c2"> Cables Secured</label><br>
<label><input type="checkbox" id="c3"> System Tested</label><br>

<textarea id="notes" placeholder="Notes"></textarea>
</div>

<div class="section">
<h2>Actions</h2>
<button onclick="uploadReport()">Upload PDF to OneDrive</button>
</div>

<script>
/* ================= AUTH ================= */

const clientId = "cddde366-3def-4d88-a827-b186600d790e";
const tenantId = "f9cb31b8-4d87-4d78-89f4-636d4e6f6509";
const redirectUri = window.location.origin + window.location.pathname;

let accessToken = null;

function login() {
    const scope = "User.Read Files.ReadWrite";

    const url =
        `https://login.microsoftonline.com/${tenantId}/oauth2/v2.0/authorize` +
        `?client_id=${clientId}` +
        `&response_type=token` +
        `&redirect_uri=${encodeURIComponent(redirectUri)}` +
        `&scope=${encodeURIComponent(scope)}`;

    window.location.href = url;
}

function handleAuth() {
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const token = params.get("access_token");

    if (token) {
        accessToken = token;
        localStorage.setItem("token", token);
        window.location.hash = "";
    } else {
        accessToken = localStorage.getItem("token");
    }

    updateUI();
}

async function updateUI() {
    if (!accessToken) {
        document.getElementById("status").textContent = "Not logged in";
        return;
    }

    const res = await fetch("https://graph.microsoft.com/v1.0/me", {
        headers: { Authorization: "Bearer " + accessToken }
    });

    const user = await res.json();
    document.getElementById("status").textContent = "Logged in: " + user.displayName;
}

function logout() {
    accessToken = null;
    localStorage.removeItem("token");
    updateUI();
}

/* ================= REPORT ================= */

function generateTextReport() {
    const site = document.getElementById("site").value;
    const lead = document.getElementById("lead").value;

    const checks = [
        ["Cameras Installed", document.getElementById("c1").checked],
        ["Cables Secured", document.getElementById("c2").checked],
        ["System Tested", document.getElementById("c3").checked],
    ];

    const notes = document.getElementById("notes").value;

    return `
QC Report

Site: ${site}
QC Lead: ${lead}

Checklist:
${checks.map(c => `${c[1] ? "✓" : "✗"} ${c[0]}`).join("\n")}

Notes:
${notes}
`;
}

/* ================= PDF ================= */

async function generatePdf(text) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    const lines = doc.splitTextToSize(text, 180);
    doc.text(lines, 10, 10);

    return doc.output("blob");
}

/* ================= UPLOAD ================= */

async function uploadToOneDrive(blob, fileName) {
    const url = `https://graph.microsoft.com/v1.0/me/drive/root:/QC Reports/${fileName}:/content`;

    const res = await fetch(url, {
        method: "PUT",
        headers: {
            Authorization: "Bearer " + accessToken,
            "Content-Type": "application/pdf"
        },
        body: blob
    });

    return await res.json();
}

async function uploadReport() {
    if (!accessToken) {
        alert("Login first");
        return;
    }

    const text = generateTextReport();
    const pdfBlob = await generatePdf(text);

    const fileName = `QC_Report_${Date.now()}.pdf`;

    const result = await uploadToOneDrive(pdfBlob, fileName);

    alert("Uploaded to OneDrive!");

    console.log("File URL:", result.webUrl);
}

/* ================= INIT ================= */

handleAuth();
</script>

</body>
</html>
