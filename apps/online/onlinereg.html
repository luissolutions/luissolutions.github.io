<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Registration</title>
    <link rel="stylesheet" href="../assets/css/online.css">
    <script type="module" src="../assets/js/auth.js" defer></script>
    <script src="../assets/js/links-aside.js" defer></script>
    <style>
        #logout {
            display: none;
            margin: 0 auto;
        }
    </style>
</head>

<body>
    <header>
        <h1>Login & Registration</h1>
        <div class="auth-bar"><span id="auth-label">Not signed in</span><button id="auth-btn">Sign In</button></div>
        <button id="theme-toggle" title="Toggle theme">☀️</button>
        <script>(function () { var b = document.getElementById("theme-toggle"), h = document.documentElement; b.textContent = h.classList.contains("light") ? "🌙" : "☀️"; b.addEventListener("click", function () { var n = h.classList.contains("light") ? "dark" : "light"; h.classList.toggle("light", n === "light"); localStorage.setItem("ss-theme", n); b.textContent = n === "light" ? "🌙" : "☀️"; }); })();</script>
        <div id="login-inline">
            <h3>Sign In</h3><input type="email" id="email-in" placeholder="Email" /><input type="password" id="pass-in"
                placeholder="Password" /><button id="do-login">Sign In</button>
            <p id="auth-err"></p>
        </div>
    </header>

    <main>
        <section class="container">
            <!-- Login Section -->
            <section id="login-section" style="display:none" style="display: block;">
                <h2>Login</h2>
                <form id="login-form">
                    <label for="login-email">Email:</label>
                    <input type="email" id="login-email" required>
                    <br>
                    <label for="login-password">Password:</label>
                    <input type="password" id="login-password" required>
                    <br>
                    <button type="submit">Login</button>
                </form>
                <button id="logout">Logout</button>
                <p>Don't have an account? Register below.</p>
            </section>

            <section class="ms">
                <button id="loginButton">Login to MS</button>
                <button id="logoutButton">Logout of MS</button>
                <p id="loginStatus">Login status...</p>
            </section>

        </section>

        <!-- Registration Section -->
        <section id="registration-section">
            <h2>Register</h2>
            <form class="register-container" id="registration-form">
                <label for="reg-username">Username:</label>
                <input type="text" id="reg-username" required>

                <label for="reg-first-name">First Name:</label>
                <input type="text" id="reg-first-name">

                <label for="reg-last-name">Last Name:</label>
                <input type="text" id="reg-last-name">

                <label for="reg-address">Address:</label>
                <input type="text" id="reg-address">

                <label for="reg-email">Email:</label>
                <input type="email" id="reg-email" required>

                <label for="reg-phone">Phone Number:</label>
                <input type="tel" id="reg-phone">

                <label for="reg-password">Password:</label>
                <input type="password" id="reg-password" required>

                <label for="reg-confirm-password">Confirm Password:</label>
                <input type="password" id="reg-confirm-password" required>
                <br>
                <label for="agree-terms">
                    <input type="checkbox" id="agree-terms" required>
                    Agree to <a href="#" target="_blank">Terms & Conditions</a>
                </label>
                <br>
                <button type="submit">Register</button>
            </form>
        </section>
        </section>
    </main>

    <script type="module">
        import { database, ref, set, onAuthStateChanged, auth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from '../assets/js/firebase-init.js';
        import { accessToken } from '../assets/js/microsoftAuth.js';

        let currentUserUID = null;

        const loginForm = document.getElementById("login-form");
        const logoutButton = document.getElementById("logout");
        const loginEmailInput = document.getElementById("login-email");
        const loginPasswordInput = document.getElementById("login-password");

        const registrationForm = document.getElementById("registration-form");
        const regEmailInput = document.getElementById("reg-email");
        const regPasswordInput = document.getElementById("reg-password");
        const regConfirmPasswordInput = document.getElementById("reg-confirm-password");

        loginForm.addEventListener("submit", (e) => {
            e.preventDefault();
            const email = loginEmailInput.value;
            const password = loginPasswordInput.value;

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    currentUserUID = userCredential.user.uid;
                    localStorage.setItem("currentUserUID", currentUserUID);
                    loginForm.style.display = "none";
                    logoutButton.style.display = "flex";
                })
                .catch((error) => {
                    alert("Invalid login. Please check your email and password.");
                    console.log(`Error [${error.code}]: ${error.message}`);
                });
        });

        logoutButton.addEventListener("click", () => {
            signOut(auth)
                .then(() => {
                    currentUserUID = null;
                    localStorage.removeItem("currentUserUID");
                    loginForm.style.display = "flex";
                    logoutButton.style.display = "none";
                    alert("Logged out successfully!");
                })
                .catch((error) => {
                    console.log(`Error [${error.code}]: ${error.message}`);
                });
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserUID = user.uid;
                localStorage.setItem("currentUserUID", currentUserUID);
                loginForm.style.display = "none";
                logoutButton.style.display = "flex";
                console.log("Logged in as user:", user.email);
            } else {
                currentUserUID = null;
                localStorage.removeItem("currentUserUID");
                loginForm.style.display = "flex";
                logoutButton.style.display = "none";
            }
        });

        registrationForm.addEventListener("submit", async (event) => {
            event.preventDefault();

            let username = document.getElementById("reg-username").value;
            let firstName = document.getElementById("reg-first-name").value;
            let lastName = document.getElementById("reg-last-name").value;
            let address = document.getElementById("reg-address").value;
            let email = regEmailInput.value;
            let phoneNumber = document.getElementById("reg-phone").value;
            let password = regPasswordInput.value;
            let confirmPassword = regConfirmPasswordInput.value;

            if (password !== confirmPassword) {
                alert("Passwords do not match. Please try again.");
                return;
            }

            let ipAddress = await getIP();

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const userId = userCredential.user.uid;

                await saveUserData(userId, email, username, phoneNumber, firstName, lastName, address, ipAddress);

                alert("Registration successful! You can now log in.");
                registrationForm.reset();
            } catch (error) {
                if (error.code === "auth/email-already-in-use") {
                    try {
                        const userCredential = await signInWithEmailAndPassword(auth, email, password);
                        const userId = userCredential.user.uid;

                        await saveUserData(userId, email, username, phoneNumber, firstName, lastName, address, ipAddress);

                        alert("Account already existed, but database entry was created/updated.");
                        registrationForm.reset();
                    } catch (loginError) {
                        alert("Error signing in existing user: " + loginError.message);
                    }
                } else {
                    alert("Error: " + error.message);
                }
            }
        });

        async function saveUserData(userId, email, username, phoneNumber, firstName, lastName, address, ipAddress) {
            const userInfo = {
                email,
                username,
                phoneNumber,
                firstName,
                lastName,
                address,
                ipAddress
            };

            const userRef = ref(database, `${userId}/info/`);

            try {
                await set(userRef, userInfo);
                console.log("User data saved successfully!");
            } catch (error) {
                console.error("Error saving user data:", error);
            }
        }

        async function getIP() {
            try {
                let response = await fetch('https://api.ipify.org?format=json');
                let data = await response.json();
                return data.ip;
            } catch (error) {
                console.error("Failed to get IP:", error);
                return "Unknown IP";
            }
        }
    </script>
</body>
