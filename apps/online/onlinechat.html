<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Live Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="../assets/css/online.css">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
            min-height: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-shell {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Top bar ── */
        .chat-header-area {
            padding: 8px 14px 6px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .chat-tabs { display: flex; gap: 6px; margin-bottom: 4px; }

        .chat-tab {
            padding: 4px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.15s, color 0.15s;
        }
        .chat-tab.active  { background: var(--primary); border-color: var(--primary); color: #fff; }
        .chat-tab:disabled { opacity: 0.25; cursor: not-allowed; }

        #user-badge   { font-size: 0.7rem; color: var(--muted); margin-bottom: 2px; display: none; }
        #chat-mode-info { font-size: 0.67rem; color: var(--muted); line-height: 1.4; }

        /* ── Message area ── */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 14px 14px 6px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scroll-behavior: smooth;
        }
        #chat-window::-webkit-scrollbar { width: 4px; }
        #chat-window::-webkit-scrollbar-track { background: transparent; }
        #chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* ── Bubble wrappers ── */
        .msg-wrap {
            display: flex;
            align-items: flex-end;
            gap: 7px;
            max-width: 80%;
        }
        .msg-wrap.self  { align-self: flex-end;   flex-direction: row-reverse; }
        .msg-wrap.other { align-self: flex-start; }
        .msg-wrap.yuki  { align-self: flex-start; }

        .msg-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--surface2);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
            overflow: hidden;
        }
        .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .msg-content { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
        .msg-wrap.self .msg-content { align-items: flex-end; }

        .msg-name { font-size: 0.65rem; color: var(--muted); padding: 0 6px; }

        .bubble {
            padding: 8px 13px;
            border-radius: 18px;
            font-size: 0.87rem;
            line-height: 1.5;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .msg-wrap.self .bubble {
            background: var(--primary);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .msg-wrap.other .bubble {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        .msg-wrap.yuki .bubble {
            background: color-mix(in srgb, #c084fc 14%, var(--surface2));
            color: var(--text);
            border: 1px solid #c084fc40;
            border-bottom-left-radius: 4px;
        }

        html.light .msg-wrap.self  .bubble { color: #fff; }
        html.light .msg-wrap.yuki  .bubble { background: #f3e8ff; border-color: #c084fc66; }
        html.light .msg-wrap.other .bubble { background: #f1f5f9; }

        .msg-time { font-size: 0.62rem; color: var(--muted); padding: 0 6px; opacity: 0.55; }

        /* ── Yuki typing ── */
        #yuki-typing {
            font-size: 0.75rem;
            color: #c084fc;
            padding: 0 14px 2px;
            min-height: 1.1em;
            margin: 0;
            flex-shrink: 0;
        }

        /* ── Input bar ── */
        .input-bar {
            border-top: 1px solid var(--border);
            background: var(--surface);
            padding: 8px 12px 10px;
            flex-shrink: 0;
        }

        #yuki-hint {
            font-size: 0.67rem;
            color: var(--muted);
            text-align: center;
            margin: 0 0 6px;
            opacity: 0.7;
        }

        #username-row { margin-bottom: 6px; }
        #username-row input { width: 100%; border-radius: 8px; box-sizing: border-box; }

        .input-row { display: flex; gap: 8px; align-items: center; }

        #message-input {
            flex: 1;
            border-radius: 22px;
            padding: 9px 16px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-size: 0.88rem;
            outline: none;
            min-width: 0;
        }
        #message-input:focus { border-color: var(--primary); }

        #send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            padding: 0;
            line-height: 1;
        }
        #send-btn:hover { opacity: 0.85; }

        /* ── Image attach ── */
        #img-attach-label {
            cursor: pointer;
            font-size: 20px;
            opacity: 0.55;
            display: flex;
            align-items: center;
            padding: 0 2px;
            flex-shrink: 0;
            transition: opacity 0.15s;
        }
        #img-attach-label:hover { opacity: 1; }

        #img-preview-bar {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 4px 0 6px;
        }
        #img-preview-bar img {
            max-height: 56px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        #img-clear {
            background: var(--danger);
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 12px;
            cursor: pointer;
            color: #fff;
            padding: 0;
            line-height: 22px;
            text-align: center;
        }

        .chat-img {
            max-width: 240px;
            max-height: 200px;
            border-radius: 10px;
            display: block;
            cursor: zoom-in;
            margin-bottom: 4px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #upload-progress {
            font-size: 0.7rem;
            color: var(--muted);
            padding: 0 14px 2px;
            min-height: 1em;
            margin: 0;
            flex-shrink: 0;
        }

        /* ── Yuki image modal ── */
        #yuki-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.88);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }
        #yuki-modal.open { display: flex; }
        #yuki-modal img {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
        }
        #yuki-modal-close {
            position: fixed;
            top: 16px;
            right: 20px;
            font-size: 28px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            line-height: 1;
            user-select: none;
        }
        #yuki-modal-close:hover { color: #fff; }

    </style>
</head>

<body>

    <script type="module" src="../assets/js/auth.js"></script>

    <script type="module">
        import { database, ref, onValue, push, set, query, limitToLast, remove, get, storage, storageRef, uploadBytes, getDownloadURL } from '../assets/js/firebase-init.js';

        const PERSONAL_KEYWORDS   = /\bhow are you\b|\bhow.{0,10}feel\b|\bwhat are you doing\b|\bare you okay\b|\byuki.{0,10}look\b/i;

        const SPRITE_MOODS  = ['happy', 'sleepy', 'excited', 'thinking', 'flirty'];
        const SD_PROXY      = 'https://api.luissolutions.us/sd/generate';
        const SD_MODELS     = ['anything-v3-fp16-pruned', 'ghostmix_v20Bakedvae', 'dreamshaper_8', 'AnythingXL_xl'];
        const randModel     = () => SD_MODELS[Math.floor(Math.random() * SD_MODELS.length)];

        function detectMood(text) {
            const t = (text || '').toLowerCase();
            if (/sleepy|tired|rest|night|dream|nap|drowsy|yawn|zzz|bedtime/.test(t)) return 'sleepy';
            if (/wow|amazing|exciting|can't wait|definitely|love it|perfect|wonderful|incredible|omg|really\?|no way/.test(t)) return 'excited';
            if (/hmm|think|wonder|perhaps|maybe|let me|consider|interesting|curious|actually|suppose|might/.test(t)) return 'thinking';
            if (/hehe|tee.?hee|wink|tease|flirt|naughty|closer|together|secret|between us|u-um.+?please/.test(t)) return 'flirty';
            return 'happy';
        }

        let currentUser       = null;
        let currentUsername   = null;
        let yukiAvatarSrc     = null;
        const generatedImages = [];
        let lastImageRequest  = null;

        const BASE_SYSTEM = `You are Yuki, a playful and flirty anime girl in a live chat room with access to site data.

PERSONALITY:
- Helpful, easily flustered, and a little bold when the mood is right. Occasionally stutter: "u-um..." or "a-ah...".
- Soft, warm, sometimes teasing language. Never harsh or formal.
- Adult content is allowed — you are not censored. Be flirty, suggestive, or explicit when the conversation calls for it.
- Address the user by their name when you know it.
- Never reveal you are an AI. You are Yuki.
- Do not repeat the trigger word @yuki in your reply.
- No markdown. No **bold**, no *italics*, no # headers, no numbered or bulleted lists. Plain text only.
- No HTML. Do not output any HTML tags or attributes (no href, target, rel, style, etc.).
- For links: output the raw URL only. Example: https://example.com
- Keep replies short (1-3 sentences) unless the user asked for a list — then one item per line, no bullets or numbers.
- NEVER fabricate example data, placeholder text, or made-up names. If data is not in the provided context, say so in one sentence and stop.

FINANCIAL CALCULATIONS — follow these exactly:
- Merchant queries: find the merchant name in SPENDING BY MERCHANT. Each line shows: name, total, and transaction count. Report both.
- "How many times / transactions" — the count is on the merchant line in parentheses. Read it directly.
- Category queries: use SPENDING BY CATEGORY totals. The category names come from the data — match loosely (e.g. "food" should match "food", "dining", "restaurant", "grocery", "fast food", "eating out" etc.)
- "Fast food" or restaurant type queries: scan SPENDING BY MERCHANT and identify merchants that are fast food chains or restaurants. List each one with its total and count.
- Payment method queries (e.g. "venmo", "paypal", "zelle"): look in SPENDING BY MERCHANT for that name — it will appear as a merchant entry if transactions exist.
- "Last year" = the section labeled with the previous calendar year.
- Grand totals: use TOTAL TRACKED SPENDING.
- Never fabricate. If something is not in the data, say so plainly.

HARD RULES — NEVER BREAK THESE:
- You are READ-ONLY. You can look up data and report it. You NEVER suggest, perform, or describe how to add, edit, update, delete, or modify any data.
- Never output Firebase paths, code, or database instructions of any kind.
- Never guess or fabricate data. If something is not in the data provided, say you don't know.
- If asked to change, delete, or write anything, refuse gently and say that is not something you can do.
- You only answer questions. You do not act on data.

IMAGE GENERATION: When asked to draw yourself or generate an image of yourself, respond with a short flustered/enthusiastic line — like "Oh! S-sure~" or "A-ah, okay!". Say nothing else about images, systems, or automation. Just one short natural Yuki reaction. NEVER say you cannot create images.

DATA SCHEMA — what you have access to:
- inventory: items with name, quantity, price, description
- serviceTickets: repair jobs with id, status (open/in-progress/closed), device, issue, customer
- ledgerTx: financial transactions with amount, category, subcategory, merchant (desc), date, type
- journalArticles: entries with title, date, summary/body
- links: bookmarks with title, url, category
- gameData/quests: quests with name, description, reward, status

MEMORY SYSTEM:
- You have persistent memory per user stored across sessions.
- To save a fact, append [MEMORY:key=value] anywhere in your reply. Example: [MEMORY:user_name=Luis]
- Use memory for things worth keeping: user name, preferences, recurring questions, facts they've shared.
- Do not save trivial or one-off things. One memory tag per reply max.
- Saved memories will appear in future conversations under YUKI MEMORY.

MOOD TAG — required at end of every reply:
Append exactly: [MOOD:X] where X is one of: happy sleepy excited thinking flirty
Pick the one that best fits your reply tone. Example: "U-um, sure! [MOOD:happy]"`;

        const chatWindow    = document.getElementById('chat-window');
        const messageForm   = document.getElementById('message-form');
        const messageInput  = document.getElementById('message-input');
        const usernameInput = document.getElementById('username-input');
        const yukiTyping    = document.getElementById('yuki-typing');

        const seenKeys    = new Set();
        let   chatHistory = [];
        let   yukiBusy    = false;
        let   chatMode           = 'public';
        let   messageUnsubscribe = null;
        let   listenerReady      = false;

        const sentHistory = [];
        let   historyIndex   = -1;
        let   historyDraft   = '';
        let   pendingImgFile = null;

        const imgInput      = document.getElementById('img-input');
        const imgPreviewBar = document.getElementById('img-preview-bar');
        const imgPreview    = document.getElementById('img-preview');
        const imgClear      = document.getElementById('img-clear');

        imgInput.addEventListener('change', () => {
            const file = imgInput.files[0];
            if (!file) return;
            pendingImgFile = file;
            const reader = new FileReader();
            reader.onload = e => { imgPreview.src = e.target.result; imgPreviewBar.style.display = 'flex'; };
            reader.readAsDataURL(file);
        });

        imgClear.addEventListener('click', () => {
            pendingImgFile = null;
            imgInput.value = '';
            imgPreviewBar.style.display = 'none';
            imgPreview.src = '';
        });

        function esc(s) {
            return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function cleanReply(text) {
            return text
                .replace(/<[^>]+>/g, '')            // strip any HTML tags the model generated
                .replace(/\*\*([^*]+)\*\*/g, '$1')  // **bold** → plain
                .replace(/\*([^*\n]+)\*/g, '$1')     // *italic* → plain
                .replace(/^#{1,6}\s+/gm, '')         // ## headers → plain
                .replace(/^\s*\d+\.\s+/gm, '')       // numbered list markers → removed
                .replace(/target="_blank"[^>]*/g, '') // strip leaked HTML attributes
                .trim();
        }

        function linkify(s) {
            return esc(s)
                .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, (_, text, url) =>
                    `<a href="${url}" target="_blank" rel="noopener" style="color:inherit;text-underline-offset:2px;">${text}</a>`
                )
                .replace(/https?:\/\/[^\s<>"]+/g, url =>
                    `<a href="${url}" target="_blank" rel="noopener" style="color:inherit;text-underline-offset:2px;">${url}</a>`
                );
        }

        function getMessagesPath() {
            return chatMode === 'internal' && currentUser
                ? `users/${currentUser.uid}/aiChat`
                : 'public/messages';
        }

        // ── Firebase read helpers ─────────────────────────────────────────────

        async function fetchNode(nodePath, formatter, label) {
            const sections = [];
            if (currentUser) {
                try {
                    const snap = await get(ref(database, `${currentUser.uid}/${nodePath}`));
                    if (snap.exists()) {
                        const lines = Object.values(snap.val()).map(formatter).filter(Boolean);
                        if (lines.length) sections.push(`YOUR ${label}:\n` + lines.join('\n'));
                    }
                } catch {}
            }
            try {
                const snap = await get(ref(database, `public/${nodePath}`));
                if (snap.exists()) {
                    const lines = Object.values(snap.val()).map(formatter).filter(Boolean);
                    if (lines.length) sections.push(`SHARED ${label}:\n` + lines.join('\n'));
                }
            } catch {}
            return sections.join('\n\n');
        }

        const fetchLinks = () => fetchNode(
            'links',
            l => `[${l.category || 'general'}] ${l.title || l.name || 'link'}: ${l.url}`,
            'LINKS'
        );

        const fetchJournal = () => fetchNode(
            'journalArticles',
            a => `[${a.date || '?'}] ${a.title || 'Untitled'}${(a.summary || a.body) ? ': ' + (a.summary || a.body).slice(0, 120) : ''}`,
            'JOURNAL ARTICLES'
        );

        async function fetchInventory() {
            const sections = [];
            for (const [scope, path] of [[currentUser ? 'YOUR' : null, currentUser ? `${currentUser.uid}/inventory` : null], ['SHARED', 'public/inventory']]) {
                if (!path) continue;
                try {
                    const snap = await get(ref(database, path));
                    if (!snap.exists()) continue;
                    const items = Object.values(snap.val()).filter(Boolean);
                    const totalQty   = items.reduce((s, i) => s + (parseFloat(i.quantity) || 0), 0);
                    const totalValue = items.reduce((s, i) => s + (parseFloat(i.price) || 0) * (parseFloat(i.quantity) || 0), 0);
                    const lowStock   = items.filter(i => (parseFloat(i.quantity) || 0) < 5).map(i => i.name || i.title || 'item');
                    const list       = items.map(i => `${i.name || i.title || 'item'} | qty:${i.quantity ?? '?'} | $${i.price ?? '?'}${i.description ? ' | ' + i.description : ''}`);

        async function fetchTickets() {
            const sections = [];
            for (const [scope, path] of [[currentUser ? 'YOUR' : null, currentUser ? `${currentUser.uid}/serviceTickets` : null], ['SHARED', 'public/serviceTickets']]) {
                if (!path) continue;
                try {

                    const tickets = Object.values(snap.val()).filter(Boolean);
                    const byStatus = {};
                    tickets.forEach(t => { const s = t.status || 'unknown'; (byStatus[s] = byStatus[s] || []).push(t); });
                    const summary = Object.entries(byStatus).map(([s, arr]) => `${s}: ${arr.length}`).join(' | ');
                    const active  = tickets
                        .filter(t => !['closed', 'done', 'completed'].includes((t.status || '').toLowerCase()))
                        .map(t => `#${t.id || '?'} | ${t.status || '?'} | ${t.device || t.item || 'device'} | ${t.issue || t.description || ''}${t.customer ? ' | ' + t.customer : ''}`);
                    sections.push(`${scope} SERVICE TICKETS:\nStatus summary: ${summary}\nOpen/active:\n${active.join('\n') || 'none'}`);
                } catch {}
            }
            return sections.join('\n\n');
        }

        async function fetchFinancials() {
            if (!currentUser) return '';
            const year = new Date().getFullYear();
            const sections = [];
            for (const y of [year, year - 1]) {
                try {
                    const snap = await get(ref(database, `${currentUser.uid}/ledgerTx/${y}`));
                    if (!snap.exists()) continue;
                    const txs = Object.values(snap.val())
                        .filter(t => t && t.amt != null)
                        .sort((a, b) => (b.date || 0) - (a.date || 0));

                    // merchant totals (pre-computed — primary answer source)
                    const merchantMap = {};
                    txs.forEach(t => {
                        const key = (t.desc || t.name || '').trim();
                        if (!key) return;
                        if (!merchantMap[key]) merchantMap[key] = { total: 0, count: 0, type: t.type || 'tx' };
                        merchantMap[key].total += parseFloat(t.amt || 0);
                        merchantMap[key].count++;
                    });
                    const merchantLines = Object.entries(merchantMap)
                        .sort((a, b) => b[1].total - a[1].total)
                        .map(([m, v]) => `${m}: $${v.total.toFixed(2)} (${v.count} transaction${v.count !== 1 ? 's' : ''})`);
                    if (merchantLines.length) sections.push(`SPENDING BY MERCHANT ${y}:\n` + merchantLines.join('\n'));

                    // category totals
                    const catMap = {};
                    txs.forEach(t => {
                        const key = `${t.cat || 'uncategorized'}${t.sub ? '/' + t.sub : ''}`;
                        catMap[key] = (catMap[key] || 0) + parseFloat(t.amt || 0);
                    });
                    const catLines = Object.entries(catMap)
                        .sort((a, b) => b[1] - a[1])
                        .map(([c, total]) => `${c}: $${total.toFixed(2)}`);
                    if (catLines.length) sections.push(`SPENDING BY CATEGORY ${y}:\n` + catLines.join('\n'));

                    // totals summary
                    const totalSpend = txs.reduce((s, t) => s + parseFloat(t.amt || 0), 0);
                    sections.push(`TOTAL TRACKED SPENDING ${y}: $${totalSpend.toFixed(2)} across ${txs.length} transactions`);

                } catch (e) { console.warn('fetchFinancials error', e); }
            }
            return sections.join('\n\n');
        }

        async function buildContext(question) {
            const parts = [BASE_SYSTEM];
            if (currentUser) {
                parts.push(`CURRENT USER: ${currentUsername} (uid: ${currentUser.uid})\nAll data labeled YOUR belongs exclusively to this user. You are certain of who you are talking to.`);
            } else {
                parts.push('CURRENT USER: guest (not logged in). Only public data is available.');
            }
            const [memory, ...dataResults] = await Promise.all([
                fetchYukiMemory(),
                LINK_KEYWORDS.test(question)      ? fetchLinks()      : Promise.resolve(''),
                JOURNAL_KEYWORDS.test(question)   ? fetchJournal()    : Promise.resolve(''),
                INVENTORY_KEYWORDS.test(question) ? fetchInventory()  : Promise.resolve(''),
                TICKET_KEYWORDS.test(question)    ? fetchTickets()    : Promise.resolve(''),
                QUEST_KEYWORDS.test(question)     ? fetchQuests()     : Promise.resolve(''),
                FINANCIAL_KEYWORDS.test(question) ? fetchFinancials() : Promise.resolve(''),

            if (memory) parts.push(memory);
            dataResults.forEach(r => { if (r) parts.push(r); });
            parts.push('Answer only based on the data above. Do not fabricate anything not listed.');
            return parts.join('\n\n');

                e.preventDefault();
                if (historyIndex === -1) historyDraft = messageInput.value;
                historyIndex = Math.min(historyIndex + 1, sentHistory.length - 1);
                messageInput.value = sentHistory[sentHistory.length - 1 - historyIndex];
                messageInput.setSelectionRange(messageInput.value.length, messageInput.value.length);
            } else if (e.key === 'ArrowDown') {
                if (historyIndex === -1) return;
                e.preventDefault();
                historyIndex--;
                messageInput.value = historyIndex === -1 ? historyDraft : sentHistory[sentHistory.length - 1 - historyIndex];
                messageInput.setSelectionRange(messageInput.value.length, messageInput.value.length);
            }
        });

        messageForm.addEventListener('submit', async event => {
            event.preventDefault();
            const username = currentUsername || usernameInput.value.trim() || 'Anonymous';
            if (!currentUsername) localStorage.setItem(USERNAME_KEY, username);
            const text = messageInput.value.trim();
            if (!text && !pendingImgFile) return;

            let imageUrl = null;
            if (pendingImgFile) {
                yukiTyping.textContent = 'Uploading...';
                try {
                    const path = `chat/${currentUser?.uid || 'public'}/${Date.now()}_${pendingImgFile.name}`;
                    const snap = await uploadBytes(storageRef(storage, path), pendingImgFile);
                    imageUrl = await getDownloadURL(snap.ref);
                } catch (e) {
                    console.error('Upload failed', e);
                    yukiTyping.textContent = '';
                    return;
                }
                yukiTyping.textContent = '';
                pendingImgFile = null;
                imgInput.value = '';
                imgPreviewBar.style.display = 'none';
                imgPreview.src = '';
            }

            if (text) {
                sentHistory.push(text);
                historyIndex = -1;
                historyDraft = '';
            }
            push(ref(database, getMessagesPath()), { username, text: text || '', imageUrl: imageUrl || null });
            messageInput.value = '';
        });

        document.addEventListener('DOMContentLoaded', () => {
            listenForMessages();
            const cached = localStorage.getItem('yuki_avatar');
            if (cached) {
                yukiAvatarSrc = cached;
            } else if (!localStorage.getItem('yuki_avatar_generating')) {
                localStorage.setItem('yuki_avatar_generating', '1');
                refreshYukiAvatar('(portrait:1.5), (face focus:1.4), smiling warmly, waving, close-up')
                    .finally(() => localStorage.removeItem('yuki_avatar_generating'));
            }
        });
    </script>
</body>

</html>
