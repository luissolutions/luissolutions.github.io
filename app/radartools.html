<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Radar Job Reference</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="../assets/css/app-styles.css" />
    <script type="module" src="../apps/assets/js/login.js" defer></script>
    <script src="../apps/assets/js/search.js" defer></script>

    <style>
        label {
            display: block;
        }

        img {
            margin-top: 10px;
            max-width: 100%;
            border-radius: 6px;
        }

        .hidden {
            display: none !important;
        }

        .row {
            margin-bottom: 10px;
        }

        section, .section {
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }

        /* =========================
        Checklist / Multi-day
        ========================= */
        .checkItem {
            margin-bottom: 12px;
        }

        .checkItem label {
            margin: 5px 0;
            cursor: pointer;
            background: var(--secondaryBackgroundColor);
            border-radius: 8px;
        }

        /* FIXED + CLEAN */
        .checkMulti {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin-right: 10px;
            font-size: 0.75rem;
        }

        .checkMulti input {
            transform: scale(1.2);
            cursor: pointer;
        }

        .checkMulti::before {
            content: attr(data-label);
            font-size: 0.7rem;
            opacity: 0.7;
            margin-bottom: 2px;
            margin-right: 7px;
        }

        /* =========================
        Collapsible Sections
        ========================= */
        .collapsible-header {
            cursor: pointer;
            user-select: none;
        }

        .collapsible-header::after {
            content: " ▼";
            float: right;
            font-size: 0.8em;
        }

        .collapsed>*:not(h2):not(h3) {
            display: none;
        }

        .collapsed .collapsible-header::after {
            content: " ▶";
        }

        .collapsed {
            max-height: 90px;
        }

        /* =========================
        Links Nav
        ========================= */
        .topnav {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            border: 1px solid #ddd;
            border-radius: var(--radiusLg);
            padding: 10px 12px;
            margin-bottom: 18px;
        }

        .topnav-row {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .nav-title {
            font-weight: 700;
            white-space: nowrap;
        }

        .linkbar {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 0;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: none;
        }

        .linkbar::-webkit-scrollbar {
            display: none;
        }

        .nav-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border: 1px solid var(--borderColor);
            text-decoration: none;
            font-size: 0.92rem;
            white-space: nowrap;
            max-width: 260px;
            overflow: hidden;
            text-overflow: ellipsis;
            color: inherit;
            flex: 0 0 auto;
            border-radius: 999px;
        }

        /* =========================
        More Menu
        ========================= */
        .more-wrap {
            position: relative;
            flex: 0 0 auto;
        }

        .more-btn {
            padding: 6px 10px;
            border: 1px solid var(--borderColor);
            border-radius: 999px;
            cursor: pointer;
        }

        .more-menu {
            position: absolute;
            background: var(--backgroundColor, #fff);
            right: 0;
            top: calc(100% + 8px);
            min-width: 240px;
            max-width: 360px;
            border: 1px solid #ddd;
            border-radius: var(--radiusLg);
            box-shadow: var(--shadowSoft);
            padding: 6px;
            display: none;
        }

        .more-menu.open {
            display: block;
        }

        .more-item {
            display: block;
            padding: 10px;
            border-radius: var(--radiusMd);
            text-decoration: none;
            color: inherit;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .more-item:hover {
            background: rgba(0, 0, 0, 0.06);
        }

        /* =========================
        Tools Grid
        ========================= */
        #exportTools {
            padding: 10px 14px;
            border-radius: var(--radiusMd);
            border: 1px solid var(--borderColor);
            cursor: pointer;
            white-space: nowrap;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }

        .product {
            border: 1px solid var(--borderColor);
            padding: 1rem;
            text-align: center;
            border-radius: var(--radiusLg);
            background-color: var(--secondaryBackgroundColor);
        }

        .product img {
            max-width: 100%;
            max-height: 180px;
            object-fit: contain;
            border-radius: 10px;
            cursor: pointer;
        }

        .tool-title {
            margin: 10px 0 6px;
            font-size: 1rem;
            line-height: 1.2;
            overflow-wrap: anywhere;
        }

        .tool-title a {
            text-decoration: none;
        }

        .tool-title a:hover {
            text-decoration: underline;
        }

        .meta {
            font-size: 0.92rem;
            opacity: 0.85;
        }

        /* =========================
        Modal
        ========================= */
        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            padding-top: 60px;
            inset: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.8);
        }

        .modal:not(.hidden) {
            display: block;
        }

        .modal-content {
            display: block;
            margin: auto;
            max-width: 90%;
            max-height: 80vh;
            border-radius: var(--radiusLg);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 36px;
            font-weight: bold;
            cursor: pointer;
        }

        .modal-close:hover {
            color: #ccc;
        }

        /* =========================
        Preview
        ========================= */
        .preview-item {
            margin-bottom: 30px;
        }

        .preview-item a {
            display: inline-block;
            margin-top: 10px;
            font-size: 18px;
        }

        /* =========================
        Responsive
        ========================= */
        @media (max-width: 768px) {
            .checkMulti {
                flex-direction: row;
                justify-content: space-between;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Radar Job Reference</h1>

        <section id="login-section">
            <form id="login-form">
                <label for="username">Email:</label>
                <input type="email" id="username" required>

                <label for="password">Password:</label>
                <input type="password" id="password" required>

                <button type="submit">Sign in</button>
            </form>

            <button id="logout" style="display:none;">Logout</button>
        </section>
    </header>

    <div class="topnav">
        <div class="topnav-row">
            <div class="nav-title">🔗 Links</div>
            <div id="linkBar" class="linkbar"></div>

            <div id="moreWrap" class="more-wrap hidden">
                <button id="moreBtn" class="more-btn" type="button" aria-haspopup="menu" aria-expanded="false">
                    More ▾
                </button>
                <div id="moreMenu" class="more-menu" role="menu"></div>
            </div>
        </div>
    </div>

    <main>
        <section>
            <div>
                <label for="siteNumber">Site Number</label>
                <input id="siteNumber" placeholder="Enter Site Number" />
            </div>
        </section>

        <section>
            <div id="app"></div>
        </section>

        <section>
            <h2>Generate Image with Markup</h2>

            <label for="secondPart">Second Part:</label>
            <input type="text" id="secondPart" />

            <br>
            <input type="file" id="imageInput" accept="image/*" />
            <br>

            <label><input type="checkbox" id="resizeCheckbox" checked /> Resize Image</label>
            <label><input type="checkbox" id="markupCheckbox" checked /> Add Markup</label>
            <br>

            <button id="generateBtn" type="button">Generate Image</button>
            <div id="previewSection"></div>
            <button id="downloadAllBtn" type="button">Download All</button>
        </section>

        <section>
            <h2>🧰 Tools List</h2>

            <div class="toolbar">
                <select id="categoryFilter">
                    <option value="">All Categories</option>
                </select>

                <select id="subCategoryFilter" disabled>
                    <option value="">All Sub-Categories</option>
                </select>

                <input id="toolSearch" type="search"
                    placeholder='Search tools… (supports: quotes, &, |, - , name:, category:, component: )' />

                <button id="exportTools" type="button">Export Tools to CSV</button>
            </div>

            <div id="toolGrid" class="product-grid"></div>
        </section>

        <section>
            <h2>Site Analysis</h2>
            <button id="compareBtn" type="button">Compare Sites</button>
            <div id="comparisonResults"></div>
        </section>
    </main>

    <div id="imgModal" class="modal hidden" aria-hidden="true">
        <span id="imgModalClose" class="modal-close" role="button" tabindex="0">&times;</span>
        <img class="modal-content" id="imgModalImg" alt="Expanded preview image">
    </div>

    <script type="module">
        import { database, ref, get, onValue } from '../assets/js/firebase-init.js';

        (() => {
            // -------------------------
            // Utilities
            // -------------------------
            const $ = (id) => document.getElementById(id);

            const els = {
                app: $("app"),
                siteNumber: $("siteNumber"),
                secondPart: $("secondPart"),
                imageInput: $("imageInput"),
                resizeCheckbox: $("resizeCheckbox"),
                markupCheckbox: $("markupCheckbox"),
                generateBtn: $("generateBtn"),
                previewSection: $("previewSection"),
                downloadAllBtn: $("downloadAllBtn"),

                toolGrid: $("toolGrid"),
                toolSearch: $("toolSearch"),
                exportTools: $("exportTools"),
                categoryFilter: $("categoryFilter"),
                subCategoryFilter: $("subCategoryFilter"),

                compareBtn: $("compareBtn"),
                comparisonResults: $("comparisonResults"),

                linkBar: $("linkBar"),
                moreWrap: $("moreWrap"),
                moreBtn: $("moreBtn"),
                moreMenu: $("moreMenu"),

                imgModal: $("imgModal"),
                imgModalImg: $("imgModalImg"),
                imgModalClose: $("imgModalClose")
            };

            const state = {
                config: null,
                isLoading: false,
                affiliateTag: "",
                allTools: [],
                allImages: [],
                lastLinks: [],
                searchTimeout: null,
                autoSaveTimeout: null
            };

            function escapeHtml(value) {
                return String(value ?? "").replace(/[&<>"']/g, (m) => ({
                    "&": "&amp;",
                    "<": "&lt;",
                    ">": "&gt;",
                    '"': "&quot;",
                    "'": "&#39;"
                }[m]));
            }

            function debounce(fn, delay = 150) {
                let timeout;
                return (...args) => {
                    clearTimeout(timeout);
                    timeout = setTimeout(() => fn(...args), delay);
                };
            }

            function safeJsonParse(raw, fallback = null) {
                try {
                    return JSON.parse(raw);
                } catch (err) {
                    console.error("Invalid JSON:", err);
                    return fallback;
                }
            }

            function createEl(tag, options = {}) {
                const el = document.createElement(tag);
                if (options.className) el.className = options.className;
                if (options.text != null) el.textContent = options.text;
                if (options.html != null) el.innerHTML = options.html;
                if (options.attrs) {
                    Object.entries(options.attrs).forEach(([k, v]) => {
                        if (v != null) el.setAttribute(k, v);
                    });
                }
                return el;
            }

            function setCollapsedState(container, storageKey, collapsedClass = "collapsed") {
                if (localStorage.getItem(storageKey) === "true") {
                    container.classList.add(collapsedClass);
                }
            }

            function bindCollapsible(header, container, storageKey, collapsedClass = "collapsed") {
                setCollapsedState(container, storageKey, collapsedClass);
                header.addEventListener("click", () => {
                    container.classList.toggle(collapsedClass);
                    localStorage.setItem(storageKey, String(container.classList.contains(collapsedClass)));
                });
            }

            function getStorageKey() {
                const site = els.siteNumber?.value?.trim();
                return site ? `qc_app_${site}` : null;
            }

            // -------------------------
            // Search engine
            // -------------------------
            const toolSearchEngine = (window.SearchEngine && window.SearchEngine.create)
                ? window.SearchEngine.create({
                    fields: {
                        name: { type: "string", resolver: r => r.name },
                        category: { type: "string", resolver: r => r.category },
                        component: { type: "string", resolver: r => r.component }
                    },
                    defaultFields: ["name", "category", "component"],
                    caseSensitive: false
                })
                : null;

            // -------------------------
            // Tools List
            // -------------------------
            function normalizeTools(data) {
                const items = [];

                for (const category of Object.keys(data || {})) {
                    const categoryObj = data[category] || {};

                    for (const component of Object.keys(categoryObj)) {
                        const componentObj = categoryObj[component] || {};

                        for (const key of Object.keys(componentObj)) {
                            const entry = componentObj[key] || {};
                            const partName = entry.part || key;

                            items.push({
                                name: partName,
                                category: category || "",
                                component: component || "",
                                affiliateUrl: entry.affiliateUrl || "",
                                imageUrl: entry.imageUrl || `assets/img/database/${encodeURIComponent(partName)}.png`
                            });
                        }
                    }
                }

                return items;
            }

            function ensureTag(url) {
                try {
                    if (!url) return "";
                    const parsed = new URL(url, window.location.origin);
                    if (state.affiliateTag) {
                        parsed.searchParams.set("tag", state.affiliateTag);
                    }
                    return parsed.toString();
                } catch {
                    return url || "";
                }
            }

            function rebuildCategoryDropdown() {
                const categories = [...new Set(state.allTools.map(t => t.category).filter(Boolean))]
                    .sort((a, b) => a.localeCompare(b));

                const current = els.categoryFilter.value || "";
                els.categoryFilter.innerHTML =
                    `<option value="">All Categories</option>` +
                    categories.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");

                if (categories.includes(current)) {
                    els.categoryFilter.value = current;
                }
            }

            function rebuildSubCategoryDropdown() {
                const selectedCategory = els.categoryFilter.value || "";
                const components = [...new Set(
                    state.allTools
                        .filter(t => !selectedCategory || t.category === selectedCategory)
                        .map(t => t.component)
                        .filter(Boolean)
                )].sort((a, b) => a.localeCompare(b));

                const current = els.subCategoryFilter.value || "";

                els.subCategoryFilter.innerHTML =
                    `<option value="">All Sub-Categories</option>` +
                    components.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");

                els.subCategoryFilter.disabled = components.length === 0;
                els.subCategoryFilter.value = components.includes(current) ? current : "";
            }

            function applyFilters(records) {
                const category = els.categoryFilter.value || "";
                const component = els.subCategoryFilter.value || "";
                const query = (els.toolSearch.value || "").trim();

                let output = [...records];

                if (category) {
                    output = output.filter(t => t.category === category);
                }

                if (component) {
                    output = output.filter(t => t.component === component);
                }

                if (query) {
                    if (toolSearchEngine) {
                        output = toolSearchEngine.filter(output, query);
                    } else {
                        const q = query.toLowerCase();
                        output = output.filter(t =>
                            t.name.toLowerCase().includes(q) ||
                            t.category.toLowerCase().includes(q) ||
                            t.component.toLowerCase().includes(q)
                        );
                    }
                }

                return output;
            }

            function renderTools() {
                els.toolGrid.innerHTML = "";
                const shown = applyFilters(state.allTools);
                const fragment = document.createDocumentFragment();

                for (const tool of shown) {
                    const card = createEl("div", { className: "product" });
                    const image = createEl("img", {
                        attrs: {
                            src: tool.imageUrl,
                            alt: tool.name
                        }
                    });

                    const link = ensureTag(tool.affiliateUrl);

                    const title = createEl("h3", { className: "tool-title" });
                    if (link) {
                        const anchor = createEl("a", {
                            text: tool.name,
                            attrs: {
                                href: link,
                                target: "_blank",
                                rel: "noopener"
                            }
                        });
                        title.appendChild(anchor);
                    } else {
                        title.textContent = tool.name;
                    }

                    const meta = createEl("div", {
                        className: "meta",
                        text: `${tool.category}${tool.component ? " • " + tool.component : ""}`
                    });

                    card.appendChild(image);
                    card.appendChild(title);
                    card.appendChild(meta);
                    fragment.appendChild(card);
                }

                els.toolGrid.appendChild(fragment);
            }

            function refreshToolUI() {
                rebuildCategoryDropdown();
                rebuildSubCategoryDropdown();
                renderTools();
            }

            function exportToolsToCsv() {
                const shown = applyFilters(state.allTools);
                const rows = [["Name", "Category", "Component", "Link"]];

                shown.forEach(t => {
                    rows.push([
                        t.name,
                        t.category,
                        t.component,
                        ensureTag(t.affiliateUrl)
                    ]);
                });

                const csv = rows
                    .map(row => row.map(cell => `"${String(cell ?? "").replace(/"/g, '""')}"`).join(","))
                    .join("\n");

                const blob = new Blob([csv], { type: "text/csv" });
                const url = URL.createObjectURL(blob);

                const a = document.createElement("a");
                a.href = url;
                a.download = "radar-tools.csv";
                document.body.appendChild(a);
                a.click();
                a.remove();

                setTimeout(() => URL.revokeObjectURL(url), 0);
            }

            // -------------------------
            // Links nav
            // -------------------------
            function closeMoreMenu() {
                els.moreMenu.classList.remove("open");
                els.moreBtn.setAttribute("aria-expanded", "false");
            }

            function makeLinkChip(link, className = "nav-chip") {
                return createEl("a", {
                    className,
                    text: link.title || link.url,
                    attrs: {
                        href: link.url,
                        target: "_blank",
                        rel: "noopener",
                        title: link.title || link.url
                    }
                });
            }

            function layoutLinks(links) {
                els.linkBar.innerHTML = "";
                els.moreMenu.innerHTML = "";
                closeMoreMenu();

                const chips = links.map(link => makeLinkChip(link, "nav-chip"));
                chips.forEach(chip => els.linkBar.appendChild(chip));

                requestAnimationFrame(() => {
                    const overflow = [];

                    while (els.linkBar.scrollWidth > els.linkBar.clientWidth && els.linkBar.children.length > 0) {
                        const last = els.linkBar.lastElementChild;
                        overflow.unshift({
                            title: last.textContent,
                            url: last.href
                        });
                        last.remove();
                    }

                    if (overflow.length > 0) {
                        els.moreWrap.classList.remove("hidden");
                        overflow.forEach(link => {
                            els.moreMenu.appendChild(makeLinkChip(link, "more-item"));
                        });
                    } else {
                        els.moreWrap.classList.add("hidden");
                    }
                });
            }

            function relayoutLinksSoon() {
                if (!state.lastLinks.length) return;
                layoutLinks(state.lastLinks);
                setTimeout(() => layoutLinks(state.lastLinks), 50);
            }

            // -------------------------
            // Modal
            // -------------------------
            function openModal(src) {
                els.imgModalImg.src = src;
                els.imgModal.classList.remove("hidden");
                els.imgModal.setAttribute("aria-hidden", "false");
            }

            function closeModal() {
                els.imgModal.classList.add("hidden");
                els.imgModal.setAttribute("aria-hidden", "true");
                els.imgModalImg.src = "";
            }

            // -------------------------
            // Config-driven app
            // -------------------------
            async function loadConfig() {
                try {
                    const response = await fetch("./assets/js/radar_checklist.json");
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    state.config = await response.json();
                    buildApp({ sections: {} });
                } catch (err) {
                    console.error("Failed to load config:", err);
                    alert("Config failed to load");
                }
            }

            function buildApp(data = null) {
                els.app.innerHTML = "";

                if (!state.config?.sections?.length) return;

                const fragment = document.createDocumentFragment();

                state.config.sections.forEach((section, index) => {
                    const wrapper = createEl("div", { className: "section" });
                    wrapper.dataset.sectionId = section.id;

                    const header = createEl("h2", {
                        className: "collapsible-header",
                        text: section.title || `Section ${index + 1}`
                    });

                    const content = createEl("div", {
                        attrs: { id: `section_${section.id}` }
                    });

                    wrapper.appendChild(header);
                    wrapper.appendChild(content);

                    bindCollapsible(header, wrapper, `section_dynamic_${section.id}`);
                    fragment.appendChild(wrapper);
                });

                els.app.appendChild(fragment);

                const renderData = data || collectData();
                state.config.sections.forEach(section => renderSection(section, renderData));
            }

            function renderSection(section, data) {
                const container = $(`section_${section.id}`);
                if (!container) return;

                container.innerHTML = "";
                const fragment = document.createDocumentFragment();

                if (section.type === "checklist") {
                    section.items.forEach((item, index) => {
                        const text = typeof item === "object" ? item.text : item;
                        const wrapper = createEl("div", { className: "checkItem" });
                        const label = createEl("label");
                        const checkbox = createEl("input", {
                            attrs: {
                                type: "checkbox",
                                id: `${section.id}_${index}`
                            }
                        });

                        label.appendChild(checkbox);
                        label.appendChild(document.createTextNode(` ${text}`));
                        wrapper.appendChild(label);
                        fragment.appendChild(wrapper);
                    });

                    if (section.notes) {
                        fragment.appendChild(createEl("label", { text: "Notes", attrs: { for: `notes_${section.id}` } }));
                        fragment.appendChild(createEl("textarea", { attrs: { id: `notes_${section.id}` } }));
                    }
                }

                if (section.type === "checklistMultiDay") {
                    const days = getTotalNights(data);

                    section.items.forEach((item, index) => {
                        const wrapper = createEl("div", { className: "checkItem" });
                        const strong = createEl("strong", { text: item.text });
                        wrapper.appendChild(strong);
                        wrapper.appendChild(document.createElement("br"));

                        for (let day = 0; day < days; day++) {
                            const label = createEl("label", { className: "checkMulti" });

                            label.setAttribute("data-label", `Night ${day + 1}`);

                            label.appendChild(createEl("input", {
                                attrs: {
                                    type: "checkbox",
                                    id: `${section.id}_${index}_${day}`
                                }
                            }));

                            wrapper.appendChild(label);
                        }

                        fragment.appendChild(wrapper);
                    });
                }

                if (section.type === "fields") {
                    section.fields.forEach(field => {
                        fragment.appendChild(createEl("label", {
                            text: field.label,
                            attrs: { for: `field_${field.id}` }
                        }));

                        fragment.appendChild(createEl(field.type === "textarea" ? "textarea" : "input", {
                            attrs: {
                                id: `field_${field.id}`,
                                type: field.type === "textarea" ? null : (field.type || "text")
                            }
                        }));
                    });
                }

                if (section.type === "counter") {
                    section.fields.forEach(field => {
                        fragment.appendChild(createEl("label", { text: field.label }));

                        const div = createEl("div");
                        div.appendChild(createEl("input", {
                            attrs: {
                                id: `field_${field.id}`,
                                type: "number",
                                placeholder: "Done"
                            }
                        }));
                        div.appendChild(document.createTextNode(" / "));
                        div.appendChild(createEl("input", {
                            attrs: {
                                id: `field_${field.targetId}`,
                                type: "number",
                                placeholder: "Total"
                            }
                        }));
                        fragment.appendChild(div);
                    });
                }

                if (section.type === "matrix") {
                    section.rows.forEach((row, rowIndex) => {
                        const rowDiv = createEl("div", { className: "row" });
                        rowDiv.appendChild(createEl("strong", { text: row }));
                        rowDiv.appendChild(document.createElement("br"));

                        section.columns.forEach((column, colIndex) => {
                            const label = createEl("label");
                            const radio = createEl("input", {
                                attrs: {
                                    type: "radio",
                                    name: `${section.id}_${rowIndex}`,
                                    id: `${section.id}_${rowIndex}_${colIndex}`
                                }
                            });

                            label.appendChild(radio);
                            label.appendChild(document.createTextNode(` ${column}`));
                            rowDiv.appendChild(label);
                        });

                        fragment.appendChild(rowDiv);
                    });
                }

                if (section.type === "scoring") {
                    section.fields.forEach(field => {
                        fragment.appendChild(createEl("label", {
                            text: `${field.label} (0-${field.max})`,
                            attrs: { for: `score_${field.id}` }
                        }));

                        fragment.appendChild(createEl("input", {
                            attrs: {
                                id: `score_${field.id}`,
                                type: "number",
                                max: field.max
                            }
                        }));
                    });

                    fragment.appendChild(createEl("label", {
                        text: "Total",
                        attrs: { for: `score_total_${section.id}` }
                    }));

                    fragment.appendChild(createEl("input", {
                        attrs: {
                            id: `score_total_${section.id}`,
                            readonly: "readonly"
                        }
                    }));
                }

                if (section.type === "singleSelect") {
                    section.options.forEach((option, index) => {
                        const label = createEl("label");
                        const radio = createEl("input", {
                            attrs: {
                                type: "radio",
                                name: section.id,
                                id: `${section.id}_${index}`
                            }
                        });
                        label.appendChild(radio);
                        label.appendChild(document.createTextNode(` ${option}`));
                        fragment.appendChild(label);
                    });
                }

                container.appendChild(fragment);
            }

            function collectData() {
                const data = { sections: {} };

                if (!state.config?.sections?.length) {
                    return data;
                }

                state.config.sections.forEach(section => {
                    const sectionData = {};

                    if (section.type === "fields" || section.type === "counter") {
                        sectionData.fields = {};
                        section.fields.forEach(field => {
                            sectionData.fields[field.id] = $(`field_${field.id}`)?.value ?? "";
                            if (field.targetId) {
                                sectionData.fields[field.targetId] = $(`field_${field.targetId}`)?.value ?? "";
                            }
                        });
                    }

                    if (section.type === "scoring") {
                        sectionData.scores = {};
                        let total = 0;

                        section.fields.forEach(field => {
                            const value = Number($(`score_${field.id}`)?.value || 0);
                            sectionData.scores[field.id] = value;
                            total += value;
                        });

                        sectionData.total = total;
                    }

                    if (section.type === "matrix") {
                        sectionData.matrix = [];

                        section.rows.forEach((_, rowIndex) => {
                            let selected = null;

                            section.columns.forEach((_, colIndex) => {
                                if ($(`${section.id}_${rowIndex}_${colIndex}`)?.checked) {
                                    selected = colIndex;
                                }
                            });

                            sectionData.matrix[rowIndex] = selected;
                        });
                    }

                    if (section.type === "singleSelect") {
                        sectionData.selected = null;

                        section.options.forEach((_, index) => {
                            if ($(`${section.id}_${index}`)?.checked) {
                                sectionData.selected = index;
                            }
                        });
                    }

                    if (section.type === "checklist") {
                        sectionData.items = section.items.map((item, index) => {
                            const checked = Boolean($(`${section.id}_${index}`)?.checked);
                            const isNegative = item?.negative === true;

                            return {
                                checked,
                                value: isNegative
                                    ? (checked ? -1 : 1)
                                    : (checked ? 1 : 0)
                            };
                        });

                        if (section.notes) {
                            sectionData.notes = $(`notes_${section.id}`)?.value ?? "";
                        }
                    }

                    if (section.type === "checklistMultiDay") {
                        const days = getTotalNights(data);
                        sectionData.items = section.items.map((_, index) => {
                            const dayValues = [];

                            for (let day = 0; day < days; day++) {
                                dayValues.push(
                                    Boolean($(`${section.id}_${index}_${day}`)?.checked)
                                );
                            }

                            return {
                                days: dayValues,
                                value: dayValues.filter(Boolean).length
                            };
                        });
                    } data.sections[section.id] = sectionData;
                });

                return data;
            }

            function applyData(data) {
                const sections = data?.sections || {};

                Object.entries(sections).forEach(([sectionId, sectionData]) => {
                    if (sectionData.notes !== undefined) {
                        const notesEl = $(`notes_${sectionId}`);
                        if (notesEl) notesEl.value = sectionData.notes;
                    }

                    if (sectionData.fields) {
                        Object.entries(sectionData.fields).forEach(([key, value]) => {
                            const fieldEl = $(`field_${key}`);
                            if (fieldEl) fieldEl.value = value;
                        });
                    }

                    if (sectionData.scores) {
                        Object.entries(sectionData.scores).forEach(([key, value]) => {
                            const scoreEl = $(`score_${key}`);
                            if (scoreEl) scoreEl.value = value;
                        });
                    }

                    if (Array.isArray(sectionData.matrix)) {
                        sectionData.matrix.forEach((colIndex, rowIndex) => {
                            if (colIndex !== null) {
                                const radio = $(`${sectionId}_${rowIndex}_${colIndex}`);
                                if (radio) radio.checked = true;
                            }
                        });
                    }

                    if (sectionData.selected !== null && sectionData.selected !== undefined) {
                        const radio = $(`${sectionId}_${sectionData.selected}`);
                        if (radio) radio.checked = true;
                    }

                    if (Array.isArray(sectionData.items)) {
                        sectionData.items.forEach((item, index) => {
                            if (Array.isArray(item.days)) {
                                item.days.forEach((value, dayIndex) => {
                                    const checkbox = $(`${sectionId}_${index}_${dayIndex}`);
                                    if (checkbox) checkbox.checked = value;
                                });
                            } else if (item.checked !== undefined) {
                                const checkbox = $(`${sectionId}_${index}`);
                                if (checkbox) checkbox.checked = item.checked;
                            }
                        });
                    }
                });

                updateAllScoringTotals();
            }

            function clearAppInputs() {
                document.querySelectorAll("#app input, #app textarea").forEach((node) => {
                    if (node.type === "checkbox" || node.type === "radio") {
                        node.checked = false;
                    } else {
                        node.value = "";
                    }
                });
            }

            function loadLocal() {
                const key = getStorageKey();

                if (!key) {
                    alert("Enter a site number first");
                    return;
                }

                const raw = localStorage.getItem(key);

                if (!raw) {
                    const create = confirm("Site not found. Create new site?");
                    if (!create) return;

                    clearAppInputs();
                    localStorage.setItem(key, JSON.stringify({ sections: {} }));
                    return;
                }

                const data = safeJsonParse(raw, { sections: {} });
                if (!data) return;

                clearAppInputs();

                state.isLoading = true;
                setTimeout(() => {
                    buildApp(data);
                    applyData(data);
                    state.isLoading = false;
                }, 0);
            }

            function saveLocal() {
                const key = getStorageKey();

                if (!key) {
                    alert("Enter a site number first");
                    return;
                }

                localStorage.setItem(key, JSON.stringify(collectData()));
                alert("Saved");
            }

            function getAllSites() {
                const sites = [];

                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (!key || !key.startsWith("qc_app_")) continue;

                    const site = key.replace("qc_app_", "");
                    const parsed = safeJsonParse(localStorage.getItem(key), null);

                    if (parsed && typeof parsed === "object") {
                        sites.push({ site, data: parsed });
                    }
                }

                return sites;
            }

            function compareSitesDetailed() {
                const sites = getAllSites();
                const results = [];

                if (sites.length < 2) return results;

                for (let i = 0; i < sites.length; i++) {
                    for (let j = i + 1; j < sites.length; j++) {
                        const aSite = sites[i];
                        const bSite = sites[j];

                        const sectionsA = aSite.data?.sections || {};
                        const sectionsB = bSite.data?.sections || {};
                        const allSectionIds = [...new Set([
                            ...Object.keys(sectionsA),
                            ...Object.keys(sectionsB)
                        ])];

                        const diff = {
                            siteA: aSite.site,
                            siteB: bSite.site,
                            differences: []
                        };

                        allSectionIds.forEach(sectionId => {
                            const a = sectionsA[sectionId];
                            const b = sectionsB[sectionId];

                            if (a?.items && b?.items) {
                                const maxLen = Math.max(a.items.length, b.items.length);
                                for (let index = 0; index < maxLen; index++) {
                                    if (a.items[index]?.value !== b.items[index]?.value) {
                                        diff.differences.push(
                                            `${sectionId} item ${index + 1} differs (${a.items[index]?.value} vs ${b.items[index]?.value})`
                                        );
                                    }
                                }
                            }

                            if (a?.scores && b?.scores) {
                                const scoreKeys = [...new Set([
                                    ...Object.keys(a.scores),
                                    ...Object.keys(b.scores)
                                ])];

                                scoreKeys.forEach(key => {
                                    if (a.scores[key] !== b.scores[key]) {
                                        diff.differences.push(
                                            `${sectionId} score "${key}" differs (${a.scores[key]} vs ${b.scores[key]})`
                                        );
                                    }
                                });
                            }

                            if (a?.selected !== b?.selected && (a?.selected != null || b?.selected != null)) {
                                diff.differences.push(
                                    `${sectionId} selection differs (${a?.selected} vs ${b?.selected})`
                                );
                            }
                        });

                        results.push(diff);
                    }
                }

                return results;
            }

            function calculateSiteAverages() {
                const sites = getAllSites();
                if (!sites.length) return null;

                const totals = {};
                const counts = sites.length;

                sites.forEach(site => {
                    const sections = site.data?.sections || {};

                    Object.entries(sections).forEach(([sectionId, sectionData]) => {
                        if (!totals[sectionId]) {
                            totals[sectionId] = {
                                scores: {},
                                checklist: [],
                                selected: {}
                            };
                        }

                        if (sectionData.scores) {
                            Object.entries(sectionData.scores).forEach(([key, value]) => {
                                totals[sectionId].scores[key] =
                                    (totals[sectionId].scores[key] || 0) + Number(value || 0);
                            });
                        }

                        if (sectionData.items) {
                            sectionData.items.forEach((item, index) => {
                                if (totals[sectionId].checklist[index] == null) {
                                    totals[sectionId].checklist[index] = 0;
                                }
                                totals[sectionId].checklist[index] += Number(item.value || 0);
                            });
                        }

                        if (sectionData.selected !== null && sectionData.selected !== undefined) {
                            totals[sectionId].selected[sectionData.selected] =
                                (totals[sectionId].selected[sectionData.selected] || 0) + 1;
                        }
                    });
                });

                const averages = {};

                Object.entries(totals).forEach(([sectionId, data]) => {
                    averages[sectionId] = {};

                    if (Object.keys(data.scores).length) {
                        averages[sectionId].scores = {};
                        Object.entries(data.scores).forEach(([key, value]) => {
                            averages[sectionId].scores[key] = (value / counts).toFixed(2);
                        });
                    }

                    if (data.checklist.length) {
                        averages[sectionId].checklist = data.checklist.map(value =>
                            ((value / counts) * 100).toFixed(1) + "%"
                        );
                    }

                    if (Object.keys(data.selected).length) {
                        const top = Object.entries(data.selected)
                            .sort((a, b) => b[1] - a[1])[0];

                        averages[sectionId].mostCommon = {
                            optionIndex: top[0],
                            count: top[1]
                        };
                    }
                });

                return averages;
            }

            function showAveragesUI() {
                const data = calculateSiteAverages();

                if (!data) {
                    els.comparisonResults.innerHTML = "<p>No sites saved</p>";
                    return;
                }

                els.comparisonResults.innerHTML = `
                    <h2>📊 Site Averages</h2>
                    ${Object.entries(data).map(([sectionId, sectionData]) => `
                        <div>
                            <strong>${escapeHtml(sectionId)}</strong>

                            ${sectionData.scores ? `
                                <div><b>Scores:</b></div>
                                <ul>
                                    ${Object.entries(sectionData.scores).map(([k, v]) =>
                    `<li>${escapeHtml(k)}: ${escapeHtml(v)}</li>`
                ).join("")}
                                </ul>
                            ` : ""}

                            ${sectionData.checklist ? `
                                <div><b>Checklist Completion:</b></div>
                                <ul>
                                    ${sectionData.checklist.map((v, i) =>
                    `<li>Item ${i + 1}: ${escapeHtml(v)}</li>`
                ).join("")}
                                </ul>
                            ` : ""}

                            ${sectionData.mostCommon ? `
                                <div><b>Most Common Selection:</b> Option ${escapeHtml(sectionData.mostCommon.optionIndex)}</div>
                            ` : ""}
                        </div>
                    `).join("")}
                `;
            }

            function showComparison() {
                console.table(compareSitesDetailed());
            }

            function updateAllScoringTotals() {
                if (!state.config?.sections?.length) return;

                state.config.sections.forEach(section => {
                    if (section.type !== "scoring") return;

                    let total = 0;
                    section.fields.forEach(field => {
                        total += Number($(`score_${field.id}`)?.value || 0);
                    });

                    const totalEl = $(`score_total_${section.id}`);
                    if (totalEl) {
                        totalEl.value = total;
                    }
                });
            }

            // -------------------------
            // Image generation / markup
            // -------------------------
            function resizeImage(file, maxWidth) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();

                    reader.onerror = () => reject("Failed to read image.");

                    reader.onload = () => {
                        const img = new Image();

                        img.onerror = () => reject("Invalid image.");

                        img.onload = () => {
                            let width = img.width;
                            let height = img.height;

                            if (width > maxWidth) {
                                height *= maxWidth / width;
                                width = maxWidth;
                            }

                            const canvas = document.createElement("canvas");
                            canvas.width = width;
                            canvas.height = height;

                            const ctx = canvas.getContext("2d");
                            if (!ctx) {
                                reject("Canvas context unavailable.");
                                return;
                            }

                            ctx.drawImage(img, 0, 0, width, height);

                            canvas.toBlob(
                                (blob) => blob ? resolve(blob) : reject("Resize failed"),
                                file.type || "image/jpeg"
                            );
                        };

                        img.src = reader.result;
                    };

                    reader.readAsDataURL(file);
                });
            }

            function addTextToImage(blob, text) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();

                    reader.onerror = () => reject("Failed to read image blob.");

                    reader.onload = () => {
                        const img = new Image();

                        img.onerror = () => reject("Invalid image.");

                        img.onload = () => {
                            const barHeight = 120;
                            const canvas = document.createElement("canvas");
                            canvas.width = img.width;
                            canvas.height = img.height + barHeight;

                            const ctx = canvas.getContext("2d");
                            if (!ctx) {
                                reject("Canvas context unavailable.");
                                return;
                            }

                            ctx.drawImage(img, 0, 0);
                            ctx.fillStyle = "black";
                            ctx.fillRect(0, img.height, canvas.width, barHeight);

                            ctx.fillStyle = "white";
                            ctx.font = `${Math.floor(canvas.width / 15)}px Arial`;
                            ctx.textAlign = "center";
                            ctx.textBaseline = "middle";
                            ctx.fillText(text, canvas.width / 2, img.height + (barHeight / 2));

                            canvas.toBlob(
                                (outputBlob) => outputBlob ? resolve(outputBlob) : reject("Markup failed"),
                                "image/jpeg"
                            );
                        };

                        img.src = reader.result;
                    };

                    reader.readAsDataURL(blob);
                });
            }

            async function handleGenerateImage() {
                const first = els.siteNumber.value.trim();
                const second = els.secondPart.value.trim();
                const file = els.imageInput.files?.[0];
                const doResize = els.resizeCheckbox.checked;
                const doMarkup = els.markupCheckbox.checked;

                if (!first || !second || !file) {
                    alert("Enter site number and second part, and choose a file.");
                    return;
                }

                try {
                    let blob = file;

                    if (doResize) {
                        blob = await resizeImage(blob, 2048);
                    }

                    const label = `${first}-${second}`;

                    if (doMarkup) {
                        blob = await addTextToImage(blob, label);
                    }

                    state.allImages.push({ blob, label });
                    renderGeneratedPreview(blob, label);
                } catch (err) {
                    console.error(err);
                    alert("Error generating image: " + err);
                }
            }

            function renderGeneratedPreview(blob, label) {
                const url = URL.createObjectURL(blob);

                const wrapper = createEl("div", { className: "preview-item" });
                wrapper.appendChild(createEl("strong", { text: label }));
                wrapper.appendChild(document.createElement("br"));

                const img = new Image();
                img.src = url;
                img.alt = label;
                img.style.maxWidth = "200px";
                img.style.cursor = "pointer";
                img.addEventListener("click", () => openModal(url));

                const downloadLink = createEl("a", {
                    text: "Download Image",
                    attrs: {
                        href: url,
                        download: `${label}.jpg`
                    }
                });

                wrapper.appendChild(img);
                wrapper.appendChild(document.createElement("br"));
                wrapper.appendChild(downloadLink);
                els.previewSection.appendChild(wrapper);
            }

            function downloadAllImages() {
                if (state.allImages.length === 0) {
                    alert("No images to download.");
                    return;
                }

                state.allImages.forEach(({ blob, label }) => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = `${label}.jpg`;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    setTimeout(() => URL.revokeObjectURL(url), 0);
                });
            }

            // -------------------------
            // Firebase
            // -------------------------
            async function loadSettings() {
                try {
                    const snap = await get(ref(database, "public/settings/affiliateTag"));
                    state.affiliateTag = snap.val() || "";
                } catch (err) {
                    console.error("Failed to load affiliate tag:", err);
                }
            }

            async function loadInventory() {
                try {
                    const snap = await get(ref(database, "public/inventory"));
                    state.allTools = normalizeTools(snap.val() || {});
                    refreshToolUI();
                } catch (err) {
                    console.error("Inventory load failed:", err);
                }
            }

            function bindLinksListener() {
                onValue(ref(database, "public/links"), (snap) => {
                    const data = snap.val() || {};
                    state.lastLinks = Object.values(data)
                        .filter(link => link && link.url)
                        .sort((a, b) => String(a.title || a.url).localeCompare(String(b.title || b.url)));

                    relayoutLinksSoon();
                }, (err) => {
                    console.error("Links listener failed:", err);
                });
            }

            // -------------------------
            // Autosave
            // -------------------------
            function autoSaveNow() {
                const key = getStorageKey();
                if (!key) return;

                localStorage.setItem(key, JSON.stringify(collectData()));
            }

            const debouncedAutoSave = debounce(autoSaveNow, 300);
            const debouncedToolSearch = debounce(renderTools, 150);


            //helpers

            function getTotalNights(data) {
                return Math.min(
                    Math.max(
                        Number(data?.sections?.site_info?.fields?.totalNights) || 5,
                        1
                    ),
                    10
                );
            }

            // -------------------------
            // Event binding
            // -------------------------
            function bindEvents() {
                document.addEventListener("input", (e) => {
                    if (e.target.id === "field_totalNights") {
                        const existing = collectData();
                        buildApp(existing);
                        applyData(existing);
                    }
                });

                els.categoryFilter.addEventListener("change", () => {
                    rebuildSubCategoryDropdown();
                    renderTools();
                });

                els.subCategoryFilter.addEventListener("change", renderTools);
                els.toolSearch.addEventListener("input", debouncedToolSearch);
                els.exportTools.addEventListener("click", exportToolsToCsv);

                els.moreBtn?.addEventListener("click", () => {
                    const open = els.moreMenu.classList.toggle("open");
                    els.moreBtn.setAttribute("aria-expanded", String(open));
                });

                document.addEventListener("click", (event) => {
                    const target = event.target;

                    if (els.moreWrap && !els.moreWrap.contains(target)) {
                        closeMoreMenu();
                    }

                    if (target.tagName === "IMG" && target.closest(".product")) {
                        openModal(target.src);
                    }
                });

                document.addEventListener("keydown", (event) => {
                    if (event.key === "Escape") {
                        closeMoreMenu();
                        closeModal();
                    }

                    if ((event.key === "Enter" || event.key === " ") && document.activeElement === els.imgModalClose) {
                        closeModal();
                    }
                });

                els.imgModalClose.addEventListener("click", closeModal);
                els.imgModal.addEventListener("click", (event) => {
                    if (event.target === els.imgModal) {
                        closeModal();
                    }
                });

                els.siteNumber.addEventListener("change", () => {
                    try {
                        loadLocal();
                    } catch (err) {
                        console.error("Failed to load local data:", err);
                    }
                });

                document.addEventListener("input", (event) => {
                    if (state.isLoading) return;
                    if (event.target.id === "siteNumber") return;

                    debouncedAutoSave();
                    updateAllScoringTotals();
                });

                document.addEventListener("change", () => {
                    if (state.isLoading) return;
                    autoSaveNow();
                });

                els.compareBtn.addEventListener("click", showAveragesUI);
                els.generateBtn.addEventListener("click", handleGenerateImage);
                els.downloadAllBtn.addEventListener("click", downloadAllImages);

                window.addEventListener("resize", relayoutLinksSoon);

                window.addEventListener("beforeunload", (event) => {
                    if (state.allImages.length > 0) {
                        event.preventDefault();
                        event.returnValue = "If you reload, all images will be lost.";
                    }
                });

                document.querySelectorAll("main > section").forEach((section, index) => {
                    const header = section.querySelector("h2");
                    if (!header) return;

                    header.classList.add("collapsible-header");
                    const key = `section_main_${section.dataset.id || index}_${header.textContent.trim()}`;
                    bindCollapsible(header, section, key);
                });
            }

            // -------------------------
            // Public helpers (optional)
            // -------------------------
            window.saveLocal = saveLocal;
            window.loadLocal = loadLocal;
            window.showComparison = showComparison;
            window.compareSitesDetailed = compareSitesDetailed;
            window.calculateSiteAverages = calculateSiteAverages;

            // -------------------------
            // Init
            // -------------------------
            async function init() {
                bindEvents();
                await Promise.all([
                    loadConfig(),
                    loadSettings(),
                    loadInventory()
                ]);
                bindLinksListener();
            }

            init();
        })();
    </script>
