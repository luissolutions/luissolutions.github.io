<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Radar Job Reference</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../assets/css/app-styles.css" />
    <script type="module" src="../apps/assets/js/login.js" defer></script>
    <script src="../apps/assets/js/search.js" defer></script>

    <style>
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }

        .product {
            border: 1px solid #ccc;
            padding: 1rem;
            text-align: center;
            border-radius: 12px;
            background-color: var(--secondaryBackgroundColor);
        }

        .product img {
            max-width: 100%;
            max-height: 180px;
            object-fit: contain;
            border-radius: 10px;
        }

        /* --- Top nav links bar --- */
        .topnav {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 255, 255, .92);
            backdrop-filter: blur(8px);
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 10px 12px;
            margin-bottom: 18px;
        }

        .topnav-row {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .nav-title {
            font-weight: 700;
            white-space: nowrap;
        }

        .linkbar {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 0;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: none;
        }

        .linkbar::-webkit-scrollbar {
            display: none;
        }

        .nav-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border: 1px solid #ccc;
            text-decoration: none;
            font-size: .92rem;
            white-space: nowrap;
            max-width: 260px;
            overflow: hidden;
            text-overflow: ellipsis;
            color: inherit;
            flex: 0 0 auto;
            border-radius: 999px;
        }

        /* overflow dropdown */
        .more-wrap {
            position: relative;
            flex: 0 0 auto;
        }

        .more-menu {
            position: absolute;
            background: var(--backgroundColor, #fff);
            right: 0;
            top: calc(100% + 8px);
            min-width: 240px;
            max-width: 360px;
            border: 1px solid #ddd;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .12);
            padding: 6px;
            display: none;
        }

        .more-menu.open {
            display: block;
        }

        .more-item {
            display: block;
            padding: 10px 10px;
            border-radius: 10px;
            text-decoration: none;
            color: inherit;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .more-item:hover {
            background: rgba(0, 0, 0, .06);
        }

        .hidden {
            display: none !important;
        }

        /* Tools toolbar */

        #toolSearch,
        #categoryFilter,
        #subCategoryFilter {
            flex: 1;
            min-width: 220px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        #exportTools {
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid #ccc;
            cursor: pointer;
            white-space: nowrap;
        }

        .tool-title {
            margin: 10px 0 6px;
            font-size: 1rem;
            line-height: 1.2;
            overflow: auto;
        }

        .tool-title a {
            text-decoration: none;
        }

        .tool-title a:hover {
            text-decoration: underline;
        }

        /* Image modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            padding-top: 60px;
            left: 0;
            top: 0;
            width: 98%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.8);
        }

        .modal-content {
            display: block;
            margin: auto;
            max-width: 90%;
            max-height: 80vh;
            border-radius: 12px;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 36px;
            font-weight: bold;
            cursor: pointer;
        }

        .modal-close:hover {
            color: #ccc;
        }

        .modal:not(.hidden) {
            display: block;
        }

        .checklist-group {
            margin-bottom: 20px;
            padding: 16px;
            border: 1px solid #ccc;
            border-radius: 12px;
            background: var(--secondaryBackgroundColor);
        }

        .checklist-group h3 {
            margin-top: 0;
            margin-bottom: 10px;
        }

        .checklist-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 8px;
        }

        .checklist-item input {
            margin-top: 4px;
        }

        .checklist-item label {
            cursor: pointer;
            line-height: 1.4;
        }

        body {
            font-family: Arial;
        }

        section {
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .checkItem {
            margin: 5px 0;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input,
        textarea {
            padding: 8px;
            margin-top: 4px;
        }

        .row {
            margin-bottom: 10px;
        }

        img {
            margin-top: 10px;
            max-width: 100%;
            border-radius: 6px;
        }

        #modalOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            visibility: hidden;
        }

        #modalOverlay img {
            max-width: 90%;
            max-height: 90%;
        }

        #modalOverlay.show {
            visibility: visible;
        }

        .collapsible-header {
            cursor: pointer;
            user-select: none;
        }

        .collapsed>*:not(h2):not(h3) {
            display: none;
        }

        .collapsible-header::after {
            content: " ▼";
            float: right;
            font-size: 0.8em;
        }

        .collapsed .collapsible-header::after {
            content: " ▶";
        }

        .collapsed {
            max-height: 90px;
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>

    <header>
        <h1>Radar Job Reference</h1>

        <section id="login-section">
            <form id="login-form">
                <label for="username">Email:</label>
                <input type="email" id="username" required>
                <label for="password">Password:</label>
                <input type="password" id="password" required>
                <button type="submit">Sign in</button>
            </form>
            <button id="logout" style="display:none;">Logout</button>
        </section>
    </header>

    <!-- Links Section (nav across page with overflow dropdown) -->
    <div class="topnav">
        <div class="topnav-row">
            <div class="nav-title">🔗 Links</div>
            <div id="linkBar" class="linkbar"></div>

            <div id="moreWrap" class="more-wrap hidden">
                <button id="moreBtn" class="more-btn" type="button" aria-haspopup="menu" aria-expanded="false">
                    More ▾
                </button>
                <div id="moreMenu" class="more-menu" role="menu"></div>
            </div>
        </div>
    </div>

    <main>

        <section>
            <h2>Generate Image with Markup</h2>

            <label>Second Part: <input type="text" id="secondPart" /></label><br>

            <input type="file" id="imageInput" accept="image/*" /><br>

            <label><input type="checkbox" id="resizeCheckbox" checked /> Resize Image</label>
            <label><input type="checkbox" id="markupCheckbox" checked /> Add Markup</label><br>

            <button id="generateBtn">Generate Image</button>
            <div id="previewSection"></div>
            <button id="downloadAllBtn">Download All</button>
        </section>

        <section>
            <div>
                <label>Site Number</label>
                <input id="siteNumber" placeholder="Enter Site Number" />
            </div>
        </section>

        <section>
            <div id="app"></div>
        </section>

        <section>
            <h2>🧰 Tools List</h2>

            <div class="toolbar">
                <select id="categoryFilter">
                    <option value="">All Categories</option>
                </select>

                <select id="subCategoryFilter" disabled>
                    <option value="">All Sub-Categories</option>
                </select>

                <input id="toolSearch" type="search"
                    placeholder='Search tools… (supports: quotes, &, |, - , name:, category:, component: )' />
                <button id="exportTools">Export Tools to CSV</button>
            </div>

            <div id="toolGrid" class="product-grid"></div>
        </section>

        <section>
            <h2>Site Analysis</h2>

            <button id="compareBtn">Compare Sites</button>
            <div id="comparisonResults"></div>
        </section>

    </main>

    <div id="imgModal" class="modal hidden">
        <span id="imgModalClose" class="modal-close">&times;</span>
        <img class="modal-content" id="imgModalImg">
    </div>

    <script type="module">
        import { database, ref, get, onValue } from '../assets/js/firebase-init.js';

        // -------------------------
        // Tools
        // -------------------------
        const toolGrid = document.getElementById("toolGrid");
        const toolSearch = document.getElementById("toolSearch");
        const exportBtn = document.getElementById("exportTools");
        const categoryFilter = document.getElementById("categoryFilter");
        const subCategoryFilter = document.getElementById("subCategoryFilter");

        const allTools = [];
        let affiliateTag = "";

        const toolSearchEngine = (window.SearchEngine && window.SearchEngine.create)
            ? window.SearchEngine.create({
                fields: {
                    name: { type: 'string', resolver: r => r.name },
                    category: { type: 'string', resolver: r => r.category },
                    component: { type: 'string', resolver: r => r.component }
                },
                defaultFields: ['name', 'category', 'component'],
                caseSensitive: false
            })
            : null;

        function escapeHtml(s) {
            return String(s ?? "").replace(/[&<>"']/g, m => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[m]));
        }

        function normalizeTools(data) {
            const items = [];
            for (const cat in data) {
                for (const comp in data[cat]) {
                    for (const key in data[cat][comp]) {
                        const e = data[cat][comp][key] || {};
                        items.push({
                            name: e.part || key,
                            category: cat || "",
                            component: comp || "",
                            affiliateUrl: e.affiliateUrl || "",
                            imageUrl: e.imageUrl || `assets/img/database/${encodeURIComponent(e.part || key)}.png`
                        });
                    }
                }
            }
            return items;
        }

        function ensureTag(url) {
            try {
                if (!url) return "";
                const u = new URL(url, window.location.origin);
                if (affiliateTag) u.searchParams.set("tag", affiliateTag);
                return u.toString();
            } catch {
                return url || "";
            }
        }

        function rebuildCategoryDropdown() {
            const cats = Array.from(new Set(allTools.map(t => t.category).filter(Boolean)))
                .sort((a, b) => a.localeCompare(b));

            const current = categoryFilter.value || "";
            categoryFilter.innerHTML =
                `<option value="">All Categories</option>` +
                cats.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");

            if (cats.includes(current)) categoryFilter.value = current;
        }

        function rebuildSubCategoryDropdown() {
            const selectedCat = categoryFilter.value || "";
            const comps = Array.from(new Set(
                allTools
                    .filter(t => !selectedCat || t.category === selectedCat)
                    .map(t => t.component)
                    .filter(Boolean)
            )).sort((a, b) => a.localeCompare(b));

            const current = subCategoryFilter.value || "";

            subCategoryFilter.innerHTML =
                `<option value="">All Sub-Categories</option>` +
                comps.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");

            subCategoryFilter.disabled = comps.length === 0;

            if (comps.includes(current)) subCategoryFilter.value = current;
            else subCategoryFilter.value = "";
        }

        function applyFilters(records) {
            const cat = categoryFilter.value || "";
            const comp = subCategoryFilter.value || "";
            const q = (toolSearch.value || "").trim();

            let out = records;

            if (cat) out = out.filter(t => t.category === cat);
            if (comp) out = out.filter(t => t.component === comp);

            if (q) {
                if (toolSearchEngine) out = toolSearchEngine.filter(out, q);
                else out = out.filter(t => t.name.toLowerCase().includes(q.toLowerCase()));
            }

            return out;
        }

        function renderTools() {
            toolGrid.innerHTML = "";

            const shown = applyFilters(allTools);

            for (const t of shown) {
                const div = document.createElement("div");
                div.className = "product";

                const link = ensureTag(t.affiliateUrl);

                // name clickable if link exists
                const titleHtml = link
                    ? `<h3 class="tool-title"><a href="${link}" target="_blank" rel="noopener">${escapeHtml(t.name)}</a></h3>`
                    : `<h3 class="tool-title">${escapeHtml(t.name)}</h3>`;

                const metaHtml = `<div class="meta">${escapeHtml(t.category)}${t.component ? " • " + escapeHtml(t.component) : ""}</div>`;

                div.innerHTML = `
                    <img src="${t.imageUrl}" alt="${escapeHtml(t.name)}" />
                    ${titleHtml}
                    ${metaHtml}
                    `;

                toolGrid.appendChild(div);
            }
        }

        function refreshToolUI() {
            rebuildCategoryDropdown();
            rebuildSubCategoryDropdown();
            renderTools();
        }

        categoryFilter.addEventListener("change", () => {
            rebuildSubCategoryDropdown();
            renderTools();
        });

        subCategoryFilter.addEventListener("change", renderTools);
        toolSearch.addEventListener("input", renderTools);

        exportBtn.addEventListener("click", () => {
            const shown = applyFilters(allTools);
            const csvRows = [["Name", "Category", "Component", "Link"]];
            shown.forEach(t => {
                csvRows.push([
                    t.name,
                    t.category,
                    t.component,
                    ensureTag(t.affiliateUrl)
                ]);
            });

            const csv = csvRows
                .map(r => r.map(c => `"${String(c ?? "").replace(/"/g, '""')}"`).join(","))
                .join("\n");

            const blob = new Blob([csv], { type: "text/csv" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "radar-tools.csv";
            a.click();
            URL.revokeObjectURL(url);
        });

        get(ref(database, "public/settings/affiliateTag")).then(snap => affiliateTag = snap.val() || "");

        get(ref(database, "public/inventory")).then(snap => {
            allTools.length = 0;
            allTools.push(...normalizeTools(snap.val() || {}));
            refreshToolUI();
        });

        // -------------------------
        // Links (nav + overflow dropdown)
        // -------------------------
        const linkBar = document.getElementById("linkBar");
        const moreWrap = document.getElementById("moreWrap");
        const moreBtn = document.getElementById("moreBtn");
        const moreMenu = document.getElementById("moreMenu");

        function closeMore() {
            moreMenu.classList.remove("open");
            moreBtn.setAttribute("aria-expanded", "false");
        }

        moreBtn?.addEventListener("click", () => {
            const isOpen = moreMenu.classList.toggle("open");
            moreBtn.setAttribute("aria-expanded", isOpen ? "true" : "false");
        });

        document.addEventListener("click", (e) => {
            if (!moreWrap.contains(e.target)) closeMore();
        });

        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") closeMore();
        });

        function makeChip(link, cls = "nav-chip") {
            const a = document.createElement("a");
            a.href = link.url;
            a.target = "_blank";
            a.rel = "noopener";
            a.className = cls;
            a.title = link.title || link.url;
            a.textContent = link.title || link.url;
            return a;
        }

        function layoutLinks(links) {
            linkBar.innerHTML = "";
            moreMenu.innerHTML = "";
            closeMore();

            links.map(l => makeChip(l, "nav-chip")).forEach(ch => linkBar.appendChild(ch));

            requestAnimationFrame(() => {
                const overflow = [];
                while (linkBar.scrollWidth > linkBar.clientWidth && linkBar.children.length > 0) {
                    const last = linkBar.lastElementChild;
                    overflow.unshift({ title: last.textContent, url: last.href });
                    last.remove();
                }

                if (overflow.length) {
                    moreWrap.classList.remove("hidden");
                    overflow.forEach(l => moreMenu.appendChild(makeChip(l, "more-item")));
                } else {
                    moreWrap.classList.add("hidden");
                }
            });
        }

        let lastLinks = [];
        function relayoutSoon() {
            if (!lastLinks.length) return;
            layoutLinks(lastLinks);
            setTimeout(() => layoutLinks(lastLinks), 50);
        }
        window.addEventListener("resize", relayoutSoon);

        onValue(ref(database, "public/links"), snap => {
            const data = snap.val() || {};
            lastLinks = Object.values(data)
                .filter(l => l && l.url)
                .sort((a, b) => String(a.title || a.url).localeCompare(String(b.title || b.url)));
            relayoutSoon();
        });

        const modal = document.getElementById("imgModal");
        const modalImg = document.getElementById("imgModalImg");
        const modalClose = document.getElementById("imgModalClose");

        document.addEventListener("click", (e) => {
            if (e.target.tagName === "IMG" && e.target.closest(".product")) {
                modalImg.src = e.target.src;
                modal.classList.remove("hidden");
            }
        });

        modalClose.addEventListener("click", () => {
            modal.classList.add("hidden");
            modalImg.src = "";
        });

        modal.addEventListener("click", (e) => {
            if (e.target === modal) {
                modal.classList.add("hidden");
                modalImg.src = "";
            }
        });

        function compareSitesDetailed() {
            const sites = getAllSites();
            const results = [];

            if (sites.length < 2) return results;

            for (let i = 0; i < sites.length; i++) {
                for (let j = i + 1; j < sites.length; j++) {

                    const aSite = sites[i];
                    const bSite = sites[j];

                    const diff = {
                        siteA: aSite.site,
                        siteB: bSite.site,
                        differences: []
                    };

                    Object.keys(aSite.data.sections).forEach(sectionId => {
                        const a = aSite.data.sections[sectionId];
                        const b = bSite.data.sections[sectionId];

                        // checklist
                        if (a?.items && b?.items) {
                            a.items.forEach((_, i) => {
                                if (a.items[i].value !== b.items[i].value) {
                                    diff.differences.push(
                                        `${sectionId} item ${i + 1} differs (${a.items[i].value} vs ${b.items[i].value})`
                                    );
                                }
                            });
                        }

                        // scoring
                        if (a?.scores && b?.scores) {
                            Object.keys(a.scores).forEach(k => {
                                if (a.scores[k] !== b.scores[k]) {
                                    diff.differences.push(
                                        `${sectionId} score "${k}" differs (${a.scores[k]} vs ${b.scores[k]})`
                                    );
                                }
                            });
                        }

                        // single select
                        if (a?.selected !== b?.selected) {
                            diff.differences.push(
                                `${sectionId} selection differs (${a.selected} vs ${b.selected})`
                            );
                        }
                    });

                    results.push(diff);
                }
            }

            return results;
        }

        function getAllSites() {
            const sites = [];

            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);

                if (key.startsWith("qc_app_")) {
                    const site = key.replace("qc_app_", "");
                    const data = JSON.parse(localStorage.getItem(key));

                    sites.push({ site, data });
                }
            }

            return sites;
        }

        let config = null;
        let isLoading = false;

        function el(id) { return document.getElementById(id); }

        // ================= LOAD CONFIG =================
        async function loadConfig() {
            try {
                const res = await fetch("./assets/js/radar_checklist.json");
                config = await res.json();

                buildApp();

            } catch (err) {
                console.error("Failed to load config:", err);
                alert("Config failed to load");
            }
        }

        // LOAD ON PAGE START
        loadConfig();

        // ================= BUILD =================
        function buildApp() {
            const app = el("app");
            app.innerHTML = "";

            config.sections.forEach((section, i) => {
                const div = document.createElement("div");
                div.className = "section";

                div.innerHTML = `
                    <h2 class="collapsible-header">${section.title || "Section " + (i + 1)}</h2>
                    <div id="section_${section.id}"></div>
                `;

                const header = div.querySelector('h2');
                const key = 'section_dynamic_' + section.id;

                // load saved state
                if (localStorage.getItem(key) === 'true') {
                    div.classList.add('collapsed');
                }

                header.addEventListener('click', () => {
                    div.classList.toggle('collapsed');

                    localStorage.setItem(
                        key,
                        div.classList.contains('collapsed')
                    );
                });

                app.appendChild(div);
                renderSection(section);
            });
        }

        // ================= RENDER =================
        function renderSection(section) {
            const container = el(`section_${section.id}`);
            container.innerHTML = "";

            // CHECKLIST
            if (section.type === "checklist") {
                section.items.forEach((item, i) => {
                    const text = typeof item === "object" ? item.text : item;

                    container.innerHTML += `
                    <div class="checkItem">
                    <label>
                        <input type="checkbox" id="${section.id}_${i}">
                        ${text}
                    </label>
                    </div>
                `;
                });

                if (section.notes) {
                    container.innerHTML += `<label>Notes</label>
                              <textarea id="notes_${section.id}"></textarea>`;
                }
            }

            // FIELDS
            if (section.type === "fields") {
                section.fields.forEach(f => {
                    container.innerHTML += `
        <label>${f.label}</label>
        <input id="field_${f.id}" type="${f.type || "text"}">
      `;
                });
            }

            // COUNTER
            if (section.type === "counter") {
                section.fields.forEach(f => {
                    container.innerHTML += `
                        <label>${f.label}</label>
                        <div>
                        <input id="field_${f.id}" type="number" placeholder="Done">
                        /
                        <input id="field_${f.targetId}" type="number" placeholder="Total">
                        </div>
                    `;
                });
            }

            // MATRIX
            if (section.type === "matrix") {
                section.rows.forEach((row, r) => {
                    const rowDiv = document.createElement("div");
                    rowDiv.className = "row";

                    rowDiv.innerHTML = `<strong>${row}</strong><br>`;

                    section.columns.forEach((col, c) => {
                        rowDiv.innerHTML += `
                    <label style="display:inline-block;margin-right:10px;">
                        <input type="radio" name="${section.id}_${r}" id="${section.id}_${r}_${c}">
                        ${col}
                    </label>
                    `;
                    });

                    container.appendChild(rowDiv);
                });
            }

            // SCORING
            if (section.type === "scoring") {
                section.fields.forEach(f => {
                    container.innerHTML += `
                        <label>${f.label} (0-${f.max})</label>
                        <input id="score_${f.id}" type="number" max="${f.max}">
                    `;
                });

                container.innerHTML += `
                    <label>Total</label>
                    <input id="score_total" readonly>
                    `;
            }

            // SINGLE SELECT
            if (section.type === "singleSelect") {
                section.options.forEach((opt, i) => {
                    container.innerHTML += `
                        <label>
                        <input type="radio" name="${section.id}" id="${section.id}_${i}">
                        ${opt}
                        </label>
                    `;
                });
            }
        }

        // ================= DATA =================
        function collectData() {
            const data = { sections: {} };

            config.sections.forEach(section => {
                const sec = {};

                if (section.type === "checklist") {
                    sec.items = section.items.map((_, i) => el(`${section.id}_${i}`)?.checked);
                    if (section.notes) sec.notes = el(`notes_${section.id}`)?.value;
                }

                if (section.type === "fields") {
                    sec.fields = {};
                    section.fields.forEach(f => {
                        sec.fields[f.id] = el(`field_${f.id}`)?.value;
                    });
                }

                if (section.type === "scoring") {
                    sec.scores = {};
                    let total = 0;

                    section.fields.forEach(f => {
                        const val = Number(el(`score_${f.id}`)?.value || 0);
                        sec.scores[f.id] = val;
                        total += val;
                    });

                    sec.total = total;
                }

                if (section.type === "matrix") {
                    sec.matrix = [];

                    section.rows.forEach((_, r) => {
                        let selected = null;

                        section.columns.forEach((_, c) => {
                            if (el(`${section.id}_${r}_${c}`)?.checked) {
                                selected = c;
                            }
                        });

                        sec.matrix[r] = selected;
                    });
                }

                if (section.type === "singleSelect") {
                    sec.selected = null;

                    section.options.forEach((_, i) => {
                        if (el(`${section.id}_${i}`)?.checked) {
                            sec.selected = i;
                        }
                    });
                }

                if (section.type === "checklist") {
                    sec.items = section.items.map((item, i) => {
                        const checked = el(`${section.id}_${i}`)?.checked;

                        const isNegative = item.negative === true;

                        return {
                            checked,
                            value: isNegative
                                ? (checked ? -1 : 1)   // negative logic
                                : (checked ? 1 : 0)    // normal logic
                        };
                    });
                }

                data.sections[section.id] = sec;
            });

            return data;
        }

        // ================= APPLY =================
        function applyData(data) {
            Object.entries(data.sections).forEach(([id, sec]) => {

                if (sec.items) {
                    sec.items.forEach((v, i) => {
                        el(`${id}_${i}`).checked = v;
                    });
                }

                if (sec.notes !== undefined) {
                    el(`notes_${id}`).value = sec.notes;
                }

                if (sec.fields) {
                    Object.entries(sec.fields).forEach(([k, v]) => {
                        el(`field_${k}`).value = v;
                    });
                }

                if (sec.scores) {
                    Object.entries(sec.scores).forEach(([k, v]) => {
                        el(`score_${k}`).value = v;
                    });
                }

                if (sec.matrix) {
                    sec.matrix.forEach((c, r) => {
                        if (c !== null) {
                            const radio = el(`${id}_${r}_${c}`);
                            if (radio) radio.checked = true;
                        }
                    });
                }

                if (sec.selected !== null) {
                    const radio = el(`${id}_${sec.selected}`);
                    if (radio) radio.checked = true;
                }

            });
        }

        function showComparison() {
            const results = compareSites();

            console.table(results);
        }

        function showAveragesUI() {
            const data = calculateSiteAverages();
            const container = document.getElementById("comparisonResults");

            if (!data) {
                container.innerHTML = "<p>No sites saved</p>";
                return;
            }

            container.innerHTML = `
        <h2>📊 Site Averages</h2>
        ${Object.entries(data).map(([sectionId, sec]) => `
            <div style="margin-bottom:15px; padding:10px; border:1px solid #ccc;">
                <strong>${sectionId}</strong>

                ${sec.scores ? `
                    <div><b>Scores:</b></div>
                    <ul>
                        ${Object.entries(sec.scores).map(([k, v]) =>
                `<li>${k}: ${v}</li>`
            ).join("")}
                    </ul>
                ` : ""}

                ${sec.checklist ? `
                    <div><b>Checklist Completion:</b></div>
                    <ul>
                        ${sec.checklist.map((v, i) =>
                `<li>Item ${i + 1}: ${v}</li>`
            ).join("")}
                    </ul>
                ` : ""}

                ${sec.mostCommon ? `
                    <div><b>Most Common Selection:</b> Option ${sec.mostCommon.optionIndex}</div>
                ` : ""}
            </div>
        `).join("")}
    `;
        }
        // ================= SAVE =================
        function getStorageKey() {
            const site = el("siteNumber")?.value?.trim();
            return site ? `qc_app_${site}` : null;
        }

        el("siteNumber").addEventListener("change", () => {
            try {
                loadLocal();
            } catch { }
        });

        function saveLocal() {
            const key = getStorageKey();

            if (!key) {
                alert("Enter a site number first");
                return;
            }

            localStorage.setItem(key, JSON.stringify(collectData()));
            alert("Saved");
        }

        function loadLocal() {
            const key = getStorageKey();

            if (!key) {
                alert("Enter a site number first");
                return;
            }

            const raw = localStorage.getItem(key);

            if (!raw) {
                alert("No save found for this site");
                return;
            }

            const data = JSON.parse(raw);

            isLoading = true;

            setTimeout(() => {
                applyData(data);
                isLoading = false;
            }, 50);
        }

        function calculateSiteAverages() {
            const sites = getAllSites();
            if (!sites.length) return null;

            const totals = {};
            const counts = sites.length;

            sites.forEach(site => {
                const sections = site.data.sections || {};

                Object.entries(sections).forEach(([sectionId, sec]) => {

                    if (!totals[sectionId]) {
                        totals[sectionId] = {
                            scores: {},
                            checklist: [],
                            selected: {}
                        };
                    }

                    // ---- SCORING ----
                    if (sec.scores) {
                        Object.entries(sec.scores).forEach(([k, v]) => {
                            totals[sectionId].scores[k] = (totals[sectionId].scores[k] || 0) + Number(v || 0);
                        });
                    }

                    // ---- CHECKLIST ----
                    if (sec.items) {
                        sec.items.forEach((item, i) => {
                            if (!totals[sectionId].checklist[i]) {
                                totals[sectionId].checklist[i] = 0;
                            }
                            totals[sectionId].checklist[i] += item.value;
                        });
                    }

                    // ---- SINGLE SELECT ----
                    if (sec.selected !== null && sec.selected !== undefined) {
                        totals[sectionId].selected[sec.selected] =
                            (totals[sectionId].selected[sec.selected] || 0) + 1;
                    }

                });
            });

            // ---- CONVERT TO AVERAGES ----
            const averages = {};

            Object.entries(totals).forEach(([sectionId, data]) => {
                averages[sectionId] = {};

                // scores avg
                if (Object.keys(data.scores).length) {
                    averages[sectionId].scores = {};
                    Object.entries(data.scores).forEach(([k, v]) => {
                        averages[sectionId].scores[k] = (v / counts).toFixed(2);
                    });
                }

                // checklist avg (percentage)
                if (data.checklist.length) {
                    averages[sectionId].checklist = data.checklist.map(v =>
                        ((v / counts) * 100).toFixed(1) + "%"
                    );
                }

                // most selected
                if (Object.keys(data.selected).length) {
                    const top = Object.entries(data.selected)
                        .sort((a, b) => b[1] - a[1])[0];

                    averages[sectionId].mostCommon = {
                        optionIndex: top[0],
                        count: top[1]
                    };
                }
            });

            return averages;
        }
        // ================= AUTOSAVE =================
        let t;

        document.addEventListener("input", (e) => {
            if (isLoading) return;
            if (e.target.id === "siteNumber") return;

            const key = getStorageKey();
            if (!key) return;

            clearTimeout(t);
            t = setTimeout(() => {
                localStorage.setItem(key, JSON.stringify(collectData()));
            }, 300);
        });

        document.addEventListener("change", (e) => {
            if (isLoading) return;

            const key = getStorageKey();
            if (!key) return;

            localStorage.setItem(key, JSON.stringify(collectData()));
        });

        document.getElementById("compareBtn").addEventListener("click", showAveragesUI);

        // ================= SCORE AUTO UPDATE =================
        document.addEventListener("input", () => {
            if (!config) return;

            config.sections.forEach(section => {
                if (section.type === "scoring") {
                    let total = 0;
                    section.fields.forEach(f => {
                        total += Number(el(`score_${f.id}`)?.value || 0);
                    });
                    el("score_total").value = total;
                }
            });
        });

        const allImages = [];

        const resizeImage = (file, maxWidth) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => {
                const img = new Image();
                img.onload = () => {
                    let [w, h] = [img.width, img.height];
                    if (w > maxWidth) {
                        h *= maxWidth / w;
                        w = maxWidth;
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = w;
                    canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    canvas.toBlob(blob => blob ? resolve(blob) : reject("Resize failed"), file.type);
                };
                img.src = reader.result;
            };
            reader.readAsDataURL(file);
        });

        const addTextToImage = (blob, text) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height + 100;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    ctx.fillStyle = 'white';
                    ctx.font = '80px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(text, canvas.width / 2, canvas.height - 20);
                    canvas.toBlob(blob => blob ? resolve(blob) : reject("Markup failed"), 'image/jpeg');
                };
                img.src = reader.result;
            };
            reader.readAsDataURL(blob);
        });

        document.getElementById('generateBtn').addEventListener('click', async () => {
            const first = document.getElementById('siteNumber').value.trim();
            const second = document.getElementById('secondPart').value.trim();
            const file = document.getElementById('imageInput').files[0];
            const doResize = document.getElementById('resizeCheckbox').checked;
            const doMarkup = document.getElementById('markupCheckbox').checked;

            if (!second || !file) {
                alert("Enter site number and second part, and choose a file.");
                return;
            }

            try {
                let blob = file;
                if (doResize) {
                    blob = await resizeImage(blob, 2048);
                }

                const label = `${first}-${second}`;
                if (doMarkup) {
                    blob = await addTextToImage(blob, label);
                }

                allImages.push({ blob, label });

                const url = URL.createObjectURL(blob);
                const img = new Image();
                img.src = url;
                img.alt = label;
                img.style.maxWidth = '200px';
                img.style.cursor = 'pointer';
                img.addEventListener('click', () => {
                    document.getElementById('modalImage').src = url;
                    document.getElementById('modalOverlay').classList.add('show');
                });

                const wrapper = document.createElement('div');
                wrapper.style.marginBottom = '30px';
                wrapper.innerHTML = `<strong>${label}</strong><br>`;
                wrapper.appendChild(img);

                const downloadBtn = document.createElement('a');
                downloadBtn.href = url;
                downloadBtn.download = `${label}.jpg`;
                downloadBtn.textContent = 'Download Image';
                downloadBtn.style.display = 'inline-block';
                downloadBtn.style.marginTop = '10px';
                downloadBtn.style.fontSize = '18px';

                wrapper.appendChild(document.createElement('br'));
                wrapper.appendChild(downloadBtn);

                document.getElementById('previewSection').appendChild(wrapper);
            } catch (err) {
                alert("Error generating image: " + err);
                console.error(err);
            }
        });

        document.getElementById('downloadAllBtn').addEventListener('click', () => {
            if (allImages.length === 0) {
                alert("No images to download.");
                return;
            }

            allImages.forEach(({ blob, label }) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${label}.jpg`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });
        });


        window.addEventListener('beforeunload', (e) => {
            if (allImages.length > 0) {
                e.preventDefault();
                e.returnValue = 'If you reload, all images will be lost.';
            }
        });

        document.querySelectorAll('main > section').forEach(section => {
            const header = section.querySelector('h2');

            if (!header) return;

            header.classList.add('collapsible-header');

            const key = 'section_' + (section.dataset.id || header.innerText);

            // ✅ Load saved state
            if (localStorage.getItem(key) === 'true') {
                section.classList.add('collapsed');
            }

            // ✅ Toggle + save
            header.addEventListener('click', () => {
                section.classList.toggle('collapsed');

                localStorage.setItem(
                    key,
                    section.classList.contains('collapsed')
                );
            });
        });

    </script>

</body>

</html>
