                        `Night ${night.night}`,
                        `${night.done}/${night.total} (${night.pct}%)`
                    ]);
                });

                rows.push(['Overall Completion', `${production.overall}%`]);
            }

            return rows;
        }

        function exportCertificationCSV() {
            downloadCSV(buildReportCSVRows(), 'certification_report.csv');
        }

        function buildQCChecklistCSV() {
            const data = collectData();
            const rows = [['Section', 'Field', 'Value']];

            Object.entries(data.sections || {}).forEach(([sectionId, section]) => {
                if (section.fields) {
                    Object.entries(section.fields).forEach(([key, value]) => {
                        const normalized =
                            value && typeof value === 'object' && 'value' in value
                                ? value.value
                                : value;

                        rows.push([sectionId, key, normalizeText(normalized)]);
                    });
                }

                if (Array.isArray(section.items)) {
                    section.items.forEach((item) => {
                        if (item.label) {
                            rows.push([
                                sectionId,
                                item.label,
                                item.checked ?? item.value ?? ''
                            ]);
                        }

                        if (Array.isArray(item.days)) {
                            item.days.forEach((dayVal, dayIndex) => {
                                rows.push([
                                    sectionId,
                                    `${item.label} (Night ${dayIndex + 1})`,
                                    dayVal
                                ]);
                            });
                        }
                    });
                }

                if (section.scores) {
                    Object.entries(section.scores).forEach(([key, value]) => {
                        rows.push([sectionId, key, value]);
                    });

                    rows.push([sectionId, 'Total Score', section.total || 0]);
                }

                if (section.notes) {
                    rows.push([sectionId, 'Notes', normalizeText(section.notes)]);
                }
            });

            return rows;
        }

        function buildQCChecklistBlob() {
            return new Blob([rowsToCsv(buildQCChecklistCSV())], { type: 'text/csv' });
        }

        async function uploadReportsToOneDrive() {
            if (!state.currentProject) {
                alert('No project selected');
                return;
            }

            const site = sanitize(state.currentProjectName || state.currentProject);

            await ensureFolderExists(site);
            await ensureFolderExists(`${site}/Data`);

            const reportText = generateCertificationReport();
            const reportCsv = rowsToCsv(buildReportCSVRows());

            await graphFetch(graphContentUrl(`${site}/Data/report.txt`), {
                method: 'PUT',
                headers: { 'Content-Type': 'text/plain' },
                body: reportText
            });

            await graphFetch(graphContentUrl(`${site}/Data/report.csv`), {
                method: 'PUT',
                headers: { 'Content-Type': 'text/csv' },
                body: reportCsv
            });

            alert('✅ QC uploaded to site folder');
        }

        async function uploadQCChecklistToOneDrive() {
            if (!requireEditAccess()) return;
            if (!state.currentProject) {
                alert('No project selected');
                return;
            }

            const site = sanitize(state.currentProjectName || state.currentProject);
            const path = `Jobs/Radar/${site}`;
            const blob = buildQCChecklistBlob();

            try {
                await uploadToOneDrive(path, blob, 'qc_checklist.csv', 'text/csv');
                alert('QC Checklist uploaded ✅');
            } catch (err) {
                console.error(err);
                alert('QC upload failed.');
            }
        }

        async function uploadAllImagesToOneDrive() {
            if (!requireEditAccess()) return;
            if (!state.currentProject) {
                alert('No project selected');
                return;
            }

            const site = sanitize(state.currentProjectName || state.currentProject);
            const basePath = `JobPhotos/${site}`;

            const token = localStorage.getItem('accessToken');
            if (!token) {
                alert('Not logged into Microsoft');
                return;
            }

            let totalUploaded = 0;

            try {
                const modes = [
                    { mode: 'sensors', subFolder: 'sensors' },
                    { mode: 'deliverables', subFolder: 'deliverables' }
                ];

                for (const { mode, subFolder } of modes) {
                    const sourcePath = getImagesPath(mode);
                    const targetPath = `${basePath}/${subFolder}`;

                    let items = [];
                    try {
                        items = await listStorageItems(sourcePath);
                    } catch {
                        continue;
                    }

                    for (const item of items) {
                        try {
                            const response = await fetch(item.url);
                            const blob = await response.blob();

                            await fetch(
                                `https://graph.microsoft.com/v1.0/me/drive/root:/${targetPath}/${item.name}:/content`,
                                {
                                    method: 'PUT',
                                    headers: {
                                        Authorization: `Bearer ${token}`,
                                        'Content-Type': blob.type || 'image/jpeg'
                                    },
                                    body: blob
                                }
                            );

                            totalUploaded += 1;
                            console.log(`Uploaded (${subFolder}): ${item.name}`);
                        } catch (err) {
                            console.error(`Failed (${subFolder}): ${item.name}`, err);
                        }
                    }
                }

                alert(`Uploaded ${totalUploaded} images to OneDrive ✅`);
            } catch (err) {
                console.error(err);
                alert('Image upload failed.');
            }
        }

        /* =========================
           UI EVENTS
        ========================= */

        function initCollapsibles() {
            $$('.collapsible-section').forEach((section) => {
                const header = section.querySelector('.collapsible-header');
                if (!header || !section.id) return;

                const saved = localStorage.getItem(`collapse:${section.id}`);
                if (saved === 'true') {
                    section.classList.add('collapsed');
                }

                if (header.dataset.bound) return;
                header.dataset.bound = 'true';

                header.addEventListener('click', () => {
                    section.classList.toggle('collapsed');
                    localStorage.setItem(
                        `collapse:${section.id}`,
                        section.classList.contains('collapsed')
                    );
                });
            });
        }

        function initModalEvents() {
            $('closeModalButton')?.addEventListener('click', closeModal);

            $('modal')?.addEventListener('click', (event) => {
                if (event.target === $('modal')) closeModal();
            });

            $('modalPrev')?.addEventListener('click', () => {
                if (!state.modalItems.length) return;
                showModalByIndex((state.modalIndex - 1 + state.modalItems.length) % state.modalItems.length);
            });

            $('modalNext')?.addEventListener('click', () => {
                if (!state.modalItems.length) return;
                showModalByIndex((state.modalIndex + 1) % state.modalItems.length);
            });

            $('downloadButton')?.addEventListener('click', () => {
                const item = state.modalItems[state.modalIndex];
                if (!item) return;

                const anchor = document.createElement('a');
                anchor.href = item.url;
                anchor.download = item.name;
                anchor.click();
            });

            $('deleteButton')?.addEventListener('click', deleteCurrentModalImage);

            $('imageDropdown')?.addEventListener('change', () => {
                const index = Number($('imageDropdown')?.value);
                if (!Number.isNaN(index)) {
                    showModalByIndex(index);
                }
            });
        }

        function initProjectEvents() {
            $('projectList')?.addEventListener('change', async () => {
                const id = $('projectList')?.value;
                if (id) await loadProject(id);
            });

            $('projectSearch')?.addEventListener('input', filterProjects);

            $('sensorCount')?.addEventListener('input', async () => {
                state.expectedSensors = Math.max(0, Number($('sensorCount')?.value) || 0);

                populateSensorDropdown(state.expectedSensors);
                syncSensorTotalToQC();
                updateMissingImages();

                debouncedSaveProjectFields();
            });

            $('saveProject')?.addEventListener('click', saveProjectBasics);

            $('project')?.addEventListener('keydown', async (event) => {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    await loadOrCreateProject();
                }
            });
        }

        function initFeatureEvents() {
            $('saveSensorMeta')?.addEventListener('click', saveSensorMeta);
            $('exportCSV')?.addEventListener('click', exportSensorMetaCsv);

            $('sensorMetaNumberDropdown')?.addEventListener('change', () => {
                loadSensorMeta($('sensorMetaNumberDropdown')?.value);
            });

            $('sensorNumberDropdown')?.addEventListener('change', async () => {
                const sensorNum = $('sensorNumberDropdown')?.value;
                if (!sensorNum) return;

                const data = await readProjectPath(`sensorMeta/${sensorNum}`) || {};
                if (data.serial && $('serialNumber')) {
                    $('serialNumber').value = data.serial;
                }
            });

            $$('input[name="viewMode"]').forEach((radio) => {
                radio.addEventListener('change', async () => {
                    updateImageModeUI();
                    await updateGallery();
                });
            });

            $('missingList')?.addEventListener('click', (event) => {
                const li = event.target.closest('li[data-sensor]');
                if (li) handlePickMissing(li.dataset.sensor);
            });

            $('missingList')?.addEventListener('keydown', (event) => {
                const li = event.target.closest('li[data-sensor]');
                if (li && (event.key === 'Enter' || event.key === ' ')) {
                    event.preventDefault();
                    handlePickMissing(li.dataset.sensor);
                }
            });

            $('uploadImage')?.addEventListener('click', uploadSensor);
            $('uploadDeliverableImage')?.addEventListener('click', uploadDeliverableImage);

            $('compareBtn')?.addEventListener('click', () => {
                const report = generateCertificationReport();
                $('comparisonResults').innerHTML =
                    `<pre style="white-space: pre-wrap;">${escapeHtml(report || 'No report available')}</pre>`;
            });

            $('exportReportBtn')?.addEventListener('click', exportCertificationCSV);

            $$('input[name="checklistType"]').forEach((radio) => {
                radio.addEventListener('change', async () => {
                    stopAutosaveLoop();

                    state.currentChecklistType = radio.value;
                    state.qcConfig = null;

                    await initQCConfig(true);
                    await loadQCChecklist();

                    startAutosaveLoop();
                });
            });

            $('uploadQCBtn')?.addEventListener('click', uploadReportsToOneDrive);
            $('uploadImagesToOneDriveBtn')?.addEventListener('click', uploadAllImagesToOneDrive);

            $('loginButton')?.addEventListener('click', loginToMicrosoft);
            $('logoutButton')?.addEventListener('click', logoutFromMicrosoft);
        }

        /* =========================
           APP INIT
        ========================= */

        function bindWindowEvents() {
            window.addEventListener('storage', (event) => {
                if (event.key === 'accessToken') {
                    refreshAccessState();
                }
            });

            window.addEventListener('beforeunload', () => {
                if (state.hasUnsavedQCChanges) {
                    console.warn('Page closing with unsaved QC changes.');
                }
            });
        }

        async function initApp() {
            initMicrosoftAuth();
            initModalEvents();
            initProjectEvents();
            initFeatureEvents();
            updateImageModeUI();
            initCollapsibles();
            bindWindowEvents();

            await refreshAccessState();

            const lastProject = localStorage.getItem('lastProject');
            if (lastProject) {
                await loadProject(lastProject).catch(() => { });
            }

            startAutosaveLoop();
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await initApp();
        });

        export function getAccessToken() {
            return localStorage.getItem('accessToken');
        }
    </script>
