<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Radar App - OneDrive (Cleaned)</title>
    <script src="../apps/assets/js/sidebar.js"></script>
    <link rel="stylesheet" href="./assets/css/radartools.css" />
</head>

<body>
    <header>
        <h1><img src="assets/img/telaid_logo.png" alt=""> Radar</h1>
        <div class="ms">
            <br>
            <button id="loginButton">Login to MS</button>
            <button id="logoutButton">Logout of MS</button>
            <p id="loginStatus">Login status...</p>
        </div>
    </header>

    <main id="mainApp">
        <section>
            <label>Project ID:
                <input type="text" id="project" />
            </label>

            <label>Total Devices:
                <input type="number" id="sensorCount" min="1" />
            </label>

            <button id="saveProject" data-requires-edit style="display:none;">Save New Project</button>

            <label>
                Search Projects:
                <input type="text" id="projectSearch" placeholder="Type customer or project name…" />
            </label>

            <label>Existing Projects:
                <select id="projectList">
                    <option value="">-- Choose a project --</option>
                </select>
            </label>
        </section>

        <section class="collapsible-section" id="qcChecklistSection">
            <h2 class="collapsible-header">📋 QC Checklist</h2>
            <div id="checklistSelector">
                <label><input type="radio" name="checklistType" value="radar" checked> Radar</label>
                <label><input type="radio" name="checklistType" value="remote"> Remote</label>
                <label><input type="radio" name="checklistType" value="audit"> Audit</label>
            </div>
            <div id="app">Loading checklist...</div>
        </section>

        <section class="collapsible-section" id="site-analysis">
            <h2 class="collapsible-header">📋 Site Analysis</h2>
            <button id="compareBtn" type="button">Generate Report</button>
            <button id="exportReportBtn" type="button">Export Report CSV</button>
            <button id="uploadQCBtn">Upload QC Checklist</button>
            <div id="comparisonResults"></div>
        </section>

        <section class="collapsible-section" id="sensor-meta">
            <h2 class="collapsible-header">📡 Device Details</h2>

            <label>Device #:
                <select id="sensorMetaNumberDropdown">
                    <option value="">Select a Device</option>
                </select>
            </label>
            <br>

            <label>Serial #:
                <input type="text" id="sensorMetaSerial" />
            </label>
            <br>

            <label>Optional Info 1:
                <input type="text" id="sensorMetaM1" placeholder="Optional" />
            </label>
            <br>

            <label>Optional Info 2:
                <input type="text" id="sensorMetaM2" placeholder="Optional" />
            </label>
            <br>

            <label>Optional Info 3:
                <input type="text" id="sensorMetaM3" placeholder="Optional" />
            </label>
            <br>

            <button id="saveSensorMeta" data-requires-edit>Save Device Info</button>
            <button id="exportCSV">Export Device Data</button>
            <div><br></div>

            <section id="radio-group">
                <h3>🖼️ Device Images</h3>

                <label><input type="radio" name="viewMode" value="sensors" checked /> Device Images</label>
                <label><input type="radio" name="viewMode" value="deliverables" /> Other Deliverables</label>

                <div id="sensorUploadSection">
                    <h3>Upload Device Image Below</h3>
                    <input type="file" id="sensorImage" accept="image/*" class="file-input" />
                    <label for="sensorImage" class="file-btn">📷 Take/Choose Picture</label>
                    <br>

                    <label>Device #:
                        <select id="sensorNumberDropdown">
                            <option value="">Select a Device</option>
                        </select>
                    </label>

                    <label>Serial:
                        <input type="text" id="serialNumber" />
                    </label>
                    <br>

                    <label>
                        <input type="checkbox" id="skipMarkupCheckbox" />
                        No Markup
                    </label>

                    <button id="uploadImage" data-requires-edit>Upload</button>
                </div>

                <div id="deliverableUploadSection" style="display:none;">
                    <h3>Upload Deliverable Image</h3>
                    <input type="file" id="fileUploader" accept="image/*" class="file-input" />
                    <label for="fileUploader" class="file-btn">📷 Take/Choose Picture</label>
                    <br>

                    <label>Name:
                        <input type="text" id="imageNameInput" />
                    </label>
                    <br>

                    <label>Markup:
                        <input type="text" id="markupTextInput" />
                    </label>

                    <button id="uploadDeliverableImage" data-requires-edit>Upload Image</button>
                </div>

                <div>
                    <h3>Missing Images</h3>
                    <ul id="missingList"></ul>
                </div>

                <div>
                    <h3>Gallery</h3>
                    <label for="imageDropdown">Select an Image:</label>
                    <select id="imageDropdown">
                        <option value="">- Select an Image -</option>
                    </select>
                    <div id="gallery"></div>
                </div>
                <button id="uploadImagesToOneDriveBtn" data-requires-edit>Upload Images to OneDrive</button>
            </section>
        </section>

        <div id="modal">
            <div id="modalContent">
                <img id="modalImage" src="" alt="Large View" />
                <p id="modalFileName"></p>

                <div class="modal-nav">
                    <button id="modalPrev">◀ Previous</button>
                    <button id="modalNext">Next ▶</button>
                </div>

                <button id="downloadButton">Download</button>
                <button class="clear-button" id="deleteButton" data-requires-edit>Delete</button>
                <button id="closeModalButton">Close</button>
            </div>
        </div>
    </main>

    <script type="module">
        import {
            accessToken,
            getUserInfo,
            isLoggedIn,
            loginToMicrosoft,
            logoutFromMicrosoft,
            initMicrosoftAuth
        } from './assets/js/radar-microsoftAuth.js';

        /* =========================
           CONFIG
        ========================= */

        const CONFIG = {
            MAX_NIGHTS: 10,
            DEFAULT_NIGHTS: 5,
            ADMIN_PASSWORD: 'telaidadmin',
            IMAGE_MAX_WIDTH: 2048,
            SENSOR_IMAGE_COUNT_REQUIRED: 2,
            ONEDRIVE_APP_ROOT: 'RadarApp',
            SHARED_DRIVE_ID: 'b!3mJ2DZSHdkmBrOccfkDkBt3Eklx5UvdMlDz0bmgGRktCiH2Pzkr5TbiD0DhegSHo',
            ADMIN_USERS: [],
            SYNC_POLL_MS: 3000
        };

        /* =========================
           HELPERS
        ========================= */

        const $ = (id) => document.getElementById(id);
        const $$ = (selector, root = document) => Array.from(root.querySelectorAll(selector));

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, (m) => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[m]));
        }

        function sanitize(str) {
            return String(str || '').trim().replace(/\s+/g, '_').replace(/[\\/:*?"<>|#%{}~&]/g, '_');
        }

        function normalizeText(value) {
            return String(value ?? '').replace(/[\r\n]+/g, ' ').trim();
        }

        function normKey(value) {
            return String(value || '').trim().toLowerCase();
        }

        function createEl(tag, options = {}) {
            const el = document.createElement(tag);
            if (options.className) el.className = options.className;
            if (options.text != null) el.textContent = options.text;
            if (options.html != null) el.innerHTML = options.html;
            if (options.attrs) {
                Object.entries(options.attrs).forEach(([key, value]) => {
                    if (value != null) el.setAttribute(key, value);
                });
            }
            return el;
        }

        function debounce(fn, delay = 250) {
            let timer = null;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => fn(...args), delay);
            };
        }

        function getByPath(obj, path) {
            return String(path || '')
                .split('/')
                .filter(Boolean)
                .reduce((acc, part) => (acc == null ? undefined : acc[part]), obj);
        }

        function setByPath(obj, path, value) {
            const parts = String(path || '').split('/').filter(Boolean);
            if (!parts.length) return value;
            let cursor = obj;
            for (let i = 0; i < parts.length - 1; i += 1) {
                const part = parts[i];
                if (!cursor[part] || typeof cursor[part] !== 'object' || Array.isArray(cursor[part])) {
                    cursor[part] = {};
                }
                cursor = cursor[part];
            }
            cursor[parts[parts.length - 1]] = value;
            return obj;
        }

        function mergeObjects(base, patchValue) {
            if (patchValue == null || typeof patchValue !== 'object' || Array.isArray(patchValue)) {
                return patchValue;
            }
            const next = (base && typeof base === 'object' && !Array.isArray(base)) ? { ...base } : {};
            Object.entries(patchValue).forEach(([key, value]) => {
                next[key] = mergeObjects(next[key], value);
            });
            return next;
        }

        function rowsToCsv(rows) {
            return rows.map((row) =>
                row.map((cell) => {
                    const text = String(cell ?? '');
                    return /[",\n]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
                }).join(',')
            ).join('\n');
        }

        function downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        }

        function downloadCSV(rows, filename) {
            downloadBlob(new Blob([rowsToCsv(rows)], { type: 'text/csv;charset=utf-8' }), filename);
        }

        function normalizeNightCount(value, fallback = 1) {
            const parsed = parseInt(value, 10);
            if (Number.isNaN(parsed) || parsed <= 0) return fallback;
            return Math.min(parsed, CONFIG.MAX_NIGHTS);
        }

        function getFavorites() {
            try {
                return JSON.parse(localStorage.getItem('favorites') || '{}');
            } catch {
                return {};
            }
        }

        function setFavorites(favorites) {
            localStorage.setItem('favorites', JSON.stringify(favorites));
        }

        /* =========================
           STATE
        ========================= */

        const state = {
            currentUser: null,
            currentProject: '',
            currentProjectName: '',
            currentCustomerName: '',
            expectedSensors: 0,
            allProjects: [],
            modalItems: [],
            modalIndex: 0,
            qcConfig: null,
            currentChecklistType: 'radar',
            currentProjectData: {},
            saveQueue: Promise.resolve(),
            isLoadingProject: false,
            isUploading: false,
            isApplyingRemoteUpdate: false,
            lastLoadedHash: '',
            lastSavedHash: '',
            syncInterval: null,
            listeners: [],
            uiListenerBound: false
        };

        /* =========================
           REACTIVE EVENTS (Firebase-like)
        ========================= */

        function onValue(callback) {
            state.listeners.push(callback);
        }

        function notifyListeners(data) {
            state.listeners.forEach((callback) => {
                try {
                    callback(data);
                } catch (err) {
                    console.error('Listener failed:', err);
                }
            });
        }

        /* =========================
           GRAPH / ONEDRIVE
        ========================= */

        function getDrivePrefix() {
            return CONFIG.SHARED_DRIVE_ID ? `/drives/${CONFIG.SHARED_DRIVE_ID}` : '/me/drive';
        }

        function encodeGraphPath(path) {
            return path.split('/').filter(Boolean).map(encodeURIComponent).join('/');
        }

        function appRelativePath(path = '') {
            const root = CONFIG.ONEDRIVE_APP_ROOT.replace(/^\/|\/$/g, '');
            const cleaned = String(path || '').replace(/^\/|\/$/g, '');
            return cleaned ? `${root}/${cleaned}` : root;
        }

        function graphContentUrl(path) {
            return `https://graph.microsoft.com/v1.0${getDrivePrefix()}/root:/${encodeGraphPath(appRelativePath(path))}:/content`;
        }

        function graphItemUrl(path) {
            return `https://graph.microsoft.com/v1.0${getDrivePrefix()}/root:/${encodeGraphPath(appRelativePath(path))}`;
        }

        function graphChildrenUrl(path) {
            return `https://graph.microsoft.com/v1.0${getDrivePrefix()}/root:/${encodeGraphPath(appRelativePath(path))}:/children`;
        }

        function getStoredToken() {
            return accessToken || localStorage.getItem('accessToken');
        }

        async function graphFetch(url, options = {}) {
            const token = getStoredToken();
            if (!token) throw new Error('Not authenticated with Microsoft');
            const response = await fetch(url, {
                ...options,
                headers: {
                    Authorization: `Bearer ${token}`,
                    ...(options.headers || {})
                }
            });
            if (!response.ok) {
                const text = await response.text().catch(() => '');
                throw new Error(`Graph request failed (${response.status}): ${text || response.statusText}`);
            }
            return response;
        }

        async function graphFetchJson(url, options = {}) {
            const response = await graphFetch(url, options);
            return response.status === 204 ? null : response.json();
        }

        async function graphUploadFile(path, fileBlob, contentType = 'application/octet-stream') {
            await graphFetch(graphContentUrl(path), {
                method: 'PUT',
                headers: { 'Content-Type': contentType },
                body: fileBlob
            });
        }

        async function graphDeletePath(path) {
            try {
                await graphFetch(graphItemUrl(path), { method: 'DELETE' });
            } catch (err) {
                if (!/404|itemNotFound/i.test(String(err))) throw err;
            }
        }

        async function graphListFolder(path) {
            try {
                const data = await graphFetchJson(graphChildrenUrl(path));
                return data?.value || [];
            } catch (err) {
                if (/404|itemNotFound/i.test(String(err))) return [];
                throw err;
            }
        }

        async function ensureFolderExists(path) {
            const parts = String(path || '').split('/').filter(Boolean);
            let current = '';
            for (const part of parts) {
                current += `/${part}`;
                try {
                    await graphFetch(graphItemUrl(current));
                } catch (err) {
                    if (!/404|itemNotFound/i.test(String(err))) throw err;
                    const parentPath = current.substring(0, current.lastIndexOf('/')) || '';
                    await graphFetch(graphChildrenUrl(parentPath), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name: part,
                            folder: {},
                            '@microsoft.graph.conflictBehavior': 'replace'
                        })
                    });
                }
            }
        }

        async function listStorageItems(path) {
            const items = await graphListFolder(path);
            return items.filter((item) => !!item.file).map((item) => ({
                id: item.id,
                name: item.name,
                fullPath: `${path}/${item.name}`,
                url: item['@microsoft.graph.downloadUrl'] || item.webUrl,
                ref: item
            }));
        }

        async function safeListStorageItems(path) {
            await ensureFolderExists(path);
            return listStorageItems(path);
        }

        async function getUniqueFilename(folderPath, filename) {
            const existing = await listStorageItems(folderPath).catch(() => []);
            const names = new Set(existing.map((item) => item.name));
            const dot = filename.lastIndexOf('.');
            const base = dot >= 0 ? filename.slice(0, dot) : filename;
            const ext = dot >= 0 ? filename.slice(dot) : '';
            let attempt = `${base}${ext}`;
            let i = 1;
            while (names.has(attempt)) {
                attempt = `${base}_${i}${ext}`;
                i += 1;
            }
            return attempt;
        }

        /* =========================
           PROJECT PATHS / LOCAL CACHE
        ========================= */

        function getProjectFolder() {
            return sanitize(state.currentProjectName || state.currentProject || 'unknown');
        }

        function getProjectDataPath() {
            return `${getProjectFolder()}/data.json`;
        }

        function getQCPath() {
            return `${getProjectFolder()}/Data/qc.json`;
        }

        function getImagesPath(mode = 'sensors') {
            const base = getProjectFolder();
            if (mode === 'sensors') return `${base}/Sensors`;
            if (mode === 'deliverables') return `${base}/Deliverables`;
            return `${base}/Other`;
        }

        function localKey() {
            return `project_${state.currentProject}`;
        }

        function saveToLocal(db) {
            if (!state.currentProject) return;
            localStorage.setItem(localKey(), JSON.stringify(db));
        }

        function loadFromLocal() {
            try {
                return JSON.parse(localStorage.getItem(localKey()) || '{}');
            } catch {
                return {};
            }
        }

        async function loadProjectDB() {
            const local = loadFromLocal();
            if (local && Object.keys(local).length && local.id === state.currentProject) {
                return local;
            }
            try {
                const response = await graphFetch(graphContentUrl(getProjectDataPath()));
                const data = await response.json();
                saveToLocal(data);
                return data;
            } catch (err) {
                if (/404/i.test(String(err))) {
                    const empty = {
                        id: state.currentProject,
                        project: state.currentProjectName || '',
                        customerName: state.currentCustomerName || '',
                        sensorCount: state.expectedSensors || 0,
                        sensorMeta: {},
                        qcData: { sections: {} },
                        createdAt: Date.now(),
                        updatedAt: Date.now()
                    };
                    saveToLocal(empty);
                    return empty;
                }
                if (local && Object.keys(local).length) return local;
                throw err;
            }
        }

        async function saveProjectDB(db) {
            await graphFetch(graphContentUrl(getProjectDataPath()), {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(db, null, 2)
            });

            if (db.qcData) {
                try {
                    await ensureFolderExists(`${getProjectFolder()}/Data`);
                    await graphFetch(graphContentUrl(getQCPath()), {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(db.qcData, null, 2)
                    });
                } catch (err) {
                    console.warn('QC cloud save failed:', err);
                }
            }
        }

        async function readProjectPath(path = '') {
            const db = await loadProjectDB();
            return path ? getByPath(db, path) : db;
        }

        function queueSave(work) {
            state.saveQueue = state.saveQueue.catch(() => { }).then(work);
            return state.saveQueue;
        }

        async function ensureProjectFolders() {
            const folder = getProjectFolder();
            await ensureFolderExists(folder);
            await ensureFolderExists(`${folder}/Sensors`);
            await ensureFolderExists(`${folder}/Deliverables`);
            await ensureFolderExists(`${folder}/Data`);
        }

        /* =========================
           ACCESS / AUTH
        ========================= */

        function isAdminUser(user) {
            const principal = (user?.userPrincipalName || user?.mail || '').toLowerCase();
            const admins = (CONFIG.ADMIN_USERS || []).map((item) => String(item).toLowerCase());
            return !admins.length || admins.includes(principal);
        }

        function requireEditAccess() {
            return true;
        }

        async function refreshAccessState() {
            state.currentUser = await getUserInfo().catch(() => null);
            const loggedIn = isLoggedIn();

            if ($('mainApp')) $('mainApp').style.display = 'block';

            if ($('loginStatus')) {
                $('loginStatus').textContent = loggedIn
                    ? `Logged in as: ${state.currentUser?.displayName || state.currentUser?.userPrincipalName || 'Microsoft User'}`
                    : 'Not logged in';
            }

            if ($('loginButton')) $('loginButton').style.display = loggedIn ? 'none' : 'inline-block';
            if ($('logoutButton')) $('logoutButton').style.display = loggedIn ? 'inline-block' : 'none';

            const readOnly = loggedIn && state.currentUser && !isAdminUser(state.currentUser);
            document.querySelectorAll('[data-requires-edit]').forEach((el) => {
                el.disabled = !!readOnly;
                el.classList.toggle('read-only-disabled', !!readOnly);
            });

            if (loggedIn) await populateProjects().catch(() => { });
        }

        /* =========================
           PROJECT LIST / BASICS
        ========================= */

        function renderProjectDropdown(projects) {
            const select = $('projectList');
            if (!select) return;
            select.innerHTML = '<option value="">-- Choose a project --</option>';
            projects.forEach((project) => select.appendChild(new Option(project.label, project.id)));
        }

        function filterProjects() {
            const query = normKey($('projectSearch')?.value);
            if (!query) {
                renderProjectDropdown(state.allProjects);
                return;
            }
            renderProjectDropdown(state.allProjects.filter((project) => normKey(project.label).includes(query)));
        }

        async function populateProjects() {
            const items = await graphListFolder('');
            const folders = items.filter((item) => !!item.folder);
            state.allProjects = folders.map((folder) => ({
                id: folder.name,
                label: folder.name,
                time: new Date(folder.lastModifiedDateTime || 0).getTime()
            }));
            renderProjectDropdown(state.allProjects);
        }

        function populateSensorDropdown(count) {
            const dropdowns = [
                $('sensorMetaNumberDropdown'),
                $('sensorNumberDropdown')
            ];

            dropdowns.forEach(dropdown => {
                if (!dropdown) return;

                const currentValue = dropdown.value;

                const existingCount = dropdown.options.length - 1;

                // ✅ Prevent rebuild if nothing changed
                if (existingCount === count) return;

                dropdown.innerHTML = '<option value="">Select a Device</option>';

                for (let i = 1; i <= count; i++) {
                    const val = String(i);
                    const text = String(i).padStart(2, '0');
                    dropdown.appendChild(new Option(text, val));
                }

                // ✅ restore selection
                dropdown.value = currentValue;
            });
        }

        function collectProjectPayloadFromUi() {
            return {
                id: state.currentProject,
                project: $('project')?.value.trim() || state.currentProjectName || '',
                customerName: state.currentCustomerName || '',
                sensorCount: Math.max(0, Number($('sensorCount')?.value) || 0)
            };
        }

        function syncSensorTotalToQC() {
            const total = state.expectedSensors || 0;
            const field = $('field_sensorTotal');
            if (field && String(field.value) !== String(total)) field.value = total;
            $$('.sensor-total').forEach((el) => {
                if (el.textContent !== `/ ${total}`) el.textContent = `/ ${total}`;
            });
        }

        function applyTaskToSiteInfo(projectData) {
            state.currentProjectName = projectData.project || state.currentProjectName;
            state.currentCustomerName = projectData.customerName || state.currentCustomerName;
            state.expectedSensors = Math.max(0, Number(projectData.sensorCount) || 0);

            const map = {
                date: projectData.startTime ? new Date(projectData.startTime).toISOString().split('T')[0] : '',
                siteNumber: projectData.project || '',
                sensorTotal: projectData.sensorCount || '',
                installSummary: projectData.notes || '',
                location: projectData.customerAddress || ''
            };

            Object.entries(map).forEach(([key, value]) => {
                const el = $(`field_${key}`);
                if (el) el.value = value ?? '';
            });

            if ($('project')) $('project').value = state.currentProjectName || '';
            if ($('sensorCount')) $('sensorCount').value = state.expectedSensors || 0;

            populateSensorDropdown(state.expectedSensors);
            syncSensorTotalToQC();
        }

        /* =========================
           QC CONFIG / RENDERING
        ========================= */

        async function initQCConfig(force = false) {
            if (!force && state.qcConfig?.sections?.length) return;
            const fileMap = {
                radar: './assets/js/radar_checklist.json',
                remote: './assets/js/remote_checklist.json',
                audit: './assets/js/audit_checklist.json'
            };
            const file = fileMap[state.currentChecklistType] || fileMap.radar;
            const response = await fetch(file);
            if (!response.ok) throw new Error(`Checklist config failed (${response.status})`);
            const config = await response.json();
            if (!config || !Array.isArray(config.sections)) throw new Error('Invalid checklist config');
            state.qcConfig = config;
        }

        function getSectionConfig(sectionId) {
            return state.qcConfig?.sections?.find((section) => section.id === sectionId) || null;
        }

        function getTotalNights(data = null) {
            const raw = data?.sections?.site_info?.fields?.totalNights;
            const value = (raw && typeof raw === 'object') ? raw.value : raw;
            if (value != null && value !== '') return normalizeNightCount(value, CONFIG.DEFAULT_NIGHTS);
            return normalizeNightCount($('field_totalNights')?.value, CONFIG.DEFAULT_NIGHTS);
        }

        function getFieldElementId(sectionId, fieldId, day = null) {
            return day == null ? `field_${fieldId}` : `field_${sectionId}_${fieldId}_${day}`;
        }

        const sectionRenderers = {
            fields(section, _data, container) {
                const frag = document.createDocumentFragment();
                section.fields.forEach((field) => {
                    frag.appendChild(createEl('label', {
                        text: field.label,
                        attrs: { for: `field_${field.id}` }
                    }));
                    frag.appendChild(createEl(field.type === 'textarea' ? 'textarea' : 'input', {
                        attrs: {
                            id: `field_${field.id}`,
                            type: field.type === 'textarea' ? null : (field.type || 'text')
                        }
                    }));
                });
                container.appendChild(frag);
            },

            counter(section, _data, container) {
                const frag = document.createDocumentFragment();
                section.fields.forEach((field) => {
                    frag.appendChild(createEl('label', { text: field.label }));
                    const row = createEl('div');
                    row.appendChild(createEl('input', {
                        attrs: { id: `field_${field.id}`, type: 'number', placeholder: 'Done' }
                    }));
                    row.appendChild(document.createTextNode(' / '));
                    row.appendChild(createEl('input', {
                        attrs: { id: `field_${field.targetId}`, type: 'number', placeholder: 'Total' }
                    }));
                    frag.appendChild(row);
                });
                container.appendChild(frag);
            },

            checklist(section, _data, container) {
                const frag = document.createDocumentFragment();
                section.items.forEach((item, index) => {
                    const itemText = typeof item === 'object' ? item.text : item;
                    const wrapper = createEl('div', { className: 'checkItem' });
                    const label = createEl('label');
                    const checkbox = createEl('input', {
                        attrs: { type: 'checkbox', id: `${section.id}_${index}` }
                    });
                    checkbox.addEventListener('change', () => {
                        label.style.background = item?.type === 'negative' && checkbox.checked ? 'rgba(255,0,0,0.2)' : '';
                    });
                    label.appendChild(checkbox);
                    label.appendChild(document.createTextNode(` ${itemText}`));
                    wrapper.appendChild(label);
                    frag.appendChild(wrapper);
                });
                if (section.notes) {
                    frag.appendChild(createEl('label', { text: 'Notes', attrs: { for: `notes_${section.id}` } }));
                    frag.appendChild(createEl('textarea', { attrs: { id: `notes_${section.id}` } }));
                }
                container.appendChild(frag);
            },

            checklistMultiDay(section, data, container) {
                const days = Math.max(1, getTotalNights(data));
                const frag = document.createDocumentFragment();
                section.items.forEach((item, index) => {
                    const wrapper = createEl('div', { className: 'checkItem' });
                    wrapper.appendChild(createEl('strong', { text: item.text }));
                    wrapper.appendChild(document.createElement('br'));
                    for (let day = 0; day < days; day += 1) {
                        const label = createEl('label', { className: 'checkMulti' });
                        label.setAttribute('data-label', `Night ${day + 1}`);
                        label.appendChild(createEl('input', {
                            attrs: { type: 'checkbox', id: `${section.id}_${index}_${day}` }
                        }));
                        wrapper.appendChild(label);
                    }
                    frag.appendChild(wrapper);
                });
                if (section.notes) {
                    frag.appendChild(createEl('label', { text: 'Notes', attrs: { for: `notes_${section.id}` } }));
                    frag.appendChild(createEl('textarea', { attrs: { id: `notes_${section.id}` } }));
                }
                container.appendChild(frag);
            },

            nightCounter(section, data, container) {
                const days = Math.max(1, getTotalNights(data));
                const total = state.expectedSensors || 0;
                section.fields.forEach((field) => {
                    const wrapper = createEl('div', { className: 'row' });
                    wrapper.appendChild(createEl('strong', { text: field.label }));
                    wrapper.appendChild(document.createElement('br'));
                    for (let day = 0; day < days; day += 1) {
                        const row = createEl('div');
                        row.appendChild(createEl('span', { text: `Night ${day + 1}: ` }));
                        row.appendChild(createEl('input', {
                            attrs: {
                                id: getFieldElementId(section.id, field.id, day),
                                type: 'number',
                                placeholder: '0'
                            }
                        }));
                        row.appendChild(createEl('span', { className: 'sensor-total', text: `/ ${total}` }));
                        wrapper.appendChild(row);
                    }
                    container.appendChild(wrapper);
                });
            },

            matrix(section, _data, container) {
                const frag = document.createDocumentFragment();
                section.rows.forEach((row, rowIndex) => {
                    const rowDiv = createEl('div', { className: 'row' });
                    rowDiv.appendChild(createEl('strong', { text: row }));
                    rowDiv.appendChild(document.createElement('br'));
                    section.columns.forEach((column, colIndex) => {
                        const label = createEl('label');
                        label.appendChild(createEl('input', {
                            attrs: {
                                type: 'radio',
                                name: `${section.id}_${rowIndex}`,
                                id: `${section.id}_${rowIndex}_${colIndex}`
                            }
                        }));
                        label.appendChild(document.createTextNode(` ${column}`));
                        rowDiv.appendChild(label);
                    });
                    frag.appendChild(rowDiv);
                });
                container.appendChild(frag);
            },

            scoring(section, _data, container) {
                const frag = document.createDocumentFragment();
                section.fields.forEach((field) => {
                    frag.appendChild(createEl('label', {
                        text: `${field.label} (0-${field.max})`,
                        attrs: { for: `score_${field.id}` }
                    }));
                    frag.appendChild(createEl('input', {
                        attrs: { id: `score_${field.id}`, type: 'number', max: field.max }
                    }));
                });
                frag.appendChild(createEl('label', {
                    text: 'Total',
                    attrs: { for: `score_total_${section.id}` }
                }));
                frag.appendChild(createEl('input', {
                    attrs: { id: `score_total_${section.id}`, readonly: 'readonly' }
                }));
                container.appendChild(frag);
            },

            singleSelect(section, _data, container) {
                const frag = document.createDocumentFragment();
                section.options.forEach((option, index) => {
                    const label = createEl('label');
                    label.appendChild(createEl('input', {
                        attrs: { type: 'radio', name: section.id, id: `${section.id}_${index}` }
                    }));
                    label.appendChild(document.createTextNode(` ${option}`));
                    frag.appendChild(label);
                });
                container.appendChild(frag);
            }
        };

        function renderSection(section, data) {
            const container = $(`section_${section.id}`);
            if (!container) return;
            container.innerHTML = '';
            const renderer = sectionRenderers[section.type];
            if (!renderer) {
                container.textContent = `Unsupported section type: ${section.type}`;
                return;
            }
            renderer(section, data, container);
        }

        function buildApp(data = { sections: {} }) {
            const app = $('app');
            if (!app) return;
            app.innerHTML = '';

            if (!state.qcConfig?.sections?.length) {
                app.textContent = 'Checklist config not loaded.';
                return;
            }

            const frag = document.createDocumentFragment();
            state.qcConfig.sections.forEach((section, index) => {
                const wrapper = createEl('div', {
                    className: 'collapsible-section',
                    attrs: { id: section.id }
                });
                const header = createEl('h2', {
                    className: 'collapsible-header',
                    text: section.title || `Section ${index + 1}`
                });
                const content = createEl('div', { attrs: { id: `section_${section.id}` } });
                wrapper.appendChild(header);
                wrapper.appendChild(content);
                frag.appendChild(wrapper);
            });
            app.appendChild(frag);

            state.qcConfig.sections.forEach((section) => renderSection(section, data));
            applyData(data);
            updateAllScoringTotals();
            syncSensorTotalToQC();
            initCollapsibles();
        }

        function collectData() {
            const data = { sections: {} };
            if (!state.qcConfig?.sections?.length) return data;

            state.qcConfig.sections.forEach((section) => {
                const sectionData = {};

                if (section.type === 'nightCounter') {
                    const days = Math.max(1, getTotalNights());
                    sectionData.fields = {};
                    section.fields.forEach((field) => {
                        sectionData.fields[field.id] = [];
                        for (let day = 0; day < days; day += 1) {
                            sectionData.fields[field.id].push(Number($(getFieldElementId(section.id, field.id, day))?.value || 0));
                        }
                    });
                }

                if (section.type === 'fields' || section.type === 'counter') {
                    sectionData.fields = {};
                    section.fields.forEach((field) => {
                        const value = $(`field_${field.id}`)?.value ?? '';
                        sectionData.fields[field.id] = { label: field.label, value };
                        if (field.targetId) {
                            sectionData.fields[field.targetId] = $(`field_${field.targetId}`)?.value ?? '';
                        }
                    });
                }

                if (section.type === 'scoring') {
                    sectionData.scores = {};
                    let manualScore = 0;
                    section.fields.forEach((field) => {
                        const value = Number($(`score_${field.id}`)?.value || 0);
                        sectionData.scores[field.id] = value;
                        manualScore += value;
                    });
                    const checklistScore = calculateChecklistScoreAll();
                    sectionData.total = Math.round((checklistScore.percent * 0.7) + (manualScore * 0.3));
                    sectionData.checklistPercent = checklistScore.percent;
                    sectionData.manualScore = manualScore;
                }

                if (section.type === 'matrix') {
                    sectionData.matrix = section.rows.map((_, rowIndex) => {
                        const checked = document.querySelector(`input[name="${section.id}_${rowIndex}"]:checked`);
                        return checked ? Number(checked.id.split('_').pop()) : null;
                    });
                }

                if (section.type === 'singleSelect') {
                    sectionData.selected = null;
                    section.options.forEach((_, index) => {
                        if ($(`${section.id}_${index}`)?.checked) sectionData.selected = index;
                    });
                }

                if (section.type === 'checklist') {
                    sectionData.items = section.items.map((item, index) => {
                        const checked = Boolean($(`${section.id}_${index}`)?.checked);
                        return {
                            label: typeof item === 'object' ? item.text : item,
                            checked,
                            value: checked ? 1 : 0
                        };
                    });
                    if (section.notes) sectionData.notes = $(`notes_${section.id}`)?.value ?? '';
                }

                if (section.type === 'checklistMultiDay') {
                    const days = Math.max(1, getTotalNights());
                    sectionData.items = section.items.map((item, index) => {
                        const dayValues = [];
                        for (let day = 0; day < days; day += 1) {
                            dayValues.push(Boolean($(`${section.id}_${index}_${day}`)?.checked));
                        }
                        return {
                            label: item.text,
                            days: dayValues,
                            value: dayValues.filter(Boolean).length
                        };
                    });
                    if (section.notes) sectionData.notes = $(`notes_${section.id}`)?.value ?? '';
                }

                data.sections[section.id] = sectionData;
            });

            return data;
        }

        function applyData(data) {
            const sections = data?.sections || {};
            Object.entries(sections).forEach(([sectionId, sectionData]) => {
                if (sectionData.notes !== undefined) {
                    const notesEl = $(`notes_${sectionId}`);
                    if (notesEl) notesEl.value = sectionData.notes;
                }

                if (sectionData.fields) {
                    Object.entries(sectionData.fields).forEach(([key, value]) => {
                        const fieldEl = $(`field_${key}`);
                        if (!fieldEl) return;
                        fieldEl.value =
                            value && typeof value === 'object' && 'value' in value
                                ? value.value
                                : (value ?? '');
                    });
                }

                if (sectionData.scores) {
                    Object.entries(sectionData.scores).forEach(([key, value]) => {
                        const scoreEl = $(`score_${key}`);
                        if (scoreEl) scoreEl.value = value;
                    });
                }

                if (Array.isArray(sectionData.matrix)) {
                    sectionData.matrix.forEach((colIndex, rowIndex) => {
                        if (colIndex == null) return;
                        const radio = $(`${sectionId}_${rowIndex}_${colIndex}`);
                        if (radio) radio.checked = true;
                    });
                }

                if (sectionData.selected != null) {
                    const radio = $(`${sectionId}_${sectionData.selected}`);
                    if (radio) radio.checked = true;
                }

                if (Array.isArray(sectionData.items)) {
                    sectionData.items.forEach((item, index) => {
                        if (Array.isArray(item.days)) {
                            item.days.forEach((value, dayIndex) => {
                                const checkbox = $(`${sectionId}_${index}_${dayIndex}`);
                                if (checkbox) checkbox.checked = value;
                            });
                        } else if (item.checked !== undefined) {
                            const checkbox = $(`${sectionId}_${index}`);
                            if (checkbox) checkbox.checked = item.checked;
                        }
                    });
                }

                const sectionConfig = getSectionConfig(sectionId);
                if (sectionConfig?.type === 'nightCounter' && sectionData.fields) {
                    Object.entries(sectionData.fields).forEach(([fieldId, values]) => {
                        (values || []).forEach((value, dayIndex) => {
                            const el = $(getFieldElementId(sectionId, fieldId, dayIndex));
                            if (el) el.value = value;
                        });
                    });
                }
            });

            updateAllScoringTotals();
        }

        function calculateChecklistScoreAll() {
            let earned = 0;
            let total = 0;

            state.qcConfig?.sections?.forEach((section) => {
                if (section.type === 'checklist') {
                    section.items.forEach((item, index) => {
                        const weight = item.weight != null ? Number(item.weight) : 1;
                        const checked = Boolean($(`${section.id}_${index}`)?.checked);
                        if (item.type === 'negative') {
                            if (checked) earned -= weight;
                        } else {
                            total += weight;
                            if (checked) earned += weight;
                        }
                    });
                }

                if (section.type === 'checklistMultiDay') {
                    const days = Math.max(1, getTotalNights());
                    section.items.forEach((item, index) => {
                        const weight = item.weight != null ? Number(item.weight) : 1;
                        for (let day = 0; day < days; day += 1) {
                            total += weight;
                            if (Boolean($(`${section.id}_${index}_${day}`)?.checked)) earned += weight;
                        }
                    });
                }
            });

            if (earned < 0) earned = 0;

            return {
                earned,
                total,
                percent: total > 0 ? Math.round((earned / total) * 100) : 0
            };
        }

        function updateAllScoringTotals() {
            if (!state.qcConfig?.sections?.length) return;

            const checklistScore = calculateChecklistScoreAll();
            let manualScore = 0;

            state.qcConfig.sections.forEach((section) => {
                if (section.type !== 'scoring') return;
                section.fields.forEach((field) => {
                    manualScore += Number($(`score_${field.id}`)?.value || 0);
                });
            });

            const finalScore = Math.round((checklistScore.percent * 0.7) + (manualScore * 0.3));
            const totalEl = $('score_total_final_scoring');
            if (totalEl) totalEl.value = finalScore;

            let breakdown = $('score_breakdown');
            if (!breakdown) {
                breakdown = createEl('div', {
                    attrs: { id: 'score_breakdown' },
                    className: 'score-breakdown'
                });
                $('section_final_scoring')?.appendChild(breakdown);
            }

            breakdown.innerHTML =
                `Checklist Score: ${checklistScore.percent}%<br>` +
                `Manual Score: ${manualScore}<br>` +
                `Final Score: <strong>${finalScore}</strong>`;
        }

        function updateNightDependentSections() {
            const snapshot = collectData();
            state.qcConfig?.sections?.forEach((section) => {
                if (section.type === 'nightCounter' || section.type === 'checklistMultiDay') {
                    renderSection(section, snapshot);
                }
            });
            applyData(snapshot);
            updateAllScoringTotals();
            syncSensorTotalToQC();
        }

        /* =========================
           UNIFIED SAVE
        ========================= */

        function buildDbFromUi(existingDb = {}) {
            const next = mergeObjects(existingDb, {});
            const projectPayload = collectProjectPayloadFromUi();

            next.id = state.currentProject;
            next.project = projectPayload.project;
            next.customerName = state.currentCustomerName || next.customerName || '';
            next.sensorCount = projectPayload.sensorCount;
            next.updatedAt = Date.now();
            next.sensorMeta = next.sensorMeta || {};

            const siteMap = {
                startTime: $('field_date')?.value ? new Date($('field_date').value).toISOString() : (next.startTime || ''),
                project: $('project')?.value.trim() || next.project || '',
                notes: $('field_installSummary')?.value ?? (next.notes || ''),
                customerAddress: $('field_location')?.value ?? (next.customerAddress || '')
            };

            next.startTime = siteMap.startTime;
            next.project = siteMap.project;
            next.notes = siteMap.notes;
            next.customerAddress = siteMap.customerAddress;
            next.sensorCount = Math.max(0, Number($('field_sensorTotal')?.value || projectPayload.sensorCount || 0));

            if (state.qcConfig?.sections?.length) {
                next.qcData = collectData();
            } else {
                next.qcData = next.qcData || { sections: {} };
            }

            state.currentProjectName = next.project || state.currentProjectName;
            state.expectedSensors = next.sensorCount || 0;

            return next;
        }

        async function saveAll() {
            if (!state.currentProject) return;
            return queueSave(async () => {
                const current = await loadProjectDB();
                const db = buildDbFromUi(current);
                state.currentProjectData = db;
                saveToLocal(db);
                state.lastSavedHash = JSON.stringify(db);
                state.lastLoadedHash = state.lastSavedHash;
                notifyListeners(db);

                try {
                    await ensureProjectFolders();
                    await saveProjectDB(db);
                } catch (err) {
                    console.warn('Cloud save failed, local copy kept:', err);
                }

                return db;
            });
        }

        const saveAllDebounced = debounce(() => {
            saveAll().catch((err) => console.error('Save failed:', err));
        }, 300);

        /* =========================
           LOAD / APPLY PROJECT
        ========================= */

        function applyFullState(data) {
            if (state.isApplyingRemoteUpdate) return;
            if (!data) return;
            state.currentProjectData = data;
            applyTaskToSiteInfo(data);
            if (data.qcData) applyData(data.qcData);
            updateAllScoringTotals();
            syncSensorTotalToQC();
            updateMissingImages();
        }

        async function loadQCChecklist() {
            await initQCConfig();
            const db = state.currentProjectData && state.currentProjectData.id === state.currentProject
                ? state.currentProjectData
                : await loadProjectDB();

            let qcData = db.qcData || { sections: {} };

            if ((!qcData || !Object.keys(qcData.sections || {}).length) && getStoredToken()) {
                try {
                    const response = await graphFetch(graphContentUrl(getQCPath()));
                    qcData = await response.json();
                    db.qcData = qcData;
                    saveToLocal(db);
                } catch (err) {
                    if (!/404/i.test(String(err))) console.warn('QC load error:', err);
                }
            }

            buildApp(qcData);
            applyTaskToSiteInfo(db);
            bindQcRealtimeListeners();
        }

        async function loadProject(projectId) {
            if (!projectId || state.isLoadingProject) return;
            state.isLoadingProject = true;

            try {
                state.currentProject = projectId;
                localStorage.setItem('lastProject', projectId);

                const data = await loadProjectDB();
                state.currentProjectData = data;
                state.currentProjectName = data.project || projectId;
                state.currentCustomerName = data.customerName || '';
                state.expectedSensors = Math.max(0, Number(data.sensorCount) || 0);

                if ($('project')) $('project').value = state.currentProjectName;
                if ($('sensorCount')) $('sensorCount').value = state.expectedSensors;

                populateSensorDropdown(state.expectedSensors);
                await ensureProjectFolders();
                await Promise.all([updateGallery(), loadQCChecklist()]);
                syncSensorTotalToQC();
                updateMissingImages();
                initCollapsibles();

                const hash = JSON.stringify(data);
                state.lastLoadedHash = hash;
                state.lastSavedHash = hash;
            } catch (err) {
                console.error('[loadProject]', err);
                alert('Failed to load project.');
            } finally {
                state.isLoadingProject = false;
            }
        }

        async function loadOrCreateProject() {
            const projectName = $('project')?.value.trim();
            if (!projectName) return;

            const customerName = prompt('Enter Customer Name:');
            if (!customerName) {
                alert('Customer required');
                return;
            }

            const id = `${sanitize(customerName)}_${sanitize(projectName)}`;
            state.currentProject = id;
            state.currentProjectName = projectName;
            state.currentCustomerName = customerName;
            state.expectedSensors = Math.max(0, Number($('sensorCount')?.value) || 0);

            const newDb = {
                id,
                project: projectName,
                customerName,
                sensorCount: state.expectedSensors,
                sensorMeta: {},
                qcData: { sections: {} },
                createdAt: Date.now(),
                updatedAt: Date.now()
            };

            state.currentProjectData = newDb;
            saveToLocal(newDb);

            try {
                await ensureProjectFolders();
                await saveProjectDB(newDb);
            } catch (err) {
                console.warn('Create project cloud save failed:', err);
            }

            await loadProject(id);
            await populateProjects().catch(() => { });
        }

        async function saveProjectBasics() {
            if (!requireEditAccess()) return;
            if (!state.currentProject) {
                alert('No project selected.');
                return;
            }
            await saveAll();
            await populateProjects().catch(() => { });
            alert('Project saved.');
        }

        /* =========================
           QC LISTENERS
        ========================= */

        function bindQcRealtimeListeners() {
            if (state.uiListenerBound) return;
            state.uiListenerBound = true;

            $('qcChecklistSection')?.addEventListener('input', async (event) => {
                const target = event.target;
                if (!(target instanceof HTMLElement)) return;

                if (target.id === 'field_totalNights') {
                    let value = Number(target.value);
                    if (Number.isNaN(value)) return;
                    value = Math.min(Math.max(value, 1), CONFIG.MAX_NIGHTS);
                    target.value = value;
                    updateNightDependentSections();
                }

                if (target.id === 'field_sensorTotal') {
                    const total = Math.max(0, Number(target.value) || 0);
                    state.expectedSensors = total;
                    if ($('sensorCount')) $('sensorCount').value = total;
                    populateSensorDropdown(total);
                    syncSensorTotalToQC();
                    updateMissingImages();
                }

                updateAllScoringTotals();
                saveAllDebounced();
            });

            $('qcChecklistSection')?.addEventListener('change', () => {
                updateAllScoringTotals();
                saveAllDebounced();
            });
        }

        /* =========================
           CROSS-TAB / CROSS-DEVICE SYNC
        ========================= */

        function startSync() {
            if (state.syncInterval) return;
            state.syncInterval = setInterval(runSync, CONFIG.SYNC_POLL_MS);
        }

        function stopSync() {
            if (state.syncInterval) clearInterval(state.syncInterval);
            state.syncInterval = null;
        }

        async function runSync() {
            if (!state.currentProject || state.isApplyingRemoteUpdate) return;

            try {
                const remote = await loadProjectDB();
                const hash = JSON.stringify(remote);

                // ✅ STOP if no change
                if (hash === state.lastLoadedHash) return;

                state.isApplyingRemoteUpdate = true;
                state.lastLoadedHash = hash;

                console.log('🌍 Sync update');

                // ✅ Only update what changed
                if (remote.sensorCount !== state.expectedSensors) {
                    state.expectedSensors = remote.sensorCount;
                    populateSensorDropdown(state.expectedSensors);
                    updateMissingImages();
                }

                // ✅ DO NOT rebuild whole UI
                if (remote.qcData) {
                    applyData(remote.qcData);
                }

                updateAllScoringTotals();

                setTimeout(() => {
                    state.isApplyingRemoteUpdate = false;
                }, 200);

            } catch (err) {
                console.warn('Sync failed:', err);
            }
        }

        window.addEventListener('storage', (event) => {
            if (!state.currentProject) return;
            if (event.key === localKey()) {
                try {
                    const data = JSON.parse(event.newValue || '{}');
                    state.currentProjectData = data;
                    const hash = JSON.stringify(data);
                    state.lastLoadedHash = hash;
                    state.lastSavedHash = hash;
                    applyFullState(data);
                } catch (err) {
                    console.warn('Storage sync failed:', err);
                }
            }
        });

        onValue((data) => {
            if (!data || state.isApplyingRemoteUpdate) return;
            applyFullState(data);
        });

        /* =========================
           DEVICE META
        ========================= */

        async function loadSensorMeta(sensorNum) {
            if (!sensorNum || !state.currentProject) return;
            const db = await loadProjectDB();
            const data = db.sensorMeta?.[sensorNum] || {};
            if ($('sensorMetaSerial')) $('sensorMetaSerial').value = data.serial || '';
            if ($('sensorMetaM1')) $('sensorMetaM1').value = data.m1 || '';
            if ($('sensorMetaM2')) $('sensorMetaM2').value = data.m2 || '';
            if ($('sensorMetaM3')) $('sensorMetaM3').value = data.m3 || '';
            if ($('serialNumber') && !$('serialNumber').value && data.serial) $('serialNumber').value = data.serial;
        }

        async function saveSensorMeta() {
            if (!requireEditAccess()) return;
            const sensorNum = $('sensorMetaNumberDropdown')?.value;
            if (!sensorNum || !state.currentProject) return;

            const db = await loadProjectDB();
            db.sensorMeta = db.sensorMeta || {};
            db.sensorMeta[sensorNum] = {
                serial: $('sensorMetaSerial')?.value.trim() || '',
                m1: $('sensorMetaM1')?.value.trim() || '',
                m2: $('sensorMetaM2')?.value.trim() || '',
                m3: $('sensorMetaM3')?.value.trim() || '',
                updatedAt: Date.now()
            };

            state.currentProjectData = db;
            saveToLocal(db);
            try {
                await saveProjectDB(db);
            } catch (err) {
                console.warn('Save sensor meta cloud failed:', err);
            }

            if ($('sensorNumberDropdown')?.value === sensorNum && $('serialNumber')) {
                $('serialNumber').value = $('sensorMetaSerial')?.value.trim() || '';
            }

            notifyListeners(db);
            alert('Device info saved.');
        }

        async function exportSensorMetaCsv() {
            if (!state.currentProject) {
                alert('No project selected.');
                return;
            }
            const snapshot = (await loadProjectDB()).sensorMeta;
            if (!snapshot || !Object.keys(snapshot).length) {
                alert('No device data found.');
                return;
            }
            const rows = [['Device #', 'Serial', 'Info 1', 'Info 2', 'Info 3']];
            Object.entries(snapshot).forEach(([sensorNum, meta]) => {
                rows.push([
                    normalizeText(sensorNum),
                    normalizeText(meta.serial),
                    normalizeText(meta.m1),
                    normalizeText(meta.m2),
                    normalizeText(meta.m3)
                ]);
            });
            downloadCSV(rows, `${sanitize(state.currentProjectName || state.currentProject)}_deviceData.csv`);
        }

        /* =========================
           IMAGES
        ========================= */

        function updateImageModeUI() {
            const mode = document.querySelector('input[name="viewMode"]:checked')?.value || 'sensors';
            if ($('sensorUploadSection')) $('sensorUploadSection').style.display = mode === 'sensors' ? 'block' : 'none';
            if ($('deliverableUploadSection')) $('deliverableUploadSection').style.display = mode === 'deliverables' ? 'block' : 'none';
        }

        const resizeImage = (file, maxWidth = CONFIG.IMAGE_MAX_WIDTH) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onerror = reject;
            reader.onload = () => {
                const img = new Image();
                img.onerror = reject;
                img.src = reader.result;
                img.onload = () => {
                    let { width, height } = img;
                    if (width > maxWidth) {
                        height *= maxWidth / width;
                        width = maxWidth;
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    canvas.toBlob((blob) => resolve(blob || file), 'image/jpeg', 0.92);
                };
            };
            reader.readAsDataURL(file);
        });

        const addTextToImage = (blob, text) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onerror = reject;
            reader.onload = () => {
                const img = new Image();
                img.onerror = reject;
                img.src = reader.result;
                img.onload = () => {
                    const barHeight = Math.max(72, Math.round(img.width * 0.08));
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height + barHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    ctx.fillStyle = 'black';
                    ctx.fillRect(0, img.height, canvas.width, barHeight);
                    ctx.fillStyle = 'white';
                    ctx.font = `bold ${Math.max(28, Math.round(img.width * 0.05))}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(text, canvas.width / 2, img.height + (barHeight / 2));
                    canvas.toBlob((finalBlob) => resolve(finalBlob || blob), 'image/jpeg', 0.92);
                };
            };
            reader.readAsDataURL(blob);
        });

        function showModalByIndex(index) {
            const item = state.modalItems[index];
            if (!item) return;
            state.modalIndex = index;
            if ($('modalImage')) $('modalImage').src = item.url;
            if ($('modalFileName')) $('modalFileName').textContent = item.name;
            if ($('modal')) $('modal').style.display = 'flex';
        }

        function closeModal() {
            if ($('modal')) $('modal').style.display = 'none';
            if ($('modalImage')) $('modalImage').src = '';
            if ($('modalFileName')) $('modalFileName').textContent = '';
        }

        function confirmWithPassword(actionDescription = 'this action') {
            const input = prompt(`Enter password to confirm ${actionDescription}:`);
            return Promise.resolve(input === CONFIG.ADMIN_PASSWORD);
        }

        async function deleteCurrentModalImage() {
            const item = state.modalItems[state.modalIndex];
            if (!item) return;
            const ok = await confirmWithPassword('delete this image');
            if (!ok) {
                alert('Incorrect password.');
                return;
            }
            await graphDeletePath(item.fullPath);
            closeModal();
            await updateGallery();
            await updateMissingImages();
        }

        async function updateGallery() {
            if (!state.currentProject) return;

            const mode = document.querySelector('input[name="viewMode"]:checked')?.value || 'sensors';
            const basePath = getImagesPath(mode);
            const items = await safeListStorageItems(basePath).catch(() => []);
            const seen = new Set();
            const filtered = items.filter((item) => {
                if (seen.has(item.fullPath)) return false;
                seen.add(item.fullPath);
                return true;
            });

            const favorites = getFavorites();
            filtered.sort((a, b) => {
                const aFav = favorites[a.fullPath] ? 1 : 0;
                const bFav = favorites[b.fullPath] ? 1 : 0;
                if (aFav !== bFav) return bFav - aFav;
                return a.name.localeCompare(b.name, undefined, { numeric: true });
            });

            state.modalItems = filtered;
            const gallery = $('gallery');
            const dropdown = $('imageDropdown');

            if (gallery) gallery.innerHTML = '';

            filtered.forEach((item, index) => {
                const container = createEl('div', { className: 'image-container' });

                const img = createEl('img', {
                    attrs: { src: item.url, alt: item.name, loading: 'lazy' }
                });

                img.onclick = () => showModalByIndex(index);

                container.appendChild(img);
                gallery?.appendChild(container);
            });

            // ✅ ADD THIS
            updateImageDropdown(filtered);
        }

        async function updateMissingImages() {
            const list = $('missingList');
            if (!list) return;

            const mode = document.querySelector('input[name="viewMode"]:checked')?.value;

            // ✅ ONLY sensors should show missing
            if (mode !== 'sensors') {
                list.innerHTML = '';
                return;
            }

            if (!state.currentProject || !state.expectedSensors) return;

            try {
                const items = await listStorageItems(getImagesPath('sensors'));

                const map = {};

                items.forEach(item => {
                    const match = item.name.match(/_(\d+)[-_]/);
                    if (!match) return;

                    const num = parseInt(match[1], 10);
                    map[num] = (map[num] || 0) + 1;
                });

                const missing = [];

                for (let i = 1; i <= state.expectedSensors; i++) {
                    const count = map[i] || 0;

                    if (count < CONFIG.SENSOR_IMAGE_COUNT_REQUIRED) {
                        missing.push(
                            `Device ${String(i).padStart(2, '0')} missing ${CONFIG.SENSOR_IMAGE_COUNT_REQUIRED - count} image(s)`
                        );
                    }
                }

                // ✅ prevent flicker
                const current = Array.from(list.children).map(li => li.textContent);
                if (JSON.stringify(current) === JSON.stringify(missing)) return;

                list.innerHTML = '';

                missing.forEach(text => {
                    const li = document.createElement('li');
                    li.textContent = text;
                    list.appendChild(li);
                });

            } catch (err) {
                console.warn('Missing image check failed:', err);
            }
        }

        function handlePickMissing(sensorNum) {
            const radio = document.querySelector('input[name="viewMode"][value="sensors"]');
            if (radio && !radio.checked) {
                radio.checked = true;
                updateImageModeUI();
            }
            if ($('sensorNumberDropdown')) $('sensorNumberDropdown').value = sensorNum;
            if ($('sensorMetaNumberDropdown')) $('sensorMetaNumberDropdown').value = sensorNum;
            $('sensorNumberDropdown')?.dispatchEvent(new Event('change', { bubbles: true }));
            $('sensorMetaNumberDropdown')?.dispatchEvent(new Event('change', { bubbles: true }));
            $('sensorUploadSection')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
            setTimeout(() => $('serialNumber')?.focus(), 200);
        }

        async function uploadSensor() {
            if (!requireEditAccess()) return;
            if (state.isUploading) return;

            const sensorNum = $('sensorNumberDropdown')?.value;
            const serial = sanitize($('serialNumber')?.value);
            const file = $('sensorImage')?.files?.[0];
            const skipMarkup = $('skipMarkupCheckbox')?.checked;

            if (!state.currentProject || !sensorNum || !serial || !file) {
                alert('Fill out all fields');
                return;
            }

            state.isUploading = true;
            if ($('uploadImage')) {
                $('uploadImage').disabled = true;
                $('uploadImage').textContent = 'Uploading...';
            }

            try {
                const padded = String(sensorNum).padStart(2, '0');
                const folderPath = getImagesPath('sensors');
                const existing = await listStorageItems(folderPath).catch(() => []);
                const prefix = sanitize(state.currentCustomerName || state.currentProjectName || state.currentProject);

                const matchCount = existing.filter((item) => item.name.startsWith(`${prefix}_${padded}`)).length;
                if (matchCount >= CONFIG.SENSOR_IMAGE_COUNT_REQUIRED) {
                    const proceed = confirm(`Device ${padded} already has ${CONFIG.SENSOR_IMAGE_COUNT_REQUIRED} uploads. Upload another?`);
                    if (!proceed) return;
                }

                let blob = await resizeImage(file, CONFIG.IMAGE_MAX_WIDTH);
                if (!skipMarkup) {
                    const labelBase = (state.currentCustomerName || state.currentProjectName || state.currentProject).trim();
                    blob = await addTextToImage(blob, `${labelBase} ${padded} - ${serial}`);
                }

                const filename = await getUniqueFilename(folderPath, `${prefix}_${padded}-${serial}.jpg`);
                await graphUploadFile(`${folderPath}/${filename}`, blob, 'image/jpeg');

                const db = await loadProjectDB();
                db.sensorMeta = db.sensorMeta || {};
                db.sensorMeta[sensorNum] = {
                    serial: $('serialNumber')?.value.trim() || '',
                    m1: $('sensorMetaM1')?.value.trim() || '',
                    m2: $('sensorMetaM2')?.value.trim() || '',
                    m3: $('sensorMetaM3')?.value.trim() || '',
                    updatedAt: Date.now()
                };
                state.currentProjectData = db;
                saveToLocal(db);
                try { await saveProjectDB(db); } catch (err) { console.warn(err); }

                if ($('sensorImage')) $('sensorImage').value = '';
                await updateGallery();
                await updateMissingImages();
            } catch (err) {
                console.error(err);
                alert('Upload failed.');
            } finally {
                state.isUploading = false;
                if ($('uploadImage')) {
                    $('uploadImage').disabled = false;
                    $('uploadImage').textContent = 'Upload';
                }
            }
        }

        async function uploadDeliverableImage() {
            if (!requireEditAccess()) return;
            const file = $('fileUploader')?.files?.[0];
            const imageName = sanitize($('imageNameInput')?.value);
            const markup = $('markupTextInput')?.value.trim();

            if (!state.currentProject || !file || !imageName) {
                alert('Choose a file and enter a name.');
                return;
            }

            try {
                let blob = await resizeImage(file, CONFIG.IMAGE_MAX_WIDTH);
                if (markup) blob = await addTextToImage(blob, markup);

                const folderPath = getImagesPath('deliverables');
                const filename = await getUniqueFilename(folderPath, `${imageName}.jpg`);
                await graphUploadFile(`${folderPath}/${filename}`, blob, 'image/jpeg');

                if ($('fileUploader')) $('fileUploader').value = '';
                if ($('imageNameInput')) $('imageNameInput').value = '';
                if ($('markupTextInput')) $('markupTextInput').value = '';
                await updateGallery();
            } catch (err) {
                console.error(err);
                alert('Deliverable upload failed.');
            }
        }

        /* =========================
           REPORTS
        ========================= */

        function getNightlyProductionStats(data) {
            const section = data.sections.nightly_production;
            if (!section?.fields) return null;

            const parseValues = (value) =>
                Array.isArray(value)
                    ? value.map((v) => Number(v) || 0)
                    : (typeof value === 'string'
                        ? value.split(',').map((v) => Number(v.trim()) || 0)
                        : []);

            const sensors = parseValues(section.fields.sensors);
            const nights = Math.max(sensors.length, getTotalNights(data));
            const sensorTotal = state.expectedSensors || Number($('field_sensorTotal')?.value) || 0;

            let maxDone = 0;
            const rows = [];
            for (let i = 0; i < nights; i += 1) {
                const done = Number(sensors[i] ?? 0);
                maxDone = Math.max(maxDone, done);
                rows.push({
                    night: i + 1,
                    done,
                    total: sensorTotal,
                    pct: sensorTotal > 0 ? Math.round((done / sensorTotal) * 100) : 0
                });
            }

            return {
                nights: rows,
                overall: sensorTotal > 0 ? Math.round((maxDone / sensorTotal) * 100) : 0
            };
        }

        function generateCertificationReport() {
            const data = collectData();
            const scoring = data.sections.final_scoring || {};
            const total = scoring.total || 0;
            const checklistPercent = scoring.checklistPercent || 0;
            const manualScore = scoring.manualScore || 0;

            let result = 'PASS';
            if (total < 70) result = 'FAIL';
            else if (total < 85) result = 'NEEDS IMPROVEMENT';

            const production = getNightlyProductionStats(data);

            const lines = [
                `Total Score: ${total}`,
                `Checklist Score: ${checklistPercent}%`,
                `Manual Score: ${manualScore}`,
                `Result: ${result}`
            ];

            if (production) {
                lines.push('');
                lines.push('Night Progress:');
                production.nights.forEach((night) => {
                    lines.push(`Night ${night.night}: ${night.done}/${night.total} (${night.pct}%)`);
                });
                lines.push(`Overall Completion: ${production.overall}%`);
            }

            return lines.join('\n');
        }

        function buildReportCSVRows() {
            const data = collectData();
            const rows = [['Metric', 'Value']];
            const scoring = data.sections.final_scoring || {};
            const total = scoring.total || 0;
