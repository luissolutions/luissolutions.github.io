<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workspace</title>
  <link rel="stylesheet" href="assets/css/master.css" />
  <link rel="icon" href="assets/img/favicon.ico" />
  <style>
    .workspace-layout {
      display: flex;
      min-height: calc(100vh - var(--nav-h) - 44px);
    }

    aside {
      width: 190px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      position: sticky;
      top: var(--nav-h);
      height: calc(100vh - var(--nav-h));
      overflow-y: auto;
      overflow-x: hidden;
      transition: width 0.2s ease, padding 0.2s ease;
    }

    aside.collapsed {
      width: 36px;
      padding: 10px 4px;
      overflow: hidden;
    }

    .aside-inner { display: flex; flex-direction: column; gap: 2px; flex: 1; }

    aside.collapsed .ws-btn,
    aside.collapsed small,
    aside.collapsed .aside-inner { display: none; }

    .aside-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
      flex-shrink: 0;
      align-self: flex-end;
      transition: background 0.15s, color 0.15s;
    }

    .aside-toggle:hover { background: var(--surface2); color: var(--plight); }

    aside small {
      font-size: 0.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 10px 6px 3px;
      opacity: 0.45;
      display: block;
    }

    .ws-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 7px 10px;
      border-radius: 7px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: var(--font);
      font-size: var(--sm);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-decoration: none;
    }

    .ws-btn:hover { background: var(--surface2); color: var(--plight); }
    .ws-btn.active { background: var(--primary); color: white; }

    .ws-content {
      flex: 1;
      min-width: 0;
      padding: 14px;
      overflow-y: auto;
    }

    .ws-panel { display: none; }
    .ws-panel.active { display: block; }

    /* ── Hub grid ── */
    .hub-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
      margin-top: 4px;
    }

    .hub-card {
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 13px;
      text-decoration: none;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
      position: relative;
    }

    .hub-card:hover { border-color: var(--primary); transform: translateY(-2px); color: var(--text); }

    .hub-card h3 {
      font-size: 0.86rem;
      color: var(--plight);
      margin: 0;
      line-height: 1.3;
    }

    .hub-card p {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.4;
      margin: 0;
    }

    .hub-type {
      display: inline-block;
      font-size: 0.58rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 5px;
      border-radius: 3px;
      margin-bottom: 2px;
      width: fit-content;
    }

    .hub-type.app  { background: rgba(70,110,180,0.15); color: #7a9de0; }
    .hub-type.site { background: rgba(90,90,110,0.2);   color: #9a9ab8; }
    .hub-type.link { background: rgba(80,130,160,0.15); color: #7ab8d0; }

    .hub-count {
      position: absolute;
      top: 8px; right: 9px;
      font-size: 0.6rem;
      color: var(--muted);
      opacity: 0.4;
    }

    .hub-remove {
      position: absolute;
      top: 6px; left: 8px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1;
      padding: 0 3px;
      border-radius: 3px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }
    .hub-card:hover .hub-remove { opacity: 0.5; }
    .hub-remove:hover { opacity: 1 !important; color: var(--danger); }

    .hub-section-label {
      font-size: 0.65rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.5;
      margin: 20px 0 8px;
      grid-column: 1 / -1;
    }

    /* ── Sites / Apps shared ── */
    .sites-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: var(--gap);
    }

    .site-card {
      display: block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, transform 0.2s;
    }

    .site-card:hover { border-color: var(--primary); transform: translateY(-3px); color: var(--text); }
    .site-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: var(--surface2); }
    .site-card .cb { padding: 10px 12px; }
    .site-card h3 { font-size: 0.9rem; color: var(--plight); margin-bottom: 4px; }
    .site-card p  { font-size: 0.76rem; color: var(--muted); line-height: 1.5; margin-bottom: 5px; }
    .site-tag { display: inline-block; font-size: 0.62rem; background: rgba(58,154,92,0.12); color: #5dc47a; border-radius: 3px; padding: 2px 5px; }

    .pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
    .pill {
      padding: 4px 12px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: var(--font);
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .pill.active, .pill:hover { background: var(--primary); color: white; border-color: var(--primary); }

    .cat-title {
      font-size: 0.68rem;
      color: var(--plight);
      border-bottom: 1px solid var(--border);
      padding-bottom: 5px;
      margin: 18px 0 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 9px;
      margin-bottom: 6px;
    }

    .app-tile {
      display: block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
    }

    .app-tile:hover { border-color: var(--primary); transform: translateY(-2px); color: var(--text); }
    .app-tile h3 { font-size: 0.84rem; color: var(--plight); margin-bottom: 3px; }
    .app-tile p  { font-size: 0.73rem; color: var(--muted); line-height: 1.5; margin-bottom: 5px; }
    .app-tile .tag { display: inline-block; font-size: 0.62rem; background: rgba(42,157,143,0.12); color: #4ac8ba; border-radius: 3px; padding: 2px 5px; }


    @media (max-width: 768px) {
      .workspace-layout { flex-direction: column; }
      aside {
        width: auto; height: auto; position: static;
        display: flex; flex-direction: row; flex-wrap: nowrap; align-items: center;
        border-right: none; border-bottom: 1px solid var(--border);
        padding: 8px; gap: 6px; overflow-y: visible;
      }
      aside.collapsed { width: auto; padding: 6px 8px; }
      aside .aside-inner {
        order: 1;
        flex: 1; min-width: 0;
        display: flex; flex-direction: row; flex-wrap: wrap; gap: 4px;
      }
      aside small { display: none; }
      .aside-toggle {
        order: 2;
        align-self: center; flex-shrink: 0;
        margin: 0;
      }
      .ws-btn { width: auto; padding: 5px 9px; font-size: 0.74rem; }
      .ws-content { padding: 16px 12px; }
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <main>
    <div class="workspace-layout">
      <aside id="ws-aside">
        <button class="aside-toggle" id="asideToggle" title="Collapse sidebar">‹</button>
        <div class="aside-inner">
          <small>Navigate</small>
          <button class="ws-btn" data-panel="hub" id="hubBtn" style="display:none">Hub</button>
          <button class="ws-btn active" data-panel="sites">Sites</button>
          <button class="ws-btn" data-panel="apps">Apps</button>
          <small>Quick</small>
          <a class="ws-btn" href="apps/online/onlinejournal.html">Journal ↗</a>
          <a class="ws-btn" href="apps/online/onlinejob.html">Job App ↗</a>
          <a class="ws-btn" href="apps/online/onlinelinks.html">Bookmarks ↗</a>
          <a class="ws-btn" href="apps/online/onlinefinancials.html">Financials ↗</a>
        </div>
      </aside>

      <div class="ws-content">

        <!-- Hub (auth-gated) -->
        <div class="ws-panel" id="panel-hub">
          <h2 style="margin-bottom:4px;">Hub</h2>
          <input type="search" id="hubSearch" placeholder="Filter…" autocomplete="off" style="
            width:100%; max-width:320px; padding:7px 12px; margin-bottom:14px;
            background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
            color:var(--text); font-size:var(--sm); font-family:var(--font); outline:none;
          ">
          <div class="hub-grid" id="hubGrid"></div>
        </div>

        <!-- Sites -->
        <div class="ws-panel active" id="panel-sites">
          <h2 style="margin-bottom:6px;">Sites &amp; Projects</h2>
          <div class="pills" id="site-pills">
            <button class="pill active" data-filter="all">All</button>
            <button class="pill" data-filter="personal">Personal</button>
            <button class="pill" data-filter="client">Client</button>
          </div>
          <div class="sites-grid" id="sitesGrid"></div>
        </div>

        <!-- Apps -->
        <div class="ws-panel" id="panel-apps">
          <h2 style="margin-bottom:6px;">Tool Suite</h2>
          <div class="pills" id="app-pills">
            <button class="pill active" data-cat="all">All</button>
            <button class="pill" data-cat="finance">Finance</button>
            <button class="pill" data-cat="jobs">Jobs</button>
            <button class="pill" data-cat="productivity">Productivity</button>
            <button class="pill" data-cat="data">Data</button>
            <button class="pill" data-cat="games">Games</button>
          </div>
          <div id="appsGrid"></div>
        </div>


      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script>
    const CLICKS_KEY  = 'ws_hub_v2';
    const ASIDE_KEY   = 'ws_aside_collapsed';

    const wsAside     = document.getElementById('ws-aside');
    const asideToggle = document.getElementById('asideToggle');

    function setCollapsed(collapsed) {
      wsAside.classList.toggle('collapsed', collapsed);
      asideToggle.textContent = collapsed ? '›' : '‹';
      asideToggle.title = collapsed ? 'Expand sidebar' : 'Collapse sidebar';
      localStorage.setItem(ASIDE_KEY, collapsed ? '1' : '0');
    }

    asideToggle?.addEventListener('click', () => {
      setCollapsed(!wsAside.classList.contains('collapsed'));
    });

    // restore saved state
    if (localStorage.getItem(ASIDE_KEY) === '1') setCollapsed(true);

    function getCounts() {
      try { return JSON.parse(localStorage.getItem(CLICKS_KEY) || '{}'); } catch { return {}; }
    }
    function bump(id) {
      const c = getCounts();
      c[id] = (c[id] || 0) + 1;
      localStorage.setItem(CLICKS_KEY, JSON.stringify(c));
    }

    // ── Data ──
    const EXTRA_APPS = [];

    let ALL_SITES = [];
    let ALL_APPS  = [];

    async function fetchJSON(url) {
      try { const r = await fetch(url); return r.ok ? r.json() : []; }
      catch { return []; }
    }

    // ── Card colors ──
    const PALETTE = ['#4a90d9','#3aaa7a','#9b6ed4','#d4813a','#d94a7a','#4ab8c8','#8aaa3a','#c84a4a'];
    function hashColor(str) {
      let h = 5381;
      for (let i = 0; i < str.length; i++) h = ((h * 33) ^ str.charCodeAt(i)) >>> 0;
      return PALETTE[h % PALETTE.length];
    }

    // ── Hub ──
    function buildHubItems() {
      const siteItems = ALL_SITES.map(s => ({
        id:   s.link,
        title: s.title,
        desc:  s.desc || '',
        type: 'site',
        url:   s.link,
        external: true,
      }));
      const appItems = ALL_APPS.map(a => ({
        id:   a.link,
        title: a.title,
        desc:  a.desc || '',
        type: 'app',
        url:   a.link,
        external: false,
      }));
      return [...siteItems, ...appItems];
    }

    function renderHub() {
      const grid = document.getElementById('hubGrid');
      if (!grid) return;
      const counts = getCounts();
      const items  = buildHubItems();

      items.sort((a, b) => {
        const diff = (counts[b.id] || 0) - (counts[a.id] || 0);
        return diff !== 0 ? diff : a.title.localeCompare(b.title);
      });

      const visited   = items.filter(i => (counts[i.id] || 0) > 0);
      const unvisited = items.filter(i => (counts[i.id] || 0) === 0);

      grid.innerHTML = '';

      function addCard(item, isFrequent) {
        const c = counts[item.id] || 0;
        const color = hashColor(item.id);
        const el = document.createElement('div');
        el.className = 'hub-card';
        el.style.boxShadow = `-3px 0 0 0 ${color}`;
        el.innerHTML = `
          ${isFrequent ? `<button class="hub-remove" title="Remove from Frequent">×</button>` : ''}
          ${c > 0 ? `<span class="hub-count">${c}</span>` : ''}
          <span class="hub-type ${item.type}">${item.type}</span>
          <h3>${item.title}</h3>
          ${item.desc ? `<p>${item.desc}</p>` : ''}
        `;
        if (isFrequent) {
          el.querySelector('.hub-remove').addEventListener('click', e => {
            e.stopPropagation();
            const c = getCounts();
            delete c[item.id];
            localStorage.setItem(CLICKS_KEY, JSON.stringify(c));
            renderHub();
          });
        }
        el.addEventListener('click', e => {
          bump(item.id);
          renderHub();
          if (e.shiftKey) window.open(item.url, '_blank', 'noopener');
          else window.location.href = item.url;
        });
        grid.appendChild(el);
      }

      if (visited.length > 0) {
        const lbl = document.createElement('p');
        lbl.className = 'hub-section-label';
        lbl.textContent = 'Frequent';
        grid.appendChild(lbl);
        visited.forEach(i => addCard(i, true));
      }

      if (unvisited.length > 0) {
        if (visited.length > 0) {
          const lbl = document.createElement('p');
          lbl.className = 'hub-section-label';
          lbl.textContent = 'All';
          grid.appendChild(lbl);
        }
        unvisited.forEach(i => addCard(i, false));
      }
    }

    // ── Sites panel ──
    function renderSites(tag = 'all') {
      const grid = document.getElementById('sitesGrid');
      if (!grid) return;
      grid.innerHTML = '';
      ALL_SITES
        .filter(s => tag === 'all' || s.tag === tag)
        .forEach(s => {
          const a = document.createElement('a');
          a.className = 'site-card';
          a.href = s.link;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.innerHTML = `
            <img src="${s.img || ''}" alt="${s.title}" loading="lazy" onerror="this.src='assets/img/default.png'">
            <div class="cb">
              <h3>${s.title}</h3>
              <p>${s.desc || ''}</p>
              <span class="site-tag">${s.tag}</span>
            </div>
          `;
          grid.appendChild(a);
        });
    }

    // ── Apps panel ──
    function renderApps(cat = 'all') {
      const grid = document.getElementById('appsGrid');
      if (!grid) return;
      grid.innerHTML = '';
      const cats = cat === 'all' ? [...new Set(ALL_APPS.map(a => a.cat))] : [cat];
      cats.forEach(c => {
        const items = ALL_APPS.filter(a => a.cat === c);
        if (!items.length) return;
        const title = document.createElement('p');
        title.className = 'cat-title';
        title.textContent = c.charAt(0).toUpperCase() + c.slice(1);
        grid.appendChild(title);
        const g = document.createElement('div');
        g.className = 'app-grid';
        items.forEach(a => {
          const el = document.createElement('div');
          el.className = 'app-tile';
          el.dataset.link  = a.link;
          el.dataset.title = a.title;
          el.innerHTML = `<h3>${a.title}</h3><span class="tag">${a.tag || a.cat}</span><p>${a.desc || ''}</p>`;
          el.addEventListener('click', e => {
            bump(a.link);
            renderHub();
            if (e.shiftKey) window.open(a.link, '_blank', 'noopener');
            else window.location.href = a.link;
          });
          g.appendChild(el);
        });
        grid.appendChild(g);
      });
    }


    // ── Panel switching ──
    document.addEventListener('click', e => {
      const btn = e.target.closest('[data-panel]');
      if (!btn) return;
      document.querySelectorAll('.ws-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.ws-btn[data-panel]').forEach(b => b.classList.remove('active'));
      document.getElementById('panel-' + btn.dataset.panel)?.classList.add('active');
      btn.classList.add('active');
    });

    // ── Pill filters ──
    document.getElementById('site-pills')?.addEventListener('click', e => {
      const pill = e.target.closest('.pill');
      if (!pill) return;
      document.querySelectorAll('#site-pills .pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      renderSites(pill.dataset.filter);
    });

    document.getElementById('app-pills')?.addEventListener('click', e => {
      const pill = e.target.closest('.pill');
      if (!pill) return;
      document.querySelectorAll('#app-pills .pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      renderApps(pill.dataset.cat);
    });

    // ── Boot ──
    Promise.all([
      fetchJSON('websites/sites.json'),
      fetchJSON('apps/apps.json'),
    ]).then(([sites, apps]) => {
      ALL_SITES = sites;
      ALL_APPS  = [...EXTRA_APPS, ...apps];
      renderHub();
      renderSites();
      renderApps();
    });

    document.getElementById('hubSearch').addEventListener('input', function () {
      const q = this.value.trim().toLowerCase();
      document.querySelectorAll('#hubGrid .hub-card').forEach(card => {
        const title = (card.querySelector('h3')?.textContent || '').toLowerCase();
        const desc  = (card.querySelector('p')?.textContent  || '').toLowerCase();
        card.style.display = (!q || title.includes(q) || desc.includes(q)) ? '' : 'none';
      });
      document.querySelectorAll('#hubGrid .hub-section-label').forEach(label => {
        label.style.display = q ? 'none' : '';
      });
    });
  </script>

  <script src="assets/js/main.js"></script>
  <script type="module" src="assets/js/auth.js"></script>
  <script type="module">
    import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getAuth, onAuthStateChanged }     from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

    const cfg = {
      apiKey:            "AIzaSyCv2cQGWeXS-w7psrQiZD8dn4R7hStmY1o",
      authDomain:        "persinfo-df93f.firebaseapp.com",
      databaseURL:       "https://persinfo-df93f-default-rtdb.firebaseio.com",
      projectId:         "persinfo-df93f",
      storageBucket:     "persinfo-df93f.appspot.com",
      messagingSenderId: "218680336647",
      appId:             "1:218680336647:web:7786091136b9e6b28565a2"
    };

    const app  = getApps().length ? getApp() : initializeApp(cfg);
    const auth = getAuth(app);

    onAuthStateChanged(auth, user => {
      const hubBtn   = document.getElementById('hubBtn');
      const hubPanel = document.getElementById('panel-hub');
      if (!hubBtn || !hubPanel) return;

      if (user) {
        hubBtn.style.display = '';
        hubPanel.style.display = '';
        // switch to hub as default landing
        document.querySelectorAll('.ws-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.ws-btn[data-panel]').forEach(b => b.classList.remove('active'));
        hubPanel.classList.add('active');
        hubBtn.classList.add('active');
      } else {
        hubBtn.style.display   = 'none';
        hubPanel.style.display = 'none';
        // ensure sites is active
        if (!document.querySelector('.ws-panel.active')) {
          document.getElementById('panel-sites')?.classList.add('active');
          document.querySelector(".ws-btn[data-panel='sites']")?.classList.add('active');
        }
      }
    });
  </script>
</body>
</html>
