<!DOCTYPE html>
<html lang="en" class="theme-kamehouse">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo — Kame House</title>
  <link rel="stylesheet" href="../../assets/css/master.css">
  <link rel="stylesheet" href="assets/css/kh.css">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/img/icons/favicon-32x32.png">
  <script src="assets/js/html.js" defer></script>
</head>
<body class="todo">
  <header class="kh-nav"></header>

  <div class="wrap">

    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
      <h1 style="margin:0;font-size:1.3rem;">Tasks</h1>
      <a href="discipline.html" style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:var(--surface);border:1px solid var(--primary);color:var(--primary);text-decoration:none;border-radius:6px;font-size:var(--sm);font-weight:600;">📋 Sunday Review →</a>
    </div>

    <section class="add-card">
      <h2>Add a task</h2>
      <form class="add-form" id="add-form">
        <div class="span-full">
          <label for="t-text">Task</label>
          <input type="text" id="t-text" placeholder="Check Telaid emails, Update TX, Get EM cert…" required maxlength="120">
        </div>
        <div>
          <label for="t-anchor">Anchor</label>
          <select id="t-anchor">
            <option value="work">Work</option>
            <option value="training">Training</option>
            <option value="properties">Properties</option>
            <option value="capital">Capital</option>
            <option value="wildcard">Wildcard</option>
          </select>
        </div>
        <div>
          <label for="t-type">Type</label>
          <select id="t-type">
            <option value="habit">Habit (chain)</option>
            <option value="recurring">Recurring</option>
            <option value="oneshot">One-shot goal</option>
          </select>
        </div>
        <div class="freq-wrap" id="freq-wrap">
          <label for="t-freq">Frequency</label>
          <select id="t-freq">
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly">Monthly</option>
          </select>
        </div>
        <div class="due-wrap" id="due-wrap">
          <label for="t-due">Due date</label>
          <input type="date" id="t-due">
        </div>
        <button type="submit">Add</button>
      </form>
    </section>

    <div class="view-bar">
      <button data-view="all" class="active">All</button>
      <button data-view="due-today">Due today</button>
      <button data-view="habits">Habits only</button>
      <button data-view="open">Open one-shots</button>
      <span class="spacer"></span>
      <label style="font-size:.78rem;color:var(--muted);">Grid year: <select id="year-pick" class="year-pick"></select></label>
    </div>

    <section class="card" id="auth-gate" style="display:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:16px;">
      <p style="margin:0;">Sign in to use your todo list. Data lives under your Firebase uid; the Week's Five planner reads from this same list.</p>
    </section>

    <div id="anchors-container"></div>

  </div>

  <script>window.LINKS_ASIDE_HREF = '../../apps/online/onlinelinks.html';</script>
  <script src="../../apps/assets/js/links-aside.js" defer></script>
  <script type="module">
    import { auth, onAuthStateChanged, signInWithEmailAndPassword, signOut, database, ref, onValue, push, set, remove, update } from '../../assets/js/firebase-init.js';

    await window.khHeaderReady;

    const ANCHORS = [
      { key: 'work',       label: 'Work' },
      { key: 'training',   label: 'Training' },
      { key: 'properties', label: 'Properties' },
      { key: 'capital',    label: 'Capital' },
      { key: 'wildcard',   label: 'Wildcard' },
    ];

    const pill = document.getElementById('auth-pill');
    const authGate = document.getElementById('auth-gate');
    const container = document.getElementById('anchors-container');
    let basePath = null;
    let allTodos = {};
    let unsubscribe = null;
    let currentView = 'all';
    let currentYear = new Date().getFullYear();

    onAuthStateChanged(auth, user => {
      basePath = user ? user.uid : null;
      if (user) {
        pill.innerHTML = `Signed in: ${user.email} <button id="auth-btn">Sign Out</button>`;
        document.getElementById('auth-btn').addEventListener('click', () => signOut(auth));
        authGate.style.display = 'none';
        subscribe();
      } else {
        pill.innerHTML = `Not signed in <button id="auth-btn">Sign In</button>`;
        document.getElementById('auth-btn').addEventListener('click', promptLogin);
        authGate.style.display = 'block';
        if (unsubscribe) unsubscribe();
        allTodos = {};
        container.innerHTML = '';
      }
    });

    function promptLogin() {
      const email = prompt('Email:'); if (!email) return;
      const password = prompt('Password:'); if (!password) return;
      signInWithEmailAndPassword(auth, email, password).catch(e => alert('Sign in failed: ' + e.message));
    }

    function subscribe() {
      if (unsubscribe) unsubscribe();
      const r = ref(database, `${basePath}/todos`);
      unsubscribe = onValue(r, snap => {
        allTodos = snap.val() || {};
        render();
      });
    }

    // ---- Year picker ----
    (function initYearPicker() {
      const sel = document.getElementById('year-pick');
      const now = new Date().getFullYear();
      for (let y = now - 2; y <= now + 1; y++) {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y;
        if (y === now) opt.selected = true;
        sel.appendChild(opt);
      }
      sel.addEventListener('change', () => { currentYear = +sel.value; render(); });
    })();

    // ---- Add form ----
    const typeSel = document.getElementById('t-type');
    const freqWrap = document.getElementById('freq-wrap');
    const dueWrap = document.getElementById('due-wrap');
    function updateAddFormFields() {
      const t = typeSel.value;
      freqWrap.classList.toggle('show', t === 'habit' || t === 'recurring');
      dueWrap.classList.toggle('show', t === 'oneshot');
    }
    typeSel.addEventListener('change', updateAddFormFields);
    updateAddFormFields();

    document.getElementById('add-form').addEventListener('submit', (e) => {
      e.preventDefault();
      if (!basePath) { alert('Sign in first.'); return; }
      const text = document.getElementById('t-text').value.trim();
      if (!text) return;
      const anchor = document.getElementById('t-anchor').value;
      const type = typeSel.value;
      const payload = { text, anchor, type, createdAt: Date.now(), archived: false };
      if (type === 'habit') {
        payload.frequency = document.getElementById('t-freq').value;
        payload.history = {};
      } else if (type === 'recurring') {
        payload.frequency = document.getElementById('t-freq').value;
        payload.lastDone = 0;
      } else if (type === 'oneshot') {
        payload.done = false;
        const due = document.getElementById('t-due').value;
        if (due) payload.dueDate = due;
        payload.subtasks = [];
      }
      push(ref(database, `${basePath}/todos`), payload);
      e.target.reset();
      typeSel.value = type;
      updateAddFormFields();
      document.getElementById('t-text').focus();
    });

    // ---- View bar ----
    document.querySelectorAll('.view-bar button[data-view]').forEach(btn => {
      btn.addEventListener('click', () => {
        currentView = btn.dataset.view;
        document.querySelectorAll('.view-bar button[data-view]').forEach(b => b.classList.toggle('active', b === btn));
        render();
      });
    });

    // ---- Date helpers ----
    function isoDate(d) { return d.toISOString().slice(0, 10); }
    function todayISO() { return isoDate(new Date()); }
    function dayMs() { return 86400000; }

    function isTaskDueToday(t) {
      const today = todayISO();
      if (t.type === 'habit') {
        return !(t.history && t.history[today]);
      }
      if (t.type === 'recurring') {
        const intervals = { daily: 1, weekly: 7, monthly: 30 };
        const interval = (intervals[t.frequency] || 7) * dayMs();
        return Date.now() > (t.lastDone || 0) + interval;
      }
      if (t.type === 'oneshot') {
        if (t.done) return false;
        return !!(t.dueDate && t.dueDate <= today);
      }
      return false;
    }

    function recurringStatus(t) {
      if (t.type !== 'recurring') return null;
      const intervals = { daily: 1, weekly: 7, monthly: 30 };
      const interval = (intervals[t.frequency] || 7) * dayMs();
      const due = (t.lastDone || 0) + interval;
      const now = Date.now();
      if (now > due) return { cls: 'overdue', label: 'overdue' };
      if (due - now < 2 * dayMs()) return { cls: 'due-today', label: 'due soon' };
      return { cls: '', label: t.lastDone ? `done ${daysAgoLabel(t.lastDone)}` : 'never done' };
    }
    function daysAgoLabel(ms) {
      const days = Math.floor((Date.now() - ms) / dayMs());
      if (days === 0) return 'today';
      if (days === 1) return 'yesterday';
      return `${days}d ago`;
    }

    function oneshotMeta(t) {
      if (t.done) return { cls: '', label: 'done' };
      if (!t.dueDate) return { cls: '', label: 'no due date' };
      const today = todayISO();
      if (t.dueDate < today) return { cls: 'overdue', label: `overdue (${t.dueDate})` };
      if (t.dueDate === today) return { cls: 'due-today', label: 'due today' };
      return { cls: '', label: `due ${t.dueDate}` };
    }

    // ---- Year-grid ----
    function buildYearGrid(habit, year) {
      const wrap = document.createElement('div');
      wrap.className = 'year-grid-wrap';

      // Month labels above
      const monthLabels = document.createElement('div');
      monthLabels.className = 'month-labels';
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

      const yearStart = new Date(year, 0, 1);
      const yearEnd = new Date(year, 11, 31);
      // Start grid from the Sunday on or before Jan 1
      const startSunday = new Date(yearStart);
      startSunday.setDate(startSunday.getDate() - startSunday.getDay());

      // Compute which week column each month starts in
      const monthStarts = months.map((_, mi) => {
        const firstOfMonth = new Date(year, mi, 1);
        const daysSinceStart = Math.floor((firstOfMonth - startSunday) / dayMs());
        return Math.floor(daysSinceStart / 7);
      });

      // Render month labels with spacing based on column gaps
      let lastCol = 0;
      monthStarts.forEach((startCol, mi) => {
        const span = document.createElement('span');
        span.className = 'month-label';
        const cols = (mi === 11 ? 53 : monthStarts[mi + 1]) - startCol;
        const w = cols * 12 + (cols - 1) * 3;
        span.style.width = w + 'px';
        span.textContent = months[mi];
        monthLabels.appendChild(span);
        lastCol = startCol + cols;
      });
      wrap.appendChild(monthLabels);

      // Grid: day labels column + 53 week columns
      const grid = document.createElement('div');
      grid.className = 'year-grid';

      const dayLabels = document.createElement('div');
      dayLabels.className = 'day-labels';
      ['Sun','','Tue','','Thu','','Sat'].forEach(d => {
        const s = document.createElement('span'); s.textContent = d; dayLabels.appendChild(s);
      });
      grid.appendChild(dayLabels);

      const today = todayISO();
      const now = new Date();
      for (let col = 0; col < 53; col++) {
        const wcol = document.createElement('div');
        wcol.className = 'week-col';
        for (let row = 0; row < 7; row++) {
          const d = new Date(startSunday);
          d.setDate(d.getDate() + col * 7 + row);
          const cell = document.createElement('div');
          cell.className = 'cell';
          const iso = isoDate(d);
          cell.dataset.date = iso;
          cell.title = iso;
          if (d.getFullYear() !== year) {
            cell.classList.add('out-of-year');
          } else if (d > now) {
            cell.classList.add('future');
          } else {
            if (habit.history && habit.history[iso]) cell.classList.add('done');
            if (iso === today) cell.classList.add('today');
            cell.addEventListener('click', () => toggleHabitDay(habit, iso));
          }
          wcol.appendChild(cell);
        }
        grid.appendChild(wcol);
      }
      wrap.appendChild(grid);

      // Stats: current streak, total this year
      const stats = computeHabitStats(habit, year);
      const statsLine = document.createElement('div');
      statsLine.className = 'grid-stats';
      statsLine.innerHTML = `
        <span class="streak">🔥 ${stats.currentStreak}-day streak</span>
        &nbsp;·&nbsp; ${stats.totalThisYear} days this year
        &nbsp;·&nbsp; longest: ${stats.longestStreak}
      `;
      wrap.appendChild(statsLine);

      return wrap;
    }

    function computeHabitStats(habit, year) {
      const hist = habit.history || {};
      const today = todayISO();
      // Current streak: count back from today (or yesterday if today not done) until a miss
      let currentStreak = 0;
      const d = new Date();
      // If today not done, start streak count from yesterday so a brand-new habit can have a streak
      if (!hist[todayISO()]) d.setDate(d.getDate() - 1);
      while (hist[isoDate(d)]) {
        currentStreak++;
        d.setDate(d.getDate() - 1);
      }
      let totalThisYear = 0;
      let longestStreak = 0;
      let runningStreak = 0;
      const yearStart = new Date(year, 0, 1);
      const yearEnd = new Date(year, 11, 31);
      const cursor = new Date(yearStart);
      while (cursor <= yearEnd) {
        const iso = isoDate(cursor);
        if (hist[iso]) {
          totalThisYear++;
          runningStreak++;
          if (runningStreak > longestStreak) longestStreak = runningStreak;
        } else {
          runningStreak = 0;
        }
        cursor.setDate(cursor.getDate() + 1);
      }
      return { currentStreak, totalThisYear, longestStreak };
    }

    function toggleHabitDay(habit, dateISO) {
      const hist = habit.history || {};
      const path = `${basePath}/todos/${habit.id}/history/${dateISO}`;
      if (hist[dateISO]) {
        set(ref(database, path), null);
      } else {
        set(ref(database, path), true);
      }
    }

    // ---- Recurring tick ----
    function tickRecurring(t) {
      set(ref(database, `${basePath}/todos/${t.id}/lastDone`), Date.now());
    }

    // ---- One-shot toggle ----
    function toggleOneshot(t) {
      set(ref(database, `${basePath}/todos/${t.id}/done`), !t.done);
    }

    // ---- Subtasks ----
    function addSubtask(t, text) {
      const subs = Array.isArray(t.subtasks) ? t.subtasks.slice() : [];
      subs.push({ text, done: false });
      set(ref(database, `${basePath}/todos/${t.id}/subtasks`), subs);
    }
    function toggleSubtask(t, idx) {
      const subs = Array.isArray(t.subtasks) ? t.subtasks.slice() : [];
      if (!subs[idx]) return;
      subs[idx] = { ...subs[idx], done: !subs[idx].done };
      set(ref(database, `${basePath}/todos/${t.id}/subtasks`), subs);
    }
    function removeSubtask(t, idx) {
      const subs = Array.isArray(t.subtasks) ? t.subtasks.slice() : [];
      subs.splice(idx, 1);
      set(ref(database, `${basePath}/todos/${t.id}/subtasks`), subs);
    }

    function deleteTodo(t) {
      if (!confirm(`Delete "${t.text}"? This wipes its history too.`)) return;
      remove(ref(database, `${basePath}/todos/${t.id}`));
    }

    // ---- Render ----
    function escHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function render() {
      container.innerHTML = '';
      const byAnchor = {};
      ANCHORS.forEach(a => byAnchor[a.key] = []);

      Object.entries(allTodos).forEach(([id, t]) => {
        if (!t || t.archived) return;
        const entry = { id, ...t };
        // Apply view filter
        if (currentView === 'due-today' && !isTaskDueToday(entry)) return;
        if (currentView === 'habits' && entry.type !== 'habit') return;
        if (currentView === 'open' && (entry.type !== 'oneshot' || entry.done)) return;
        const key = (entry.anchor || 'wildcard').toLowerCase();
        if (!byAnchor[key]) byAnchor[key] = [];
        byAnchor[key].push(entry);
      });

      ANCHORS.forEach(a => {
        const tasks = byAnchor[a.key] || [];
        const section = document.createElement('section');
        section.className = 'anchor-section';
        const head = document.createElement('div');
        head.className = 'anchor-head';
        head.innerHTML = `
          <span class="anchor-pill pill-${a.key}">${a.label}</span>
          <h3>${a.label}</h3>
          <span class="count">${tasks.length} task${tasks.length === 1 ? '' : 's'}</span>
        `;
        section.appendChild(head);

        if (tasks.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'empty-anchor';
          empty.textContent = `No ${a.label.toLowerCase()} tasks.`;
          section.appendChild(empty);
        } else {
          const ul = document.createElement('ul');
          ul.className = 'task-list';
          tasks.sort((x, y) => {
            // Order: oneshot open first, then habits, then recurring, then done oneshots
            const order = (t) => t.type === 'oneshot' && !t.done ? 0 : t.type === 'habit' ? 1 : t.type === 'recurring' ? 2 : 3;
            return order(x) - order(y) || (x.createdAt || 0) - (y.createdAt || 0);
          });
          tasks.forEach(t => ul.appendChild(renderTask(t)));
          section.appendChild(ul);
        }
        container.appendChild(section);
      });
    }

    function renderTask(t) {
      const li = document.createElement('li');
      li.className = 'task';
      if (t.type === 'oneshot' && t.done) li.classList.add('done');

      const row = document.createElement('div');
      row.className = 'task-row';

      if (t.type === 'oneshot') {
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = !!t.done;
        cb.addEventListener('change', () => toggleOneshot(t));
        row.appendChild(cb);
      } else if (t.type === 'recurring') {
        const btn = document.createElement('button');
        btn.className = 'del';
        btn.style.cssText = 'background:var(--success,#1f8a3a);color:#fff;border:0;border-radius:4px;padding:3px 9px;font-size:.78rem;';
        btn.textContent = '✓ Tick';
        btn.title = 'Mark done now';
        btn.addEventListener('click', () => tickRecurring(t));
        row.appendChild(btn);
      } else if (t.type === 'habit') {
        const todayDone = !!(t.history && t.history[todayISO()]);
        const btn = document.createElement('button');
        btn.className = 'del';
        btn.style.cssText = `background:${todayDone ? 'var(--surface2)' : 'var(--primary)'};color:${todayDone ? 'var(--muted)' : '#fff'};border:0;border-radius:4px;padding:3px 9px;font-size:.78rem;`;
        btn.textContent = todayDone ? '✓ done today' : '+ done today';
        btn.addEventListener('click', () => toggleHabitDay(t, todayISO()));
        row.appendChild(btn);
      }

      const text = document.createElement('span');
      text.className = 'text';
      text.textContent = t.text || '';
      row.appendChild(text);

      const typeTag = document.createElement('span');
      typeTag.className = `type-tag ${t.type}`;
      typeTag.textContent = t.type === 'habit' ? `habit · ${t.frequency || 'daily'}` :
                            t.type === 'recurring' ? `recurring · ${t.frequency || 'weekly'}` :
                            'one-shot';
      row.appendChild(typeTag);

      let meta = null;
      if (t.type === 'recurring') {
        const s = recurringStatus(t);
        if (s) meta = `<span class="meta ${s.cls}">${escHtml(s.label)}</span>`;
      } else if (t.type === 'oneshot') {
        const s = oneshotMeta(t);
        meta = `<span class="meta ${s.cls}">${escHtml(s.label)}</span>`;
      }
      if (meta) {
        const span = document.createElement('span');
        span.innerHTML = meta;
        row.appendChild(span);
      }

      const del = document.createElement('button');
      del.className = 'del';
      del.title = 'Delete';
      del.textContent = '✕';
      del.addEventListener('click', () => deleteTodo(t));
      row.appendChild(del);

      li.appendChild(row);

      // Year-grid for habits
      if (t.type === 'habit') {
        li.appendChild(buildYearGrid(t, currentYear));
      }

      // Subtasks for one-shots
      if (t.type === 'oneshot') {
        const sub = document.createElement('ul');
        sub.className = 'subtasks';
        const subs = Array.isArray(t.subtasks) ? t.subtasks : [];
        subs.forEach((s, i) => {
          const sli = document.createElement('li');
          if (s.done) sli.classList.add('done');
          const scb = document.createElement('input');
          scb.type = 'checkbox';
          scb.checked = !!s.done;
          scb.addEventListener('change', () => toggleSubtask(t, i));
          const stext = document.createElement('span');
          stext.textContent = s.text;
          stext.style.flex = '1';
          const sdel = document.createElement('button');
          sdel.className = 'del';
          sdel.textContent = '✕';
          sdel.addEventListener('click', () => removeSubtask(t, i));
          sli.appendChild(scb); sli.appendChild(stext); sli.appendChild(sdel);
          sub.appendChild(sli);
        });
        const addRow = document.createElement('div');
        addRow.className = 'add-subtask';
        const inp = document.createElement('input');
        inp.type = 'text';
        inp.placeholder = '+ add subtask';
        const addBtn = document.createElement('button');
        addBtn.textContent = 'Add';
        addBtn.addEventListener('click', () => {
          const v = inp.value.trim();
          if (!v) return;
          addSubtask(t, v);
          inp.value = '';
        });
        inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); addBtn.click(); } });
        addRow.appendChild(inp); addRow.appendChild(addBtn);
        sub.appendChild(addRow);
        li.appendChild(sub);
      }

      return li;
    }
  </script>
</body>
</html>
