<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping List — Kame House</title>
  <link rel="stylesheet" href="../../assets/css/master.css">
  <link rel="icon" type="image/png" sizes="32x32" href="img/icons/favicon-32x32.png">
  <style>
    body { padding: 16px; }
    .kh-nav { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; }
    .kh-nav .brand { font-weight: 700; margin-right: auto; font-size: 1.1rem; }
    .kh-nav a { color: var(--text); text-decoration: none; padding: 6px 12px; border-radius: 6px; }
    .kh-nav a.active, .kh-nav a:hover { background: var(--primary); color: #fff; }
    .auth-pill { font-size: var(--sm); padding: 6px 12px; border-radius: 6px; background: var(--surface2); border: 1px solid var(--border); }
    .auth-pill button { margin-left: 8px; background: var(--primary); color: #fff; border: 0; padding: 4px 10px; border-radius: 4px; cursor: pointer; }
    .container { max-width: 700px; margin: 0 auto; }
    .add-form { display: grid; grid-template-columns: 1fr 100px auto; gap: 8px; padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; }
    .add-form input, .add-form button { padding: 9px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 1rem; }
    .add-form button { background: var(--primary); color: #fff; cursor: pointer; border-color: var(--primary); }
    .filters { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
    .filters button { padding: 6px 12px; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 6px; cursor: pointer; font-size: var(--sm); }
    .filters button.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    .filters .spacer { flex: 1; }
    .filters .danger { background: var(--danger); color: #fff; border-color: var(--danger); }
    .item-list { list-style: none; padding: 0; margin: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .item-list li { display: grid; grid-template-columns: auto 1fr auto auto; gap: 10px; padding: 12px 14px; align-items: center; border-top: 1px solid var(--border); }
    .item-list li:first-child { border-top: 0; }
    .item-list li.checked .name { text-decoration: line-through; color: var(--muted); }
    .item-list input[type=checkbox] { width: 20px; height: 20px; cursor: pointer; }
    .item-list .name { font-size: 1rem; }
    .item-list .qty { color: var(--muted); font-size: var(--sm); min-width: 50px; text-align: right; }
    .item-list .del { background: transparent; border: 0; color: var(--muted); cursor: pointer; font-size: 1.1rem; }
    .item-list .del:hover { color: var(--danger); }
    .empty { padding: 30px; text-align: center; color: var(--muted); font-style: italic; }
    /* Links aside */
    #links-aside { position: fixed; top: 0; right: -360px; width: 340px; height: 100vh; background: var(--surface); border-left: 1px solid var(--border); z-index: 200; transition: right .25s ease; overflow: hidden; display: flex; flex-direction: column; }
    body.links-aside-open #links-aside { right: 0; }
    #links-aside iframe { flex: 1; border: none; width: 100%; display: block; background: var(--bg); }
    #links-overlay { display: none; position: fixed; inset: 0; z-index: 199; background: rgba(0,0,0,.3); }
    body.links-aside-open #links-overlay { display: block; }
    #links-toggle { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 14px; padding: 4px 10px; cursor: pointer; border-radius: 6px; margin-left: 8px; }
    #links-toggle:hover { border-color: var(--primary); color: var(--text); }
  </style>
</head>
<body>
  <header class="kh-nav">
    <span class="brand">🏠 Kame House</span>
    <a href="index.html">Dashboard</a>
    <a href="shopping.html" class="active">Shopping</a>
    <a href="meals.html">Meals</a>
    <a href="chores.html">Chores</a>
    <a href="../../index.html">← Main Site</a>
    <span class="auth-pill" id="auth-pill">Not signed in <button id="auth-btn">Sign In</button></span>
  </header>

  <div class="container">
    <form class="add-form" id="add-form">
      <input type="text" id="item-name" placeholder="Add an item (eggs, milk, bread...)" required>
      <input type="text" id="item-qty" placeholder="Qty (opt)">
      <button type="submit">Add</button>
    </form>

    <div class="filters">
      <button data-filter="pending" class="active">Pending</button>
      <button data-filter="checked">Bought</button>
      <button data-filter="all">All</button>
      <span class="spacer"></span>
      <button class="danger" id="clear-checked">Clear bought</button>
    </div>

    <ul class="item-list" id="item-list">
      <li class="empty">Loading…</li>
    </ul>
  </div>

  <script>window.LINKS_ASIDE_HREF = '../../apps/online/onlinelinks.html';</script>
  <script src="../../apps/assets/js/links-aside.js" defer></script>
  <script type="module">
    import { auth, onAuthStateChanged, signInWithEmailAndPassword, signOut, database, ref, onValue, push, set, remove, update } from '../../assets/js/firebase-init.js';

    let basePath = 'public';
    let currentFilter = 'pending';
    let currentItems = {};
    const pill = document.getElementById('auth-pill');

    onAuthStateChanged(auth, (user) => {
      basePath = user ? user.uid : 'public';
      if (user) {
        pill.innerHTML = `Signed in: ${user.email} <button id="auth-btn">Sign Out</button>`;
        document.getElementById('auth-btn').addEventListener('click', () => signOut(auth));
      } else {
        pill.innerHTML = `Not signed in <button id="auth-btn">Sign In</button>`;
        document.getElementById('auth-btn').addEventListener('click', promptLogin);
      }
      subscribe();
    });

    function promptLogin() {
      const email = prompt('Email:');
      if (!email) return;
      const password = prompt('Password:');
      if (!password) return;
      signInWithEmailAndPassword(auth, email, password).catch(e => alert('Sign in failed: ' + e.message));
    }

    let unsubscribePath = null;
    function subscribe() {
      const r = ref(database, `${basePath}/household/shopping`);
      onValue(r, snap => {
        currentItems = snap.val() || {};
        render();
      });
    }

    document.getElementById('add-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('item-name').value.trim();
      const qty = document.getElementById('item-qty').value.trim();
      if (!name) return;
      const r = ref(database, `${basePath}/household/shopping`);
      push(r, { name, qty, checked: false, addedAt: Date.now() });
      document.getElementById('item-name').value = '';
      document.getElementById('item-qty').value = '';
      document.getElementById('item-name').focus();
    });

    document.querySelectorAll('.filters button[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        currentFilter = btn.dataset.filter;
        document.querySelectorAll('.filters button[data-filter]').forEach(b => b.classList.toggle('active', b === btn));
        render();
      });
    });

    document.getElementById('clear-checked').addEventListener('click', () => {
      if (!confirm('Remove all bought items?')) return;
      const updates = {};
      Object.entries(currentItems).forEach(([id, item]) => {
        if (item.checked) updates[id] = null;
      });
      if (Object.keys(updates).length) {
        update(ref(database, `${basePath}/household/shopping`), updates);
      }
    });

    function render() {
      const list = document.getElementById('item-list');
      const entries = Object.entries(currentItems)
        .filter(([_, v]) => currentFilter === 'all' || (currentFilter === 'pending' ? !v.checked : v.checked))
        .sort((a, b) => (b[1].addedAt || 0) - (a[1].addedAt || 0));

      if (!entries.length) {
        list.innerHTML = `<li class="empty">${currentFilter === 'pending' ? 'Nothing to buy. 🎉' : currentFilter === 'checked' ? 'No bought items yet.' : 'List is empty.'}</li>`;
        return;
      }

      list.innerHTML = '';
      entries.forEach(([id, item]) => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');
        li.innerHTML = `
          <input type="checkbox" ${item.checked ? 'checked' : ''} data-id="${id}">
          <span class="name">${escapeHtml(item.name)}</span>
          <span class="qty">${escapeHtml(item.qty || '')}</span>
          <button class="del" data-id="${id}" title="Delete">✕</button>
        `;
        list.appendChild(li);
      });

      list.querySelectorAll('input[type=checkbox]').forEach(cb => {
        cb.addEventListener('change', () => {
          const id = cb.dataset.id;
          update(ref(database, `${basePath}/household/shopping/${id}`), {
            checked: cb.checked,
            checkedAt: cb.checked ? Date.now() : null,
          });
        });
      });

      list.querySelectorAll('button.del').forEach(btn => {
        btn.addEventListener('click', () => {
          if (confirm('Remove this item?')) {
            remove(ref(database, `${basePath}/household/shopping/${btn.dataset.id}`));
          }
        });
      });
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
  </script>
</body>
</html>
