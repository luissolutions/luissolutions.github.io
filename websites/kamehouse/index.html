<!DOCTYPE html>
<html lang="en" class="theme-kamehouse">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kame House — Household Hub</title>
  <link rel="stylesheet" href="../../assets/css/master.css">
  <link rel="icon" type="image/png" sizes="32x32" href="img/icons/favicon-32x32.png">
  <link rel="manifest" href="site.webmanifest">
  <style>
    body { padding: 16px; }
    .kh-nav { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; }
    .kh-nav .brand { font-weight: 700; margin-right: auto; font-size: 1.1rem; }
    .kh-nav a { color: var(--text); text-decoration: none; padding: 6px 12px; border-radius: 6px; }
    .kh-nav a.active, .kh-nav a:hover { background: var(--primary); color: #fff; }
    .auth-pill { font-size: var(--sm); padding: 6px 12px; border-radius: 6px; background: var(--surface2); border: 1px solid var(--border); }
    .auth-pill button { margin-left: 8px; background: var(--primary); color: #fff; border: 0; padding: 4px 10px; border-radius: 4px; cursor: pointer; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; max-width: var(--max); margin: 0 auto; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .card h2 { margin: 0 0 12px; font-size: 1.05rem; display: flex; align-items: center; justify-content: space-between; }
    .card h2 a { font-size: 0.8rem; color: var(--accent); text-decoration: none; font-weight: 400; }
    .card ul { list-style: none; margin: 0; padding: 0; }
    .card li { padding: 8px 0; border-top: 1px solid var(--border); display: flex; justify-content: space-between; gap: 8px; }
    .card li:first-child { border-top: 0; }
    .empty { color: var(--muted); font-style: italic; padding: 8px 0; }
    .greeting { max-width: var(--max); margin: 0 auto 16px; padding: 14px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .greeting h1 { margin: 0; font-size: 1.3rem; }
    .greeting .clock { color: var(--muted); }
    .tag { font-size: 0.75rem; padding: 2px 6px; border-radius: 3px; background: var(--surface2); color: var(--muted); }
    .tag.overdue { background: var(--danger); color: #fff; }
    .tag.due { background: var(--accent); color: #fff; }
    /* Links aside (matches online.css pattern) */
    #links-aside { position: fixed; top: 0; right: -360px; width: 340px; height: 100vh; background: var(--surface); border-left: 1px solid var(--border); z-index: 200; transition: right .25s ease; overflow: hidden; display: flex; flex-direction: column; }
    body.links-aside-open #links-aside { right: 0; }
    #links-aside iframe { flex: 1; border: none; width: 100%; display: block; background: var(--bg); }
    #links-overlay { display: none; position: fixed; inset: 0; z-index: 199; background: rgba(0,0,0,.3); }
    body.links-aside-open #links-overlay { display: block; }
    #links-toggle { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 14px; padding: 4px 10px; cursor: pointer; border-radius: 6px; margin-left: 8px; }
    #links-toggle:hover { border-color: var(--primary); color: var(--text); }

    /* Discipline tile + reminder banner */
    .disc-banner { max-width: var(--max); margin: 0 auto 14px; padding: 10px 14px; background: var(--danger,#c0392b); color: #fff; border-radius: var(--radius); display: none; align-items: center; gap: 10px; }
    .disc-banner.show { display: flex; }
    .disc-banner .dot { font-size: 1.2em; }
    .disc-banner a { color: #fff; text-decoration: underline; font-weight: 600; }
    .disc-tile { max-width: var(--max); margin: 0 auto 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .disc-tile .dt-head { display: flex; justify-content: space-between; align-items: baseline; padding: 12px 16px; background: linear-gradient(180deg, color-mix(in srgb, var(--primary) 18%, var(--surface)), var(--surface)); border-bottom: 1px solid var(--border); }
    .disc-tile .dt-head h2 { margin: 0; font-size: 1.05rem; }
    .disc-tile .dt-head .week { color: var(--muted); font-size: var(--sm); margin-left: 8px; }
    .disc-tile .dt-head a { font-size: var(--sm); color: var(--accent); text-decoration: none; }
    .disc-tile ul { list-style: none; margin: 0; padding: 0; }
    .disc-tile li { display: grid; grid-template-columns: auto 110px 1fr auto auto; gap: 10px; align-items: center; padding: 8px 16px; border-top: 1px solid var(--border); }
    .disc-tile li:first-child { border-top: 0; }
    .disc-tile li.done .text { text-decoration: line-through; color: var(--muted); }
    .disc-tile input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; }
    .disc-tile .anchor { font-size: 0.72rem; padding: 2px 8px; border-radius: 10px; background: var(--surface2); color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .disc-tile .anchor.telaid { background: #1e3a5f; color: #cfe6ff; }
    .disc-tile .anchor.multifamily { background: #3a1f5e; color: #d8c5ff; }
    .disc-tile .anchor.cert { background: #1f5e35; color: #c5ffd8; }
    .disc-tile .anchor.capital { background: #5e4a1f; color: #ffe7c5; }
    .disc-tile .anchor.wildcard { background: #5e1f3a; color: #ffc5d8; }
    .disc-tile .text { font-size: var(--sm); }
    .disc-tile .due { font-size: 0.72rem; color: var(--muted); }
    .disc-tile .due.overdue { color: #ff6b6b; font-weight: 600; }
    .disc-tile .due.today { color: #ffb84d; font-weight: 600; }
    .disc-tile .empty { padding: 24px 16px; text-align: center; color: var(--muted); }
    .disc-tile .empty a { color: var(--accent); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <header class="kh-nav">
    <span class="brand">🏠 Kame House</span>
    <a href="index.html" class="active">Dashboard</a>
    <a href="discipline.html">Discipline</a>
    <a href="shopping.html">Shopping</a>
    <a href="meals.html">Meals</a>
    <a href="chores.html">Chores</a>
    <span class="auth-pill" id="auth-pill">Not signed in <button id="auth-btn">Sign In</button></span>
  </header>

  <section class="greeting">
    <h1 id="greeting-text">Welcome home.</h1>
    <span class="clock" id="clock"></span>
  </section>

  <div id="disc-banner" class="disc-banner">
    <span class="dot">📋</span>
    <span id="disc-banner-text"></span>
    <a href="discipline.html">open discipline →</a>
  </div>

  <section class="disc-tile" id="disc-tile">
    <div class="dt-head">
      <h2>📋 This Week's Five <span class="week" id="disc-week"></span></h2>
      <a href="discipline.html">edit →</a>
    </div>
    <ul id="disc-list">
      <li class="empty">Loading…</li>
    </ul>
  </section>

  <section class="grid">
    <div class="card">
      <h2>Today's Meals <a href="meals.html">edit →</a></h2>
      <ul id="meals-today">
        <li class="empty">Loading…</li>
      </ul>
    </div>

    <div class="card">
      <h2>Shopping List <a href="shopping.html">all →</a></h2>
      <ul id="shopping-preview">
        <li class="empty">Loading…</li>
      </ul>
    </div>

    <div class="card">
      <h2>Chores Due <a href="chores.html">all →</a></h2>
      <ul id="chores-due">
        <li class="empty">Loading…</li>
      </ul>
    </div>

  </section>

  <script>window.LINKS_ASIDE_HREF = '../../apps/online/onlinelinks.html';</script>
  <script src="../../apps/assets/js/links-aside.js" defer></script>
  <script type="module">
    import { auth, onAuthStateChanged, signInWithEmailAndPassword, signOut, database, ref, onValue, set } from '../../assets/js/firebase-init.js';

    const todayISO = () => new Date().toISOString().slice(0, 10);
    const isoToDayName = (iso) => new Date(iso + 'T00:00:00').toLocaleDateString(undefined, { weekday: 'long' });

    function tickClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleString(undefined, { weekday: 'long', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    }
    tickClock();
    setInterval(tickClock, 30000);

    let basePath = 'public';
    const pill = document.getElementById('auth-pill');
    const authBtn = document.getElementById('auth-btn');

    onAuthStateChanged(auth, (user) => {
      basePath = user ? user.uid : 'public';
      if (user) {
        pill.innerHTML = `Signed in: ${user.email} <button id="auth-btn">Sign Out</button>`;
        document.getElementById('greeting-text').textContent = `Welcome home, ${user.email.split('@')[0]}.`;
        document.getElementById('auth-btn').addEventListener('click', () => signOut(auth));
      } else {
        pill.innerHTML = `Not signed in <button id="auth-btn">Sign In</button>`;
        document.getElementById('greeting-text').textContent = 'Welcome home.';
        document.getElementById('auth-btn').addEventListener('click', promptLogin);
      }
      loadWidgets();
    });

    function promptLogin() {
      const email = prompt('Email:');
      if (!email) return;
      const password = prompt('Password:');
      if (!password) return;
      signInWithEmailAndPassword(auth, email, password).catch(e => alert('Sign in failed: ' + e.message));
    }

    function loadWidgets() {
      loadDiscipline();
      loadMealsToday();
      loadShoppingPreview();
      loadChoresDue();
    }

    function isoWeekKey(date) {
      const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      const week = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
      return `${d.getUTCFullYear()}-W${String(week).padStart(2,'0')}`;
    }
    const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    function dueState(dueDay) {
      if (!dueDay) return { cls:'', label:'' };
      const today = DAY_NAMES[new Date().getDay()];
      const todayIdx = DAY_NAMES.indexOf(today);
      const dueIdx = DAY_NAMES.indexOf(dueDay);
      if (dueIdx === -1) return { cls:'', label:dueDay };
      if (dueIdx < todayIdx) return { cls:'overdue', label:'overdue '+dueDay };
      if (dueIdx === todayIdx) return { cls:'today', label:'TODAY' };
      return { cls:'', label:dueDay };
    }
    function escHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    function loadDiscipline() {
      const week = isoWeekKey(new Date());
      document.getElementById('disc-week').textContent = '· ' + week;
      const ref_ = ref(database, `${basePath}/discipline/punchlist/${week}/slots`);
      const list = document.getElementById('disc-list');
      const banner = document.getElementById('disc-banner');
      const bannerText = document.getElementById('disc-banner-text');
      onValue(ref_, snap => {
        const slots = snap.val() || {};
        const entries = [1,2,3,4,5].map(i => ({ id:i, ...(slots[i] || {}) })).filter(e => e.text);
        list.innerHTML = '';
        if (entries.length === 0) {
          list.innerHTML = `<li class="empty">No tasks set for ${week}. <a href="discipline.html">Run the Sunday review →</a></li>`;
          banner.classList.remove('show');
          return;
        }
        let overdueCount = 0, todayCount = 0;
        entries.forEach(e => {
          const due = dueState(e.dueDay);
          if (due.cls === 'overdue' && !e.done) overdueCount++;
          if (due.cls === 'today' && !e.done) todayCount++;
          const anchorKey = (e.anchor || 'wildcard').toLowerCase();
          const li = document.createElement('li');
          if (e.done) li.classList.add('done');
          li.innerHTML = `
            <input type="checkbox" data-slot="${e.id}" ${e.done ? 'checked' : ''}>
            <span class="anchor ${anchorKey}">${escHtml(e.anchor || 'Wildcard')}</span>
            <span class="text">${escHtml(e.text)}</span>
            <span class="due ${due.cls}">${escHtml(due.label)}</span>
            <span></span>
          `;
          li.querySelector('input').addEventListener('change', (ev) => {
            const slotRef = ref(database, `${basePath}/discipline/punchlist/${week}/slots/${e.id}/done`);
            set(slotRef, ev.target.checked);
          });
          list.appendChild(li);
        });
        if (overdueCount > 0) {
          banner.classList.add('show');
          bannerText.textContent = `${overdueCount} task${overdueCount>1?'s':''} overdue this week.`;
        } else if (todayCount > 0) {
          banner.classList.add('show');
          bannerText.textContent = `${todayCount} task${todayCount>1?'s':''} due today.`;
        } else {
          banner.classList.remove('show');
        }
      });
    }

    function loadMealsToday() {
      const today = todayISO();
      const mealsRef = ref(database, `${basePath}/household/meals/${today}`);
      const list = document.getElementById('meals-today');
      onValue(mealsRef, snap => {
        const data = snap.val() || {};
        const slots = [['breakfast', '🥞 Breakfast'], ['lunch', '🥗 Lunch'], ['dinner', '🍽️ Dinner']];
        list.innerHTML = '';
        slots.forEach(([key, label]) => {
          const li = document.createElement('li');
          li.innerHTML = `<span>${label}</span><span style="color:var(--muted);">${data[key] || '— not planned —'}</span>`;
          list.appendChild(li);
        });
      });
    }

    function loadShoppingPreview() {
      const shopRef = ref(database, `${basePath}/household/shopping`);
      const list = document.getElementById('shopping-preview');
      onValue(shopRef, snap => {
        const items = snap.val() || {};
        const pending = Object.entries(items)
          .filter(([_, v]) => !v.checked)
          .sort((a, b) => (b[1].addedAt || 0) - (a[1].addedAt || 0))
          .slice(0, 6);
        list.innerHTML = '';
        if (!pending.length) { list.innerHTML = '<li class="empty">Nothing on the list.</li>'; return; }
        pending.forEach(([_, item]) => {
          const li = document.createElement('li');
          li.innerHTML = `<span>${item.name}</span><span style="color:var(--muted);">${item.qty || ''}</span>`;
          list.appendChild(li);
        });
      });
    }

    function loadChoresDue() {
      const choresRef = ref(database, `${basePath}/household/chores`);
      const list = document.getElementById('chores-due');
      onValue(choresRef, snap => {
        const chores = snap.val() || {};
        const now = Date.now();
        const dayMs = 86400000;
        const intervals = { daily: 1, weekly: 7, monthly: 30 };
        const entries = Object.entries(chores).map(([id, c]) => {
          const interval = (intervals[c.frequency] || 7) * dayMs;
          const due = (c.lastDone || 0) + interval;
          return { id, ...c, due, overdue: now > due, ms: now - due };
        }).filter(e => e.overdue || (e.due - now) < 2 * dayMs)
          .sort((a, b) => a.due - b.due)
          .slice(0, 6);
        list.innerHTML = '';
        if (!entries.length) { list.innerHTML = '<li class="empty">All caught up. 🎉</li>'; return; }
        entries.forEach(e => {
          const li = document.createElement('li');
          const tag = e.overdue
            ? `<span class="tag overdue">overdue</span>`
            : `<span class="tag due">due soon</span>`;
          li.innerHTML = `<span>${e.name} <span style="color:var(--muted);font-size:.8rem;">${e.assignee || ''}</span></span>${tag}`;
          list.appendChild(li);
        });
      });
    }
  </script>
</body>
</html>
