<!DOCTYPE html>
<html lang="en" class="theme-kamehouse">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chores — Kame House</title>
  <link rel="stylesheet" href="../../assets/css/master.css">
  <link rel="icon" type="image/png" sizes="32x32" href="img/icons/favicon-32x32.png">
  <style>
    body { padding: 16px; }
    .kh-nav { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; }
    .kh-nav .brand { font-weight: 700; margin-right: auto; font-size: 1.1rem; }
    .kh-nav a { color: var(--text); text-decoration: none; padding: 6px 12px; border-radius: 6px; }
    .kh-nav a.active, .kh-nav a:hover { background: var(--primary); color: #fff; }
    .auth-pill { font-size: var(--sm); padding: 6px 12px; border-radius: 6px; background: var(--surface2); border: 1px solid var(--border); }
    .auth-pill button { margin-left: 8px; background: var(--primary); color: #fff; border: 0; padding: 4px 10px; border-radius: 4px; cursor: pointer; }
    .container { max-width: 800px; margin: 0 auto; }
    .add-form { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 8px; padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; }
    .add-form input, .add-form select, .add-form button { padding: 9px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 1rem; }
    .add-form button { background: var(--primary); color: #fff; cursor: pointer; border-color: var(--primary); }
    .filters { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
    .filters button { padding: 6px 12px; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 6px; cursor: pointer; font-size: var(--sm); }
    .filters button.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    .chore-list { list-style: none; padding: 0; margin: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .chore-list li { display: grid; grid-template-columns: 1fr auto auto auto auto; gap: 10px; padding: 12px 14px; align-items: center; border-top: 1px solid var(--border); }
    .chore-list li:first-child { border-top: 0; }
    .chore-list li.overdue { background: rgba(139, 32, 32, 0.15); }
    .chore-list .name { font-size: 1rem; font-weight: 600; }
    .chore-list .sub { display: block; font-size: 0.78rem; color: var(--muted); font-weight: 400; margin-top: 2px; }
    .chore-list .tag { font-size: 0.72rem; padding: 3px 8px; border-radius: 4px; background: var(--surface2); color: var(--muted); }
    .chore-list .tag.overdue { background: var(--danger); color: #fff; }
    .chore-list .tag.due { background: var(--accent); color: #fff; }
    .chore-list .tag.ok { background: var(--success); color: #fff; }
    .chore-list .done-btn { background: var(--success); color: #fff; border: 0; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 0.85rem; }
    .chore-list .del { background: transparent; border: 0; color: var(--muted); cursor: pointer; font-size: 1.1rem; }
    .chore-list .del:hover { color: var(--danger); }
    .empty { padding: 30px; text-align: center; color: var(--muted); font-style: italic; }
    @media (max-width: 600px) {
      .add-form { grid-template-columns: 1fr; }
      .chore-list li { grid-template-columns: 1fr auto; gap: 6px; }
      .chore-list li .tag, .chore-list li .done-btn { grid-column: 1 / -1; justify-self: start; }
    }
    /* Links aside */
    #links-aside { position: fixed; top: 0; right: -360px; width: 340px; height: 100vh; background: var(--surface); border-left: 1px solid var(--border); z-index: 200; transition: right .25s ease; overflow: hidden; display: flex; flex-direction: column; }
    body.links-aside-open #links-aside { right: 0; }
    #links-aside iframe { flex: 1; border: none; width: 100%; display: block; background: var(--bg); }
    #links-overlay { display: none; position: fixed; inset: 0; z-index: 199; background: rgba(0,0,0,.3); }
    body.links-aside-open #links-overlay { display: block; }
    #links-toggle { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 14px; padding: 4px 10px; cursor: pointer; border-radius: 6px; margin-left: 8px; }
    #links-toggle:hover { border-color: var(--primary); color: var(--text); }
  </style>
</head>
<body>
  <header class="kh-nav">
    <span class="brand">🏠 Kame House</span>
    <a href="index.html">Dashboard</a>
    <a href="shopping.html">Shopping</a>
    <a href="meals.html">Meals</a>
    <a href="chores.html" class="active">Chores</a>
    <span class="auth-pill" id="auth-pill">Not signed in <button id="auth-btn">Sign In</button></span>
  </header>

  <div class="container">
    <form class="add-form" id="add-form">
      <input type="text" id="chore-name" placeholder="Chore name (take out trash, vacuum...)" required>
      <input type="text" id="chore-assignee" placeholder="Assigned to (opt)">
      <select id="chore-freq">
        <option value="daily">Daily</option>
        <option value="weekly" selected>Weekly</option>
        <option value="monthly">Monthly</option>
      </select>
      <button type="submit">Add</button>
    </form>

    <div class="filters">
      <button data-filter="all" class="active">All</button>
      <button data-filter="overdue">Overdue</button>
      <button data-filter="due">Due soon</button>
      <button data-filter="ok">On track</button>
    </div>

    <ul class="chore-list" id="chore-list">
      <li class="empty">Loading…</li>
    </ul>
  </div>

  <script>window.LINKS_ASIDE_HREF = '../../apps/online/onlinelinks.html';</script>
  <script src="../../apps/assets/js/links-aside.js" defer></script>
  <script type="module">
    import { auth, onAuthStateChanged, signInWithEmailAndPassword, signOut, database, ref, onValue, push, set, remove, update } from '../../assets/js/firebase-init.js';

    let basePath = 'public';
    let currentFilter = 'all';
    let currentChores = {};
    const pill = document.getElementById('auth-pill');
    const dayMs = 86400000;
    const intervals = { daily: 1, weekly: 7, monthly: 30 };

    onAuthStateChanged(auth, (user) => {
      basePath = user ? user.uid : 'public';
      if (user) {
        pill.innerHTML = `Signed in: ${user.email} <button id="auth-btn">Sign Out</button>`;
        document.getElementById('auth-btn').addEventListener('click', () => signOut(auth));
      } else {
        pill.innerHTML = `Not signed in <button id="auth-btn">Sign In</button>`;
        document.getElementById('auth-btn').addEventListener('click', promptLogin);
      }
      subscribe();
    });

    function promptLogin() {
      const email = prompt('Email:');
      if (!email) return;
      const password = prompt('Password:');
      if (!password) return;
      signInWithEmailAndPassword(auth, email, password).catch(e => alert('Sign in failed: ' + e.message));
    }

    function subscribe() {
      onValue(ref(database, `${basePath}/household/chores`), snap => {
        currentChores = snap.val() || {};
        render();
      });
    }

    document.getElementById('add-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('chore-name').value.trim();
      const assignee = document.getElementById('chore-assignee').value.trim();
      const frequency = document.getElementById('chore-freq').value;
      if (!name) return;
      push(ref(database, `${basePath}/household/chores`), {
        name, assignee, frequency, lastDone: 0, createdAt: Date.now(),
      });
      e.target.reset();
      document.getElementById('chore-freq').value = 'weekly';
      document.getElementById('chore-name').focus();
    });

    document.querySelectorAll('.filters button').forEach(btn => {
      btn.addEventListener('click', () => {
        currentFilter = btn.dataset.filter;
        document.querySelectorAll('.filters button').forEach(b => b.classList.toggle('active', b === btn));
        render();
      });
    });

    function statusOf(chore) {
      const interval = (intervals[chore.frequency] || 7) * dayMs;
      const due = (chore.lastDone || 0) + interval;
      const now = Date.now();
      if (now > due) return 'overdue';
      if (due - now < 2 * dayMs) return 'due';
      return 'ok';
    }

    function lastDoneLabel(ms) {
      if (!ms) return 'never done';
      const days = Math.floor((Date.now() - ms) / dayMs);
      if (days === 0) return 'today';
      if (days === 1) return '1 day ago';
      return `${days} days ago`;
    }

    function render() {
      const list = document.getElementById('chore-list');
      const entries = Object.entries(currentChores)
        .map(([id, c]) => ({ id, ...c, status: statusOf(c) }))
        .filter(c => currentFilter === 'all' || c.status === currentFilter)
        .sort((a, b) => {
          const order = { overdue: 0, due: 1, ok: 2 };
          if (order[a.status] !== order[b.status]) return order[a.status] - order[b.status];
          return (a.lastDone || 0) - (b.lastDone || 0);
        });

      if (!entries.length) {
        list.innerHTML = `<li class="empty">${currentFilter === 'all' ? 'No chores yet. Add one above.' : `Nothing in "${currentFilter}".`}</li>`;
        return;
      }

      list.innerHTML = '';
      entries.forEach(c => {
        const li = document.createElement('li');
        if (c.status === 'overdue') li.classList.add('overdue');
        const tagLabel = c.status === 'overdue' ? 'overdue' : c.status === 'due' ? 'due soon' : 'on track';
        li.innerHTML = `
          <div>
            <span class="name">${escapeHtml(c.name)}</span>
            <span class="sub">${escapeHtml(c.assignee || 'unassigned')} · ${c.frequency} · ${lastDoneLabel(c.lastDone)}</span>
          </div>
          <span class="tag ${c.status}">${tagLabel}</span>
          <button class="done-btn" data-id="${c.id}">✓ Done</button>
          <button class="del" data-id="${c.id}" title="Delete">✕</button>
        `;
        list.appendChild(li);
      });

      list.querySelectorAll('.done-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          update(ref(database, `${basePath}/household/chores/${btn.dataset.id}`), { lastDone: Date.now() });
        });
      });

      list.querySelectorAll('.del').forEach(btn => {
        btn.addEventListener('click', () => {
          if (confirm('Delete this chore?')) {
            remove(ref(database, `${basePath}/household/chores/${btn.dataset.id}`));
          }
        });
      });
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
  </script>
</body>
</html>
