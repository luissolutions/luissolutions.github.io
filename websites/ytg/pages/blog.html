<style>
  .blog-grid {
    max-width: 1040px;
    margin: 20px auto 0;
    display: grid;
    gap: 16px;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  }
  .blog-post {
    background: linear-gradient(180deg, #2d2d2d 0%, #252525 100%);
    border: 1px solid #4a4a4a;
    border-radius: 12px;
    padding: 20px;
    text-align: left;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .blog-post::before {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    height: 8px;
    background: linear-gradient(90deg, var(--primaryColor), var(--secondaryColor));
  }
  .blog-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 8px 0 2px;
  }
  .blog-tag {
    background: var(--secondaryColor);
    color: var(--textColor);
    padding: 2px 10px;
    border-radius: 20px;
    font-size: .72rem;
    font-weight: 600;
  }
  .blog-date { font-size: .78rem; color: #888; margin: 2px 0 8px; }
  .blog-read-btn {
    margin-top: 10px;
    background: var(--primaryColor);
    color: var(--textColor);
    border: none;
    border-radius: 6px;
    padding: 9px 20px;
    cursor: pointer;
    font-size: .9rem;
    font-weight: 600;
  }
  .blog-shell {
    max-width: 1040px;
    margin: 0 auto;
    background: #202020;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 16px;
  }
  .blog-back-btn {
    background: none;
    border: 1px solid #555;
    color: var(--textColor);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 12px;
  }
  .guide-section {
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 10px;
    padding: 14px;
    margin: 12px 0;
  }
  .article-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin: 0 0 10px;
    color: #b8b8b8;
    font-size: .82rem;
  }
  .guide-summary {
    color: #bfc7d4;
    margin: 0 0 8px;
    line-height: 1.45;
    font-size: .92rem;
  }
  .guide-note {
    margin: 8px 0;
    border-radius: 8px;
    padding: 10px 12px;
    border: 1px solid #40516e;
    background: #1d2738;
    color: #d6e6ff;
    font-size: .86rem;
  }
  .guide-note.warn {
    border-color: #71511d;
    background: #332710;
    color: #ffe6ba;
  }
  .cmd-block {
    margin-top: 8px;
  }
  .cmd-label {
    font-size: .75rem;
    color: #9fb1cf;
    margin-bottom: 4px;
  }
  .guide-img-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 10px;
    margin-top: 10px;
  }
  .guide-figure {
    margin: 0;
    border: 1px solid #3c4863;
    border-radius: 10px;
    overflow: hidden;
    background: #1d2432;
  }
  .guide-figure img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    display: block;
    cursor: zoom-in;
  }
  .guide-figure figcaption {
    padding: 8px 10px;
    color: #bdcbe1;
    font-size: .78rem;
  }
  .guide-section h3 {
    margin: 0 0 10px;
    color: #fff;
    font-size: 1.05rem;
  }
  .guide-section p {
    margin: 6px 0;
    color: #cfcfcf;
    line-height: 1.5;
  }
  .guide-section ol, .guide-section ul {
    margin: 8px 0 8px 20px;
    color: #ddd;
  }
  .guide-section li { margin: 6px 0; }
  .guide-cmd {
    background: #0f141f;
    border: 1px solid #29384f;
    border-radius: 8px;
    padding: 10px 12px;
    overflow: auto;
    color: #dce9ff;
    font-family: Consolas, monospace;
    font-size: .84rem;
    margin-top: 8px;
    white-space: pre-wrap;
  }
  .guide-links {
    display: grid;
    gap: 6px;
    margin-top: 8px;
  }
  .guide-links a { color: #9fc2ff; text-decoration: none; }
  .guide-links a:hover { text-decoration: underline; }
  #blog-error { color: #f88; padding: 12px 0; }
</style>

<section class="blog" id="blog-root">
  <h2 id="blog-title">Latest Articles and Guides</h2>
  <div id="blog-body"><p style="color:#aaa">Loading...</p></div>
</section>

<script>
(async () => {
  const title = document.getElementById('blog-title');
  const body = document.getElementById('blog-body');

  const hash = (location.hash || '#blog').replace('#', '');
  const isArticleRoute = hash.startsWith('blog/');
  const slug = isArticleRoute ? hash.split('/')[1]?.replace(/[^a-z0-9_-]/gi, '') : '';

  function esc(s) {
    return String(s ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function renderSection(section) {
    const text = (section.text || []).map(t => `<p>${esc(t)}</p>`).join('');
    const summary = section.summary ? `<p class="guide-summary">${esc(section.summary)}</p>` : '';
    const steps = (section.steps || []).length
      ? `<ol>${section.steps.map(s => `<li>${esc(s)}</li>`).join('')}</ol>`
      : '';
    const commands = (section.commands || []).length
      ? section.commands.map(c => {
          const label = typeof c === 'string' ? 'Command' : (c.label || 'Command');
          const value = typeof c === 'string' ? c : (c.value || '');
          const isUrl = /^https?:\/\//i.test(value.trim());

          if (isUrl) {
            return `<div class="guide-links"><a href="${esc(value)}" target="_blank" rel="noopener noreferrer">${esc(label)}</a></div>`;
          }

          return `<div class="cmd-block">
            <div class="cmd-label">${esc(label)}</div>
            <div class="guide-cmd">${esc(value)}</div>
          </div>`;
        }).join('')
      : '';
    const notes = (section.notes || []).length
      ? section.notes.map(n => `<div class="guide-note ${esc(n.tone || 'info')}">${esc(n.text || '')}</div>`).join('')
      : '';
    const links = (section.links || []).length
      ? `<div class="guide-links">${section.links.map(l => `<a href="${esc(l.url)}" target="_blank" rel="noopener noreferrer">${esc(l.label)}</a>`).join('')}</div>`
      : '';
    const resources = (section.resources || []).length
      ? `<div class="guide-links">${section.resources.map(l => `<a href="${esc(l.url)}" target="_blank" rel="noopener noreferrer">${esc(l.label)}</a>`).join('')}</div>`
      : '';
    const images = (section.images || []).length
      ? `<div class="guide-img-grid">${section.images.map(img => `
          <figure class="guide-figure">
            <a href="${esc(img.src)}" target="_blank" rel="noopener noreferrer">
              <img src="${esc(img.src)}" alt="${esc(img.alt || img.caption || 'Guide image')}" loading="lazy">
            </a>
            <figcaption>${esc(img.caption || '')}</figcaption>
          </figure>
        `).join('')}</div>`
      : '';

    return `
      <section class="guide-section">
        <h3>${esc(section.title || 'Section')}</h3>
        ${summary}
        ${text}
        ${steps}
        ${commands}
        ${notes}
        ${links}
        ${resources}
        ${images}
      </section>
    `;
  }

  async function loadGuides() {
    const res = await fetch('assets/js/guides.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('fetch failed');
    return res.json();
  }

  async function loadBlogIndex() {
    title.textContent = 'Latest Articles and Guides';
    const guides = await loadGuides();

    body.innerHTML = `<div class="blog-grid">${guides.map(g => `
      <article class="blog-post">
        <div class="blog-tags">${(g.tags || []).map(t => `<span class="blog-tag">${esc(t)}</span>`).join('')}</div>
        <h3>${esc(g.title)}</h3>
        <p class="blog-date">${esc(g.date)}</p>
        <p>${esc(g.description)}</p>
        <button class="blog-read-btn" data-guide="${esc(g.slug)}">Read More</button>
      </article>
    `).join('')}</div>`;
  }

  async function loadArticle(articleSlug) {
    if (!articleSlug) throw new Error('missing slug');

    const guides = await loadGuides();
    const found = guides.find(g => g.slug === articleSlug);
    if (!found) throw new Error('not found');

    title.textContent = found.title || 'Article';
    body.innerHTML = `
      <div class="blog-shell">
        <button class="blog-back-btn" data-page="blog">Back to all articles</button>
        <div class="article-meta">
          <span>Date: ${esc(found.date || '')}</span>
          <span>Audience: ${esc(found.audience || 'General')}</span>
        </div>
        ${(found.sections || []).map(renderSection).join('')}
      </div>
    `;
  }

  try {
    if (isArticleRoute) {
      await loadArticle(slug);
    } else {
      await loadBlogIndex();
    }
  } catch (e) {
    body.innerHTML = '<p id="blog-error">Could not load content. Please try again.</p>';
  }
})();
</script>
