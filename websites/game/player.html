<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
        #game { width: 100%; height: 100%; }
    </style>
    <script>
        const cfg = window.parent?.playerConfig;
        if (cfg) {
            EJS_player        = "#game";
            EJS_core          = cfg.core;
            EJS_gameUrl       = cfg.gameUrl;
            EJS_pathtodata    = cfg.pathtodata;
            EJS_startOnLoaded = true;
            EJS_onGameStart   = cfg.onGameStart;
            EJS_onLoadSave    = cfg.onLoadSave;
            EJS_onSaveSave    = cfg.onSaveSave;
            if (cfg.perfMode) EJS_threads = false;
        }
    </script>
</head>
<body>
    <div id="game"></div>
    <script src="https://cdn.emulatorjs.org/latest/data/loader.js"></script>
</body>
</html>
