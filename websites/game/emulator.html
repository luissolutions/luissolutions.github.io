<!DOCTYPE html>
<html>
<head>
    <title>Emulator — Game Library</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../../assets/css/app-styles.css">
    <style>
        * { box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            background: #1a1a1a;
            color: #ccc;
            font-family: monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        /* ── HEADER ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: #111;
            border-bottom: 1px solid #333;
            flex-wrap: wrap;
            gap: 10px;
        }
        header h1 { margin: 0; font-size: 1rem; color: #fff; }

        #auth-section { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        #auth-section input {
            padding: 4px 8px; border-radius: 4px; border: 1px solid #555;
            background: #2a2a2a; color: #fff; font-size: .85rem; width: 140px;
        }
        #auth-section button {
            padding: 4px 12px; font-size: .85rem; cursor: pointer;
            border-radius: 4px; border: none; background: #e65c00; color: #fff;
        }
        #user-status { font-size: .82rem; color: #888; }

        /* ── LAYOUT ── */
        #app { display: flex; flex: 1; overflow: hidden; min-height: 0; }

        /* ── SIDEBAR ── */
        #sidebar {
            width: 300px;
            min-width: 260px;
            background: #222;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            transition: width .2s, min-width .2s;
            overflow: hidden;
        }
        #sidebar.collapsed { width: 0; min-width: 0; border-right: none; }

        #system-tabs {
            display: flex;
            flex-wrap: wrap;
            border-bottom: 1px solid #333;
            padding: 8px 8px 0;
            gap: 4px;
        }
        .sys-tab {
            padding: 5px 10px;
            border-radius: 4px 4px 0 0;
            border: 1px solid #444;
            border-bottom: none;
            background: #2a2a2a;
            color: #888;
            cursor: pointer;
            font-size: .8rem;
            font-family: monospace;
        }
        .sys-tab.active { background: #e65c00; color: #fff; border-color: #e65c00; }
        .sys-tab:hover:not(.active) { background: #333; color: #ccc; }

        #search-wrap { padding: 10px; }
        #search {
            width: 100%;
            padding: 6px 10px;
            border-radius: 4px;
            border: 1px solid #444;
            background: #1a1a1a;
            color: #ccc;
            font-size: .85rem;
            font-family: monospace;
        }

        #rom-count { padding: 0 10px 6px; font-size: .78rem; color: #666; }

        #game-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 6px 10px;
        }
        #game-list::-webkit-scrollbar { width: 6px; }
        #game-list::-webkit-scrollbar-track { background: #1a1a1a; }
        #game-list::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

        .game-entry {
            padding: 7px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: .82rem;
            color: #bbb;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .game-entry:hover { background: #333; color: #fff; }
        .game-entry.active { background: #e65c00; color: #fff; }

        #list-placeholder {
            padding: 20px 10px;
            color: #555;
            font-size: .82rem;
            text-align: center;
        }

        /* ── MAIN AREA ── */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #controls {
            display: flex;
            gap: 8px;
            padding: 8px 16px;
            background: #1e1e1e;
            border-bottom: 1px solid #333;
            align-items: center;
            flex-wrap: wrap;
        }
        #controls button {
            padding: 6px 14px;
            border-radius: 4px;
            border: none;
            background: #333;
            color: #ccc;
            cursor: pointer;
            font-size: .85rem;
            font-family: monospace;
        }
        #controls button:hover { background: #444; color: #fff; }
        #controls button.primary { background: #e65c00; color: #fff; }
        #controls button.primary:hover { background: #cc4f00; }
        #controls button:disabled { opacity: .35; cursor: default; }

        /* Slot buttons */
        .slot-group {
            display: flex;
            align-items: center;
            gap: 4px;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 2px 6px;
        }
        .slot-group label { font-size: .75rem; color: #666; margin-right: 2px; }
        .slot-btn {
            padding: 3px 8px !important;
            font-size: .78rem !important;
            background: #2a2a2a !important;
        }
        .slot-btn.active-slot { background: #e65c00 !important; color: #fff !important; }

        #perf-label {
            font-size: .75rem;
            color: #666;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            white-space: nowrap;
            user-select: none;
        }
        #perf-label input { cursor: pointer; accent-color: #e65c00; }

        #save-status {
            margin-left: auto;
            font-size: .8rem;
            color: #666;
            min-width: 0;
            text-align: right;
            flex-shrink: 1;
        }
        #save-status.ok  { color: #6c6; }
        #save-status.err { color: #f66; }
        #save-status.info { color: #6af; }

        /* ── RESIZE HANDLE (mobile only, hidden on desktop) ── */
        #resize-handle {
            display: none;
            height: 10px;
            background: #2a2a2a;
            border-top: 1px solid #555;
            border-bottom: 1px solid #555;
            cursor: ns-resize;
            order: 2;
            flex-shrink: 0;
            touch-action: none;
        }
        #resize-handle::before {
            content: '';
            display: block;
            width: 36px;
            height: 3px;
            background: #555;
            border-radius: 2px;
            margin: 3px auto 0;
        }

        /* ── MOBILE ── */
        @media (max-width: 600px) {
            #app { flex-direction: column; }

            #sidebar {
                order: 3;
                width: 100% !important;
                min-width: 0 !important;
                height: 38vh;
                min-height: 80px;
                border-right: none !important;
                border-top: 1px solid #333;
                transition: height .15s;
            }
            /* on mobile, collapsed class has no effect — always visible */
            #sidebar.collapsed {
                width: 100% !important;
                min-width: 0 !important;
                height: 38vh !important;
            }

            #main { order: 1; }
            #resize-handle { display: block; }
            #btn-toggle-sidebar { display: none; }

            header { padding: 8px 12px; }
            #auth-section input { width: 110px; }
            #controls { padding: 6px 8px; gap: 5px; }
            #controls button { padding: 5px 9px; font-size: .78rem; }
            .slot-group label { display: none; }
        }

        /* ── LANDSCAPE FULLSCREEN ── */
        #float-btn {
            display: none;
            position: fixed;
            top: 8px;
            right: 8px;
            z-index: 50;
            background: rgba(0,0,0,.55);
            color: #ccc;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: .85rem;
            cursor: pointer;
            font-family: monospace;
        }
        #float-panel {
            display: none;
            position: fixed;
            top: 36px;
            right: 8px;
            z-index: 50;
            background: rgba(20,20,20,.92);
            border: 1px solid #444;
            border-radius: 6px;
            padding: 8px;
            flex-direction: column;
            gap: 6px;
        }
        #float-panel button {
            padding: 6px 14px;
            border-radius: 4px;
            border: none;
            background: #333;
            color: #ccc;
            cursor: pointer;
            font-size: .82rem;
            font-family: monospace;
            white-space: nowrap;
        }
        #float-panel button.primary { background: #e65c00; color: #fff; }
        #float-panel button:disabled { opacity: .35; cursor: default; }
        #float-status {
            font-size: .75rem;
            color: #888;
            text-align: center;
            min-height: 14px;
        }

        @media (orientation: landscape) and (max-height: 500px) {
            header   { display: none; }
            #controls { display: none; }
            #sidebar  { display: none !important; }
            #resize-handle { display: none !important; }
            #app      { height: 100dvh; }
            #float-btn { display: block; }
            /* EmulatorJS virtual gamepad */
            .ejs_virtualGamepad,
            .ejs_gamepad_container { display: none !important; }
        }

        #emulator-wrap {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
            overflow: hidden;
        }

        #drop-prompt {
            color: #444;
            font-size: 1rem;
            text-align: center;
            line-height: 2;
        }
        #drop-prompt span { display: block; font-size: .8rem; color: #333; }

        #game { width: 100%; height: 100%; }
    </style>
</head>
<body>

<header>
    <div style="display:flex;align-items:center;gap:14px;flex-shrink:0;">
        <a href="index.html" style="color:#888;font-size:.78rem;text-decoration:none;white-space:nowrap;">&#9733; Hub</a>
        <h1>🎮 Game Library</h1>
    </div>
    <div id="auth-section">
        <div id="login-fields" style="display:flex;gap:8px;align-items:center;">
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-password" placeholder="Password">
            <button id="login-btn">Login</button>
        </div>
        <div id="logout-fields" style="display:none;gap:8px;align-items:center;">
            <span id="user-status"></span>
            <button id="logout-btn">Logout</button>
        </div>
    </div>
</header>

<div id="app">

    <div id="sidebar">
        <div id="system-tabs"></div>
        <div id="search-wrap">
            <input type="text" id="search" placeholder="Search games…">
        </div>
        <div id="rom-count"></div>
        <div id="game-list">
            <div id="list-placeholder">Select a system above</div>
        </div>
    </div>

    <div id="resize-handle"></div>
    <div id="main">
        <div id="controls">
            <button id="btn-toggle-sidebar" title="Toggle game list">◀</button>
            <div class="slot-group">
                <label>SLOT</label>
                <button class="slot-btn active-slot" data-slot="1">1</button>
                <button class="slot-btn" data-slot="2">2</button>
                <button class="slot-btn" data-slot="3">3</button>
            </div>
            <button id="btn-quick-save" disabled>Quick Save</button>
            <button id="btn-load" disabled>Load Slot</button>
            <button id="btn-save-quit" class="primary" disabled>Save &amp; Quit</button>
            <label id="perf-label" title="Disable threading for slower/older hardware">
                <input type="checkbox" id="perf-mode"> Perf
            </label>
            <div id="save-status"></div>
        </div>
        <div id="emulator-wrap">
            <div id="drop-prompt">
                ← Select a game from the library
                <span>SNES · GBA · N64 · NDS · PS1</span>
            </div>
        </div>
    </div>

    <!-- Float panel lives outside emulator-wrap so wrap.innerHTML resets don't destroy it -->
    <button id="float-btn">☰</button>
    <div id="float-panel">
        <div class="slot-group" style="border-color:#444;">
            <label style="color:#666;font-size:.72rem;margin-right:2px;">SLOT</label>
            <button class="float-slot-btn" data-slot="1" style="padding:3px 8px;font-size:.75rem;background:#2a2a2a;border-radius:3px;border:none;color:#ccc;cursor:pointer;">1</button>
            <button class="float-slot-btn" data-slot="2" style="padding:3px 8px;font-size:.75rem;background:#2a2a2a;border-radius:3px;border:none;color:#ccc;cursor:pointer;">2</button>
            <button class="float-slot-btn" data-slot="3" style="padding:3px 8px;font-size:.75rem;background:#2a2a2a;border-radius:3px;border:none;color:#ccc;cursor:pointer;">3</button>
        </div>
        <button id="float-quick-save" disabled>Quick Save</button>
        <button id="float-load" disabled>Load Slot</button>
        <button id="float-save-quit" class="primary" disabled>Save &amp; Quit</button>
        <div id="float-status"></div>
    </div>

</div>

<script type="module">

    import {
        auth, database, ref, set, get,
        onAuthStateChanged, signInWithEmailAndPassword, signOut
    } from "../../assets/js/firebase-init.js";

    /* ── RTDB SAVE HELPERS ── */
    function toB64(bytes) {
        let s = "";
        for (let i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
        return btoa(s);
    }
    function fromB64(b64) {
        const s = atob(b64);
        const out = new Uint8Array(s.length);
        for (let i = 0; i < s.length; i++) out[i] = s.charCodeAt(i);
        return out;
    }
    async function dbSave(path, bytes) {
        await set(ref(database, path), { d: toB64(bytes), ts: Date.now() });
    }
    async function dbLoad(path) {
        const snap = await get(ref(database, path));
        if (!snap.exists()) throw new Error("no save");
        return fromB64(snap.val().d);
    }

    /* ── CONFIG ── */

    const ROM_SERVER    = "https://roms.luissolutions.us/roms";
    const AUTO_SAVE_MS  = 30000;   // 30s auto-save interval
    const READY_POLL_MS = 250;     // how often to poll for emulator ready
    const READY_TIMEOUT = 15000;   // max wait for emulator ready

    const SYSTEMS = [
        { id: "snes", name: "SNES", folder: "snes_roms", core: "snes", exts: ["smc","sfc","zip"] },
        { id: "gba",  name: "GBA",  folder: "gba_roms",  core: "gba",  exts: ["gba","zip"] },
        { id: "n64",  name: "N64",  folder: "n64_roms",  core: "n64",  exts: ["z64","n64","v64","zip"] },
        { id: "nds",  name: "NDS",  folder: "ds_roms",   core: "nds",  exts: ["nds","zip"] },
        { id: "ps1",  name: "PS1",  folder: "ps1_roms",  core: "psx",  exts: ["bin","iso","zip"] },
    ];

    /* ── STATUS ── */

    const statusEl = document.getElementById("save-status");
    let statusTimer = null;
    function setStatus(msg, type = "", persist = false) {
        clearTimeout(statusTimer);
        statusEl.textContent = msg;
        statusEl.className = type;
        const fs = document.getElementById("float-status");
        if (fs) fs.textContent = msg;
        if (!persist && type === "ok") {
            statusTimer = setTimeout(() => {
                statusEl.textContent = "";
                statusEl.className = "";
                if (fs) fs.textContent = "";
            }, 4000);
        }
    }

    /* ── SLOT MANAGEMENT ── */

    let currentSlot = 1;

    /* ── PERF MODE ── */

    const perfCheckbox = document.getElementById("perf-mode");
    perfCheckbox.checked = localStorage.getItem("ejs-perf-mode") === "1";
    perfCheckbox.onchange = () => localStorage.setItem("ejs-perf-mode", perfCheckbox.checked ? "1" : "0");

    /* ── SLOT ── */

    document.querySelectorAll(".slot-btn").forEach(btn => {
        btn.onclick = () => {
            currentSlot = parseInt(btn.dataset.slot);
            document.querySelectorAll(".slot-btn").forEach(b => b.classList.remove("active-slot"));
            btn.classList.add("active-slot");
            setStatus(`Slot ${currentSlot} selected.`);
        };
    });

    function slotKey() {
        if (!window.EJS_core || !window.EJS_gameName) return null;
        return `emu:lastslot:${window.EJS_core}:${window.EJS_gameName}`;
    }

    /* ── SIDEBAR TOGGLE (desktop only) ── */

    const sidebarEl     = document.getElementById("sidebar");
    const toggleSideBtn = document.getElementById("btn-toggle-sidebar");

    toggleSideBtn.onclick = () => {
        const collapsed = sidebarEl.classList.toggle("collapsed");
        toggleSideBtn.textContent = collapsed ? "▶" : "◀";
    };

    /* ── RESIZE HANDLE (mobile) ── */

    const resizeHandle = document.getElementById("resize-handle");
    let resizing = false;
    let resizeStartY = 0;
    let resizeStartH = 0;

    function startResize(y) {
        resizing = true;
        resizeStartY = y;
        resizeStartH = sidebarEl.getBoundingClientRect().height;
    }
    function doResize(y) {
        if (!resizing) return;
        const delta = resizeStartY - y;
        const newH = Math.max(80, Math.min(window.innerHeight * 0.75, resizeStartH + delta));
        sidebarEl.style.height = newH + "px";
    }
    function stopResize() { resizing = false; }

    resizeHandle.addEventListener("mousedown",  e => startResize(e.clientY));
    document.addEventListener("mousemove",      e => doResize(e.clientY));
    document.addEventListener("mouseup",        stopResize);
    resizeHandle.addEventListener("touchstart", e => { e.preventDefault(); startResize(e.touches[0].clientY); }, { passive: false });
    document.addEventListener("touchmove",      e => { if (resizing) { e.preventDefault(); doResize(e.touches[0].clientY); } }, { passive: false });
    document.addEventListener("touchend",       stopResize);

    function rememberSlot() {
        const k = slotKey();
        if (k) localStorage.setItem(k, currentSlot);
    }

    function recallSlot() {
        const k = slotKey();
        if (!k) return;
        const saved = parseInt(localStorage.getItem(k) || "1");
        currentSlot = saved;
        document.querySelectorAll(".slot-btn").forEach(b => {
            b.classList.toggle("active-slot", parseInt(b.dataset.slot) === currentSlot);
        });
    }

    /* ── GAME BUTTONS ── */

    function setGameButtons(enabled) {
        ["btn-quick-save", "btn-load", "btn-save-quit",
         "float-quick-save", "float-load", "float-save-quit"].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.disabled = !enabled;
        });
    }

    /* ── FLOAT PANEL (landscape) ── */

    const floatBtn   = document.getElementById("float-btn");
    const floatPanel = document.getElementById("float-panel");
    const floatStatus = document.getElementById("float-status");
    let floatAutoHide = null;

    function showFloatPanel() {
        floatPanel.style.display = "flex";
        clearTimeout(floatAutoHide);
        floatAutoHide = setTimeout(hideFloatPanel, 4000);
    }
    function hideFloatPanel() { floatPanel.style.display = "none"; }

    floatBtn.onclick = () => {
        floatPanel.style.display === "flex" ? hideFloatPanel() : showFloatPanel();
    };

    // Mirror slot selection in float panel
    document.querySelectorAll(".float-slot-btn").forEach(btn => {
        btn.onclick = () => {
            currentSlot = parseInt(btn.dataset.slot);
            document.querySelectorAll(".slot-btn").forEach(b => b.classList.toggle("active-slot", parseInt(b.dataset.slot) === currentSlot));
            document.querySelectorAll(".float-slot-btn").forEach(b => b.style.background = parseInt(b.dataset.slot) === currentSlot ? "#e65c00" : "#2a2a2a");
            floatStatus.textContent = `Slot ${currentSlot} selected.`;
            showFloatPanel();
        };
    });

    document.getElementById("float-quick-save").onclick = () => {
        document.getElementById("btn-quick-save").onclick();
        showFloatPanel();
    };
    document.getElementById("float-load").onclick = () => {
        document.getElementById("btn-load").onclick();
        showFloatPanel();
    };
    document.getElementById("float-save-quit").onclick = () => {
        document.getElementById("btn-save-quit").onclick();
        hideFloatPanel();
    };

    // Auto-fullscreen on landscape rotation
    window.addEventListener("orientationchange", () => {
        setTimeout(() => {
            const landscape = window.innerWidth > window.innerHeight;
            if (landscape && document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else if (!landscape && document.fullscreenElement) {
                document.exitFullscreen().catch(() => {});
            }
        }, 300);
    });

    /* ── AUTH ── */

    let DATABASE_BASE_PATH = "public";
    let authResolved = false;
    let currentUser = null;

    document.getElementById("login-btn").onclick = async () => {
        try {
            await signInWithEmailAndPassword(
                auth,
                document.getElementById("login-email").value,
                document.getElementById("login-password").value
            );
        } catch (err) { setStatus("Login failed: " + err.message, "err"); }
    };

    document.getElementById("logout-btn").onclick = () => signOut(auth);

    function waitForAuth() {
        return new Promise(resolve => {
            if (authResolved) return resolve();
            const unsub = onAuthStateChanged(auth, user => {
                DATABASE_BASE_PATH = user ? user.uid : "public";
                authResolved = true;
                unsub();
                resolve();
            });
        });
    }

    onAuthStateChanged(auth, user => {
        currentUser = user;
        DATABASE_BASE_PATH = user ? user.uid : "public";
        authResolved = true;
        const lf = document.getElementById("login-fields");
        const lo = document.getElementById("logout-fields");
        if (user) {
            lf.style.display = "none";
            lo.style.display = "flex";
            document.getElementById("user-status").textContent = user.email;
            // Refresh list if a system tab is already selected
            if (activeSystem) {
                const activeTab = document.querySelector(".sys-tab.active");
                if (activeTab) loadSystem(activeSystem, activeTab);
            }
        } else {
            lf.style.display = "flex";
            lo.style.display = "none";
            document.getElementById("user-status").textContent = "";
            listEl.innerHTML = '<div id="list-placeholder">Login to browse the library.</div>';
            countEl.textContent = "";
            allRoms = [];
        }
    });

    /* ── PATH HELPERS ── */

    function sanitizeKey(s) {
        return s.replace(/[.#$[\]\s/]/g, '_').replace(/_+/g, '_').replace(/^_|_$/g, '');
    }

    function getBatteryPath() {
        if (!window.EJS_core || !window.EJS_gameName) return null;
        return `${DATABASE_BASE_PATH}/emu/battery/${window.EJS_core}/${sanitizeKey(window.EJS_gameName)}`;
    }

    function getStatePath(slot = currentSlot) {
        if (!window.EJS_core || !window.EJS_gameName) return null;
        return `${DATABASE_BASE_PATH}/emu/states/${window.EJS_core}/${sanitizeKey(window.EJS_gameName)}/s${slot}`;
    }

    /* ── EMULATOR API HELPERS ── */

    function getEmuObjects() {
        const iframeWin = document.getElementById('ejs-frame')?.contentWindow;
        const emu = iframeWin?.EJS_emulator;
        const gm  = emu?.gameManager ?? emu ?? null;
        return { emu, gm };
    }

    function getGameManager() {
        return getEmuObjects().gm;
    }

    async function waitForEmulatorReady() {
        const deadline = Date.now() + READY_TIMEOUT;
        while (Date.now() < deadline) {
            const { emu, gm } = getEmuObjects();
            // try gameManager first, fall back to emu directly
            const target = (gm?.loadState && gm?.getState) ? gm
                         : (emu?.loadState && emu?.getState) ? emu
                         : null;
            if (target) return true;
            await new Promise(r => setTimeout(r, READY_POLL_MS));
        }
        return false;
    }

    async function captureState() {
        const { emu, gm } = getEmuObjects();
        console.log('[EJS Save] emu:', !!emu, '| gm:', !!gm,
            '| gm.getState:', typeof gm?.getState,
            '| emu.getState:', typeof emu?.getState,
            '| emu keys:', emu ? Object.keys(emu).filter(k => /state|save|load/i.test(k)) : []);
        const target = gm?.getState ? gm : emu?.getState ? emu : null;
        if (!target) return null;
        try {
            let raw = target.getState();
            if (raw?.then) raw = await raw;
            console.log('[EJS Save] raw type:', typeof raw, '| byteLength:', raw?.byteLength, '| constructor:', raw?.constructor?.name);
            if (!raw || typeof raw.byteLength !== 'number') return null;
            const out = new Uint8Array(raw.byteLength);
            out.set(raw);
            return out;
        } catch(e) { console.error('[EJS Save] captureState threw:', e); return null; }
    }

    async function applyState(bytes) {
        const { emu, gm } = getEmuObjects();
        const target = gm?.loadState ? gm : emu?.loadState ? emu : null;
        if (!target) return false;
        try {
            target.loadState(bytes instanceof Uint8Array ? bytes : new Uint8Array(bytes));
            return true;
        } catch { return false; }
    }

    /* ── ROM BROWSER ── */

    const tabsEl   = document.getElementById("system-tabs");
    const listEl   = document.getElementById("game-list");
    const searchEl = document.getElementById("search");
    const countEl  = document.getElementById("rom-count");

    let allRoms      = [];
    let activeSystem = null;
    let activeEntry  = null;

    SYSTEMS.forEach(sys => {
        const tab = document.createElement("div");
        tab.className = "sys-tab";
        tab.textContent = sys.name;
        tab.onclick = () => loadSystem(sys, tab);
        tabsEl.appendChild(tab);
    });

    async function loadSystem(sys, tab) {
        document.querySelectorAll(".sys-tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        activeSystem = sys;
        if (!currentUser) {
            listEl.innerHTML = '<div id="list-placeholder">Login to browse the library.</div>';
            countEl.textContent = "";
            return;
        }
        listEl.innerHTML = '<div id="list-placeholder">Loading…</div>';
        countEl.textContent = "";
        searchEl.value = "";
        try {
            const res = await fetch(`${ROM_SERVER}/${sys.folder}/`);
            if (!res.ok) throw new Error("Server returned " + res.status);
            const files = await res.json();
            allRoms = files
                .filter(f => f.type === "file" && sys.exts.includes(f.name.split(".").pop().toLowerCase()))
                .map(f => f.name)
                .sort((a, b) => a.localeCompare(b));
            renderList(allRoms, sys);
        } catch (err) {
            listEl.innerHTML = `<div id="list-placeholder">Could not reach ROM server.<br>${err.message}</div>`;
        }
    }

    function renderList(roms, sys) {
        countEl.textContent = `${roms.length} games`;
        if (!roms.length) { listEl.innerHTML = '<div id="list-placeholder">No games found.</div>'; return; }
        listEl.innerHTML = "";
        roms.forEach(name => {
            const el = document.createElement("div");
            el.className = "game-entry";
            el.title = name;
            el.textContent = name.replace(/\.[^.]+$/, "");
            el.onclick = () => launchRom(name, sys, el);
            listEl.appendChild(el);
        });
    }

    searchEl.oninput = () => {
        if (!activeSystem) return;
        const q = searchEl.value.toLowerCase();
        renderList(allRoms.filter(n => n.toLowerCase().includes(q)), activeSystem);
    };

    /* ── LAUNCH ROM ── */

    let CLOUD_BATTERY    = null;
    let autoSaveInterval = null;
    let launchSeq        = 0; // incremented on every launch; stale launches bail on mismatch

    async function launchRom(filename, sys, entryEl) {
        if (!currentUser) { setStatus("Login to play games.", "err"); return; }

        const mySeq = ++launchSeq;

        if (activeEntry) activeEntry.classList.remove("active");
        activeEntry = entryEl;
        entryEl.classList.add("active");

        stopAutoSave();
        setGameButtons(false);
        setStatus("Loading…", "info", true);

        await destroyEmulator();
        if (launchSeq !== mySeq) return; // superseded by a newer click

        await waitForAuth();
        if (launchSeq !== mySeq) return;

        window.EJS_core     = sys.core;
        window.EJS_gameName = filename.replace(/\.[^.]+$/, "");

        recallSlot();
        setStatus("Fetching cloud save…", "info", true);

        const bPath = getBatteryPath();
        if (bPath) {
            try { CLOUD_BATTERY = await dbLoad(bPath); }
            catch { CLOUD_BATTERY = null; }
        } else {
            CLOUD_BATTERY = null;
        }
        if (launchSeq !== mySeq) return; // superseded during battery fetch

        window.playerConfig = {
            core:       sys.core,
            gameUrl:    `${ROM_SERVER}/${sys.folder}/${encodeURIComponent(filename)}`,
            pathtodata: "https://cdn.emulatorjs.org/latest/data/",
            perfMode:   perfCheckbox.checked,
            onGameStart: async function () {
                if (launchSeq !== mySeq) return;
                setGameButtons(true);
                setStatus("Loading… waiting for core to be ready.", "info", true);

                const ready = await waitForEmulatorReady();
                if (launchSeq !== mySeq) return;
                if (!ready) {
                    setStatus("Core ready timeout — saves may not work.", "err");
                    startAutoSave();
                    return;
                }

                const sPath = getStatePath();
                if (sPath) {
                    try {
                        const bytes = await dbLoad(sPath);
                        if (launchSeq !== mySeq) return;
                        const ok = await applyState(bytes);
                        setStatus(ok ? `Slot ${currentSlot} restored.` : "State load failed.", ok ? "ok" : "err");
                    } catch {
                        setStatus("No save found — starting fresh.", "");
                    }
                } else {
                    setStatus("Running.", "ok");
                }

                startAutoSave();
            },
            onLoadSave: function () { return CLOUD_BATTERY || null; },
            onSaveSave: function (data) {
                if (!data || data.byteLength === 0) return;
                const path = getBatteryPath();
                if (!path) return;
                clearTimeout(batteryTimer);
                batteryTimer = setTimeout(async () => {
                    try { await dbSave(path, new Uint8Array(data)); }
                    catch { /* silent */ }
                }, 1500);
            }
        };

        const wrap = document.getElementById("emulator-wrap");
        wrap.innerHTML = '';
        const iframe = document.createElement('iframe');
        iframe.id = 'ejs-frame';
        iframe.src = 'player.html?t=' + Date.now();
        iframe.style.cssText = 'width:100%;height:100%;border:none;display:block;';
        wrap.appendChild(iframe);
    }

    /* ── BATTERY TIMER ── */

    let batteryTimer = null;

    /* ── QUICK SAVE ── */

    document.getElementById("btn-quick-save").onclick = async () => {
        const path = getStatePath();
        if (!path) return;
        setStatus("Saving…", "info", true);
        const state = await captureState();
        if (!state) { setStatus("Could not read game state.", "err"); return; }
        try {
            await dbSave(path, state);
            rememberSlot();
            setStatus(`Saved to slot ${currentSlot}.`, "ok");
        } catch (err) { setStatus("Save failed: " + err.message, "err"); }
    };

    /* ── LOAD SLOT ── */

    document.getElementById("btn-load").onclick = async () => {
        const path = getStatePath();
        if (!path) return;
        setStatus("Loading slot…", "info", true);
        try {
            const bytes = await dbLoad(path);
            const ok = await applyState(bytes);
            setStatus(ok ? `Slot ${currentSlot} loaded.` : "State apply failed.", ok ? "ok" : "err");
        } catch { setStatus(`No save in slot ${currentSlot}.`, "err"); }
    };

    /* ── DESTROY EMULATOR ── */

    async function destroyEmulator() {
        const iframe = document.getElementById('ejs-frame');
        if (!iframe) return;
        const iframeWin = iframe.contentWindow;
        const emu = iframeWin?.EJS_emulator;
        if (iframeWin) iframeWin.EJS_emulator = null;
        if (emu) {
            try { emu.pause?.(); } catch {}
            try {
                const al  = emu.Module?.AL;
                const ctx = al?.currentCtx?.ctx ?? emu.Module?.audioContext;
                if (ctx && ctx.state !== "closed") await ctx.close();
            } catch {}
            try { emu.Module?.pauseMainLoop?.(); } catch {}
            try { emu.destroy?.(); } catch {}
        }
        iframe.remove();
    }

    /* ── SAVE & QUIT ── */

    document.getElementById("btn-save-quit").onclick = async () => {
        stopAutoSave();
        setStatus("Saving…", "info", true);
        const path = getStatePath();
        if (path) {
            const state = await captureState();
            if (state) {
                try { await dbSave(path, state); rememberSlot(); }
                catch { /* best effort */ }
            }
        }
        await destroyEmulator();
        CLOUD_BATTERY = null;
        window.EJS_core = null;
        window.EJS_gameName = null;
        setGameButtons(false);
        if (activeEntry) { activeEntry.classList.remove("active"); activeEntry = null; }
        document.getElementById("emulator-wrap").innerHTML =
            '<div id="drop-prompt">← Select a game from the library<span>SNES · GBA · N64 · NDS · PS1</span></div>';
        setStatus("Session saved.", "ok");
    };

    /* ── AUTO SAVE LOOP ── */

    function startAutoSave() {
        stopAutoSave();
        let countdown = AUTO_SAVE_MS / 1000;
        autoSaveInterval = setInterval(async () => {
            countdown -= 1;
            if (countdown > 0) {
                // update countdown every second silently — only show at 5s mark
                if (countdown === 5) setStatus("Auto-save in 5s…");
                return;
            }
            countdown = AUTO_SAVE_MS / 1000;
            const path = getStatePath();
            if (!path) return;
            const state = await captureState();
            if (!state) return;
            try {
                await dbSave(path, state);
                rememberSlot();
                setStatus("Auto-saved.", "ok");
            } catch { setStatus("Auto-save failed.", "err"); }
        }, 1000);
    }

    function stopAutoSave() {
        if (autoSaveInterval) { clearInterval(autoSaveInterval); autoSaveInterval = null; }
    }

</script>
</body>
</html>
