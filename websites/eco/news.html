<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News — Eco Lou</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="assets/js/html.js" defer></script>
    <script src="assets/js/sidebar.js" defer></script>
    <script type="module" src="assets/js/auth-handling.js" defer></script>
</head>
<body>

<header></header>
<nav></nav>

<main>
    <section class="hero">
        <h2>News &amp; Updates</h2>
        <p>Market commentary, investing strategy, and economic updates from the Eco Lou framework.</p>
    </section>

    <section class="our-services">
        <div class="eco-news-filters">
            <button class="eco-news-filter-btn active" data-cat="all">All</button>
            <button class="eco-news-filter-btn" data-cat="market">Market</button>
            <button class="eco-news-filter-btn" data-cat="investing">Investing</button>
            <button class="eco-news-filter-btn" data-cat="economy">Economy</button>
        </div>

        <div id="eco-news-list"><p class="eco-news-empty">Loading...</p></div>
        <div id="eco-news-article" style="display:none">
            <button class="eco-news-back-btn" id="ecoNewsBack">&#8592; Back to News</button>
            <div id="eco-news-article-body"></div>
        </div>
    </section>
</main>

<aside></aside>
<footer></footer>

<script type="module">
import { database, ref, get } from '../../assets/js/firebase-init.js';

const ECO_TAGS   = ['market', 'investing', 'economy'];
const CAT_LABELS = { market: 'Market', investing: 'Investing', economy: 'Economy' };
const CAT_COLORS = { market: '#1a6e2e', investing: '#ff6600', economy: '#1a4a8a' };

let NEWS = [];
let currentCat = 'all';

function getCategory(tags) {
    const lower = tags.map(t => t.toLowerCase());
    for (const cat of ECO_TAGS) {
        if (lower.includes(cat)) return cat;
    }
    return 'investing';
}

function formatDate(ts) {
    return new Date(Number(ts)).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function renderContentItem(item) {
    switch (item.type) {
        case 'text':        return `<p>${item.value || ''}</p>`;
        case 'code':        return `<pre><code>${item.value || ''}</code></pre>`;
        case 'list':        return '<ul>' + (item.items || []).map(i => `<li>${i}</li>`).join('') + '</ul>';
        case 'image':       return item.src ? `<img src="${item.src}" style="max-width:100%;border-radius:6px;margin:12px 0">` : '';
        case 'link_button': return `<a href="${item.href || '#'}" class="eco-news-link-btn" target="_blank" rel="noopener">${item.label || item.href}</a>`;
        default:            return item.value ? `<p>${item.value}</p>` : '';
    }
}

function renderArticleBody(article) {
    if (article.body) return article.body;
    if (article.sections?.length) {
        return article.sections.map(s => `
            ${s.title ? `<h4>${s.title}</h4>` : ''}
            ${s.summary ? `<p>${s.summary}</p>` : ''}
            ${s.content?.length ? s.content.map(renderContentItem).join('') : ''}
            ${s.steps?.length ? '<ul>' + s.steps.map(st => `<li>${st}</li>`).join('') + '</ul>' : ''}
        `).join('');
    }
    return `<p>${article.description || ''}</p>`;
}

function renderList(cat) {
    currentCat = cat;
    document.getElementById('eco-news-list').style.display = '';
    document.getElementById('eco-news-article').style.display = 'none';

    const posts = cat === 'all' ? NEWS : NEWS.filter(p => p.category === cat);
    const list  = document.getElementById('eco-news-list');

    if (!posts.length) {
        list.innerHTML = '<p class="eco-news-empty">No posts in this category yet.</p>';
        return;
    }

    const extraTags = p => (p.tags || []).filter(t => !ECO_TAGS.includes(t));

    list.innerHTML = posts.map(p => `
        <div class="eco-news-card" data-id="${p.id}" role="button" tabindex="0">
            <div class="eco-news-card-meta">
                <span class="eco-news-badge" style="background:${CAT_COLORS[p.category]}">${CAT_LABELS[p.category]}</span>
                <span class="eco-news-date">${formatDate(p.createdAt)}</span>
            </div>
            <h3 class="eco-news-card-title">${p.title}</h3>
            <p class="eco-news-card-summary">${p.description || ''}</p>
            <div class="eco-news-tags">${extraTags(p).map(t => `<span class="eco-news-tag">${t}</span>`).join('')}</div>
            <span class="eco-news-read-more">Read more &#8594;</span>
        </div>
    `).join('');

    list.querySelectorAll('.eco-news-card').forEach(el => {
        const open = () => openArticle(el.dataset.id);
        el.addEventListener('click', open);
        el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') open(); });
    });
}

function openArticle(id) {
    const post = NEWS.find(p => p.id === id);
    if (!post) return;
    document.getElementById('eco-news-list').style.display = 'none';
    const extraTags = (post.tags || []).filter(t => !ECO_TAGS.includes(t));
    document.getElementById('eco-news-article-body').innerHTML = `
        <div class="eco-news-card-meta" style="margin-bottom:12px">
            <span class="eco-news-badge" style="background:${CAT_COLORS[post.category]}">${CAT_LABELS[post.category]}</span>
            <span class="eco-news-date">${formatDate(post.createdAt)}</span>
        </div>
        <h2 class="eco-news-article-title">${post.title}</h2>
        <div class="eco-news-tags" style="margin-bottom:20px">${extraTags.map(t => `<span class="eco-news-tag">${t}</span>`).join('')}</div>
        <div class="eco-news-article-content">${renderArticleBody(post)}</div>
    `;
    document.getElementById('eco-news-article').style.display = '';
    window.scrollTo(0, 0);
}

document.getElementById('ecoNewsBack').addEventListener('click', () => {
    renderList(currentCat);
});

document.querySelectorAll('.eco-news-filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.eco-news-filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderList(btn.dataset.cat);
    });
});

try {
    const snap = await get(ref(database, 'public/journalArticles'));
    if (snap.exists()) {
        NEWS = shuffle(
            Object.entries(snap.val())
                .map(([key, val]) => ({ ...val, id: key }))
                .filter(a => Array.isArray(a.tags) && a.tags.some(t => ECO_TAGS.includes(t.toLowerCase())))
                .map(a => ({ ...a, category: getCategory(a.tags) }))
        );
    }
} catch (e) {
    console.error('Firebase fetch failed:', e);
}

const hash = location.hash.slice(1);
if (hash && NEWS.find(p => p.id === hash)) {
    openArticle(hash);
} else {
    renderList('all');
}
</script>
</body>
</html>
