<!DOCTYPE html>

    <link rel="icon" type="image/png" sizes="16x16" href="../assets/img/favicon-16x16.png">
    <script src="../assets/js/theme.js" defer></script>
    <style>
        body { margin: 0; }

        /* Header — works on desktop AND mobile without breaking */
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 14px 16px;
            gap: 10px;
        }
        header .logo {
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        header .logo .ico { width: 28px; height: 28px; }
        header nav { width: 100%; }
        header nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 16px;
            margin: 0;
            padding: 0;
        }
        header nav a { text-decoration: none; color: inherit; padding: 6px 4px; }
        header nav a:hover { text-decoration: underline; }

        /* Hamburger only renders on narrow screens, and toggles the nav */
        .hamburger-box { display: none; cursor: pointer; padding: 6px; }
        .hamburger .line { width: 24px; height: 2px; background: currentColor; margin: 4px 0; }

        @media (max-width: 640px) {
            .hamburger-box { display: inline-block; }
            header { flex-direction: row; justify-content: space-between; align-items: center; }
            header nav {
                position: absolute;
                top: 64px;
                left: 0; right: 0;
                background: var(--surface, #1a2330);
                border-top: 1px solid var(--border, #2a3a4d);
                padding: 12px 16px;
                display: none;
                z-index: 50;
            }
            header nav.open { display: block; }
            header nav ul { flex-direction: column; gap: 10px; }
        }

        /* Site grid — responsive thumbnails */
        main { padding: 24px 16px 64px; }
        main h1 { text-align: center; margin: 0 0 24px; }
        .thumbnail-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 18px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .thumbnail {
            padding: 10px;
            border: 1px solid var(--border, #ddd);
            border-radius: 8px;
            text-align: center;
            background-color: var(--surface, #f9f9f9);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .thumbnail:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.15); }
        .thumbnail a { text-decoration: none; color: inherit; display: block; }
        .thumbnail img { max-width: 100%; height: auto; border-radius: 4px; aspect-ratio: 3/2; object-fit: cover; background: #0a1525; }
        .thumbnail p { margin: 10px 0 0; font-weight: 600; font-size: 0.95rem; }

        footer { padding: 24px 16px; text-align: center; border-top: 1px solid var(--border, #ccc); }
        footer .footer-content a { margin: 0 8px; text-decoration: none; color: inherit; }
        footer .social-icons a { margin: 0 6px; }
        footer .social-icons .ico { width: 22px; height: 22px; }
        footer .copyright { opacity: .65; font-size: 0.85rem; margin-top: 12px; }
    </style>
</head>
