<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Triage — Smart Solutions</title>
  <link rel="stylesheet" href="assets/css/master.css" />
  <link rel="icon" href="assets/img/favicon.ico" />
  <style>
    body { padding: 0; margin: 0; overflow-x: hidden; }
    main {
      max-width: 1200px; margin: 0 auto;
      padding: 16px 20px 32px;
      box-sizing: border-box; width: 100%;
    }
    *, *::before, *::after { box-sizing: border-box; }

    .toolbar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 14px;
    }

    .toolbar .row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .toolbar .row + .row { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
    .toolbar h1 { margin: 0; font-size: 1.1rem; flex: 1; }
    .toolbar .stats { font-size: 0.85rem; color: var(--muted); }

    .filter {
      padding: 5px 11px; font-size: 0.85rem;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text); border-radius: 5px; cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .filter:hover { border-color: var(--accent); color: var(--accent); }
    .filter.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .ctl {
      padding: 5px 10px; font-size: 0.85rem;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text); border-radius: 5px;
      font-family: inherit;
    }
    .ctl:focus { outline: none; border-color: var(--accent); }

    button.ctl, .btn {
      cursor: pointer;
      transition: border-color .15s, color .15s, background .15s;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.primary {
      background: steelblue; border-color: steelblue; color: #fff;
    }
    .btn.primary:hover { background: #3a7ab8; border-color: #3a7ab8; color: #fff; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #list { display: flex; flex-direction: column; gap: 8px; }

    .row {
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .row .head {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    .row .badge {
      font-size: 0.7rem; padding: 1px 7px; border-radius: 10px;
      background: rgba(70, 130, 180, 0.2);
      color: var(--accent);
      text-transform: uppercase; letter-spacing: 1px;
    }
    /* Account tinting: subtle background + colored left border on each row */
    .row.tint-louman61 { background: linear-gradient(to right, rgba(96, 165, 250, 0.10), var(--surface) 40%); border-left: 3px solid rgba(96, 165, 250, 0.7); }
    .row.tint-luis     { background: linear-gradient(to right, rgba(74, 222, 128, 0.10), var(--surface) 40%); border-left: 3px solid rgba(74, 222, 128, 0.7); }
    .row.tint-ses      { background: linear-gradient(to right, rgba(251, 191, 36, 0.10), var(--surface) 40%); border-left: 3px solid rgba(251, 191, 36, 0.7); }
    .row.tint-yahoo    { background: linear-gradient(to right, rgba(192, 132, 252, 0.10), var(--surface) 40%); border-left: 3px solid rgba(192, 132, 252, 0.7); }
    .row.tint-outlook  { background: linear-gradient(to right, rgba(248, 113, 113, 0.10), var(--surface) 40%); border-left: 3px solid rgba(248, 113, 113, 0.7); }
    .row.tint-default  { background: var(--surface); border-left: 3px solid var(--border); }
    .row .domain { font-family: monospace; font-size: 0.78rem; color: var(--muted); }
    .row .subject {
      font-weight: 600; flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .row .date { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }
    .row .snippet {
      font-size: 0.86rem; color: var(--muted); margin-top: 6px;
      line-height: 1.4; max-height: 4em; overflow: hidden;
    }
    .row .actions { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
    .row .actions button {
      padding: 3px 9px; font-size: 0.82rem;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text); border-radius: 4px; cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .row .actions button:hover { border-color: var(--accent); color: var(--accent); }
    .row .actions button.suggested {
      background: steelblue; color: #fff; border-color: steelblue;
    }
    .row .actions button.suggested:hover { background: #3a7ab8; color: #fff; }
    .row input[type=checkbox] { transform: scale(1.1); margin-right: 4px; }

    .empty {
      padding: 40px 20px; text-align: center; color: var(--muted);
      background: var(--surface); border: 1px dashed var(--border); border-radius: var(--radius);
    }

    .bulk-bar {
      position: sticky; bottom: 12px;
      background: var(--surface); border: 1px solid var(--accent);
      border-radius: var(--radius); padding: 10px 14px;
      display: none; gap: 10px; align-items: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      margin-top: 12px;
    }
    .bulk-bar.visible { display: flex; }

    .scan-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 14px;
      margin-bottom: 12px;
      display: none;
    }
    .scan-panel.visible { display: block; }
    .scan-panel h4 {
      margin: 0 0 8px; font-size: 0.78rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px;
    }
    .scan-job {
      display: grid; grid-template-columns: 90px 1fr 230px 80px; gap: 10px;
      align-items: center; padding: 4px 0; font-size: 0.85rem;
    }
    .scan-job .cancel-btn {
      padding: 3px 9px; font-size: 0.78rem;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text); border-radius: 4px; cursor: pointer;
    }
    .scan-job .cancel-btn:hover { border-color: #c44; color: #fcc; }
    .scan-job .cancel-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .scan-job .label { font-family: monospace; font-weight: 600; }
    .scan-bar {
      height: 8px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 4px; overflow: hidden;
    }
    .scan-bar-fill {
      height: 100%; background: steelblue;
      transition: width 0.3s ease;
    }
    .scan-bar-fill.done { background: #4ade80; }
    .scan-bar-fill.error { background: #f87171; }
    .scan-counts { font-size: 0.8rem; color: var(--muted); text-align: right; font-family: monospace; }

    /* Mobile (≤640px) — collapse fixed-width controls and grids so the body
       never exceeds the viewport width. */
    @media (max-width: 640px) {
      main { padding: 10px 12px 24px; }
      .toolbar { padding: 10px; }
      .toolbar h1 { font-size: 1rem; }
      .toolbar .row { gap: 5px; }
      .toolbar .row + .row { padding-top: 6px; margin-top: 6px; }
      .ctl { font-size: 0.82rem; padding: 4px 7px; min-width: 0; max-width: 100%; }
      #f-search { min-width: 0 !important; width: 100%; }
      #f-domain, #scan-account { max-width: 100% !important; flex: 1; }
      #f-since, #f-before { width: 110px !important; }
      .filter { font-size: 0.8rem; padding: 4px 8px; }
      .btn, button.ctl { font-size: 0.8rem; padding: 4px 8px; }

      /* scan panel rows stack: label + bar on top, counts + cancel below */
      .scan-job {
        grid-template-columns: 70px 1fr;
        grid-template-areas:
          "label bar"
          "counts cancel";
        row-gap: 4px;
        font-size: 0.8rem;
      }
      .scan-job .label   { grid-area: label; }
      .scan-job .scan-bar { grid-area: bar; }
      .scan-job .scan-counts { grid-area: counts; text-align: left; font-size: 0.72rem; }
      .scan-job .cancel-btn  { grid-area: cancel; justify-self: end; }

      /* List rows */
      .row { padding: 9px 10px; }
      .row .head { gap: 6px; }
      .row .subject { font-size: 0.9rem; }
      .row .date { display: none; } /* save space — date still in title attr / snippet */
      .row .actions button { font-size: 0.78rem; padding: 3px 7px; }

      .modal { min-width: 0; width: 95%; padding: 14px; }

      /* Quick-links aside takes more of the screen */
      #links-aside { width: 90vw; }
    }
    @media (max-width: 400px) {
      .row .domain { display: none; } /* badge color still indicates account; domain hidden */
      .filter { padding: 3px 6px; font-size: 0.75rem; }
    }

    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      display: flex; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      padding: 20px; border-radius: var(--radius);
      min-width: 320px; max-width: 600px; width: 90%;
      max-height: 85vh; overflow-y: auto;
    }
    .modal h3 { margin: 0 0 14px; }
    .modal label { display: block; margin-top: 10px; font-size: 0.85rem; color: var(--muted); }
    .modal input, .modal textarea, .modal select {
      width: 100%; padding: 7px 9px; margin-top: 3px;
      border: 1px solid var(--border); border-radius: 5px;
      background: var(--bg); color: var(--text);
      font: inherit; box-sizing: border-box;
    }
    .modal textarea { resize: vertical; min-height: 80px; }
    .modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }

    .toast {
      position: fixed; bottom: 16px; right: 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 9px 14px; font-size: 0.88rem;
      z-index: 2000; transition: opacity 0.3s;
    }
    .toast.err { border-color: #c44; color: #fcc; }

    .svc-banner {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px; margin-bottom: 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); font-size: 0.82rem;
    }
    .svc-banner.offline { border-color: #c44; }
    .svc-banner .dot { width: 8px; height: 8px; border-radius: 50%; background: #64748b; }
    .svc-banner.online  .dot { background: #4ade80; box-shadow: 0 0 5px #4ade8088; }
    .svc-banner.offline .dot { background: #f87171; }
    .svc-banner .label  { font-weight: 600; }
    .svc-banner .hint   { color: var(--muted); flex: 1; }
    .svc-banner button  {
      padding: 3px 10px; font-size: 0.8rem;
      border: 1px solid var(--accent); background: var(--accent); color: #fff;
      border-radius: 4px; cursor: pointer;
    }
    .svc-banner button:disabled { opacity: 0.6; cursor: wait; }

    /* Quick-Links aside — matches hub.html pattern */
    #links-aside {
      position: fixed; top: 0; right: 0; bottom: 0; width: 320px;
      background: var(--surface); border-left: 1px solid var(--border);
      z-index: 320; transform: translateX(100%); transition: transform .2s ease;
    }
    #links-aside iframe { width: 100%; height: 100%; border: none; display: block; }
    #links-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 319;
    }
    body.links-aside-open #links-aside  { transform: translateX(0); }
    body.links-aside-open #links-overlay { display: block; }
    #links-toggle {
      background: none; border: none; font-size: 1.1rem;
      cursor: pointer; padding: 4px 8px; color: var(--text);
    }
    #links-toggle:hover { color: var(--accent); }
  </style>
</head>

<body>
  <div id="header-placeholder"></div>

  <main>
    <div id="svc-banner" class="svc-banner" style="display:none;">
      <span class="dot"></span>
      <span class="label">personal-svc</span>
      <span class="hint" id="svc-hint">checking…</span>
      <button id="svc-start-btn" style="display:none;">Start</button>
    </div>

    <div class="toolbar">
      <div class="row">
        <h1>Email Triage</h1>
        <button class="filter view-tab active" data-view="pending">Pending</button>
        <button class="filter view-tab" data-view="processed">Processed</button>
        <span class="stats" id="stats" style="flex:1;">sign in to load</span>
        <button id="insights-btn" class="btn ctl" title="AI overview of current view">✨ Insights</button>
        <button id="clear-all-btn" class="btn ctl" title="Clear all visible">Clear All</button>
      </div>

      <div class="row" id="filters">
        <button class="filter active" data-cat="all">All</button>
        <button class="filter" data-cat="receipt">Receipts</button>
        <button class="filter" data-cat="link">Links</button>
        <button class="filter" data-cat="note">Notes</button>
        <button class="filter" data-cat="todo">Todos</button>
        <button class="filter" data-cat="delete">Trash</button>
        <button class="filter" data-cat="unknown">Unknown</button>
      </div>

      <div class="row">
        <input id="f-search" class="ctl" type="search" placeholder="search subject / sender / snippet" style="flex:1;min-width:180px;">
        <select id="f-domain" class="ctl" style="max-width:200px;">
          <option value="">all senders</option>
        </select>
        <label class="stats" style="display:flex;gap:4px;align-items:center;">since
          <input id="f-since" class="ctl" type="date" style="width:140px;">
        </label>
        <label class="stats" style="display:flex;gap:4px;align-items:center;">before
          <input id="f-before" class="ctl" type="date" style="width:140px;">
        </label>
        <select id="f-sort" class="ctl">
          <option value="date-desc">newest first</option>
          <option value="date-asc">oldest first</option>
          <option value="sender">by sender</option>
        </select>
        <button id="f-clear" class="btn ctl" title="Clear all filters">clear</button>
      </div>

      <div class="row">
        <select id="scan-account" class="ctl">
          <option value="" selected>all accounts</option>
          <option value="louman61-gmail"      style="color:#60a5fa;font-weight:600;">louman61</option>
          <option value="luis-personal-gmail" style="color:#4ade80;font-weight:600;">luis.a.curbelo</option>
          <option value="ses-gmail"           style="color:#fbbf24;font-weight:600;">ses</option>
          <option value="yahoo-throwaway"     style="color:#c084fc;font-weight:600;">yahoo</option>
        </select>
        <input id="scan-max" type="number" min="10" max="500" value="50" class="ctl" style="width:70px;" title="max per folder">
        <button id="scan-btn" class="btn ctl primary">Scan Inbox</button>
        <span id="scan-status" class="stats"></span>
      </div>
    </div>

    <div class="scan-panel" id="scan-panel">
      <h4 id="scan-panel-title">Scan progress</h4>
      <div id="scan-jobs"></div>
    </div>

    <div id="list">
      <div class="empty">sign in via the header → click <b>Scan Inbox</b> to stage emails</div>
    </div>

    <div class="bulk-bar" id="bulk-bar">
      <span id="bulk-count" style="font-weight:600;"></span>
      <button class="btn ctl" id="bulk-clear">Clear</button>
      <button class="btn ctl primary" id="bulk-delete">🗑️ Delete Selected</button>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <!-- Quick-Links aside (matches hub.html pattern) — injects 🔗 button into the header next to theme toggle -->
  <script>
  (function () {
    const LINKS_SRC = 'apps/online/onlinelinks.html';

    const overlay = document.createElement('div');
    overlay.id = 'links-overlay';
    document.body.appendChild(overlay);

    const aside = document.createElement('aside');
    aside.id = 'links-aside';
    const frame = document.createElement('iframe');
    frame.src = LINKS_SRC;
    frame.setAttribute('frameborder', '0');
    aside.appendChild(frame);
    document.body.appendChild(aside);

    function setOpen(open) {
      document.body.classList.toggle('links-aside-open', open);
      localStorage.setItem('links-aside', open ? '1' : '0');
    }
    overlay.addEventListener('click', () => setOpen(false));
    if (localStorage.getItem('links-aside') === '1') document.body.classList.add('links-aside-open');

    function injectBtn() {
      const header = document.querySelector('header');
      if (!header) return false;
      const btn = document.createElement('button');
      btn.id = 'links-toggle';
      btn.title = 'Quick Links';
      btn.textContent = '🔗';
      btn.addEventListener('click', () => setOpen(!document.body.classList.contains('links-aside-open')));
      const themeToggle = document.getElementById('theme-toggle');
      if (themeToggle) themeToggle.parentNode.insertBefore(btn, themeToggle);
      else document.querySelector('header nav').appendChild(btn);
      return true;
    }

    if (!injectBtn()) {
      const obs = new MutationObserver(() => {
        if (injectBtn()) obs.disconnect();
      });
      obs.observe(document.getElementById('header-placeholder'), { childList: true, subtree: true });
    }
  })();
  </script>

  <script src="assets/js/main.js"></script>

  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
import { getDatabase, ref, get, set, remove, push } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCv2cQGWeXS-w7psrQiZD8dn4R7hStmY1o",
  authDomain: "persinfo-df93f.firebaseapp.com",
  databaseURL: "https://persinfo-df93f-default-rtdb.firebaseio.com",
  projectId: "persinfo-df93f",
  storageBucket: "persinfo-df93f.appspot.com",
  messagingSenderId: "218680336647",
  appId: "1:218680336647:web:7786091136b9e6b28565a2"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getDatabase(app);

const PERSONAL_SVC = "http://192.168.50.10:3050";

let currentUser = null;
let pending = {};
let processed = {};
let viewMode = "pending";   // "pending" | "processed"
let activeFilter = "all";
let selected = new Set();
let searchText = "";
let domainFilter = "";
let dateSince = null;
let dateBefore = null;
let sortBy = "date-desc";

const $ = (id) => document.getElementById(id);
const listEl  = $("list");
const statsEl = $("stats");

function toast(msg, kind) {
  const t = document.createElement("div");
  t.className = "toast" + (kind === "err" ? " err" : "");
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = "0"; setTimeout(() => t.remove(), 300); }, 2500);
}

document.querySelectorAll(".filter:not(.view-tab)").forEach(b => b.addEventListener("click", () => {
  document.querySelectorAll(".filter:not(.view-tab)").forEach(x => x.classList.toggle("active", x === b));
  activeFilter = b.dataset.cat;
  selected.clear();
  render();
}));

// New filter inputs
let searchDebounce;
$("f-search").addEventListener("input", (e) => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => { searchText = e.target.value.trim().toLowerCase(); render(); }, 150);
});
$("f-domain").addEventListener("change", (e) => { domainFilter = e.target.value; render(); });
$("f-since").addEventListener("change", (e) => {
  dateSince = e.target.value ? new Date(e.target.value).getTime() : null; render();
});
$("f-before").addEventListener("change", (e) => {
  dateBefore = e.target.value ? new Date(e.target.value).getTime() + 86399999 : null; // include the whole day
  render();
});
$("f-sort").addEventListener("change", (e) => { sortBy = e.target.value; render(); });
$("f-clear").addEventListener("click", () => {
  $("f-search").value = ""; searchText = "";
  $("f-domain").value = ""; domainFilter = "";
  $("f-since").value = "";  dateSince = null;
  $("f-before").value = ""; dateBefore = null;
  $("f-sort").value = "date-desc"; sortBy = "date-desc";
  $("scan-account").value = ""; // also clear the unified account dropdown
  render();
});

// View tabs (Pending / Processed)
document.querySelectorAll(".view-tab").forEach(b => b.addEventListener("click", async () => {
  document.querySelectorAll(".view-tab").forEach(x => x.classList.toggle("active", x === b));
  viewMode = b.dataset.view;
  selected.clear();
  if (viewMode === "processed") await loadProcessed();
  else await loadPending();
}));

$("clear-all-btn").addEventListener("click", async () => {
  if (!currentUser) return;
  const source = viewMode === "processed" ? processed : pending;
  const count = Object.keys(source).length;
  if (count === 0) { toast(`nothing to clear in ${viewMode}`); return; }
  const note = viewMode === "processed"
    ? `Clear all ${count} processed entries? They'll re-stage on next scan (Gmail untouched).`
    : `Clear all ${count} pending entries? They'll re-stage on next scan (Gmail untouched).`;
  if (!confirm(note)) return;
  await remove(ref(db, `${currentUser.uid}/email-triage/${viewMode}`));
  if (viewMode === "processed") processed = {};
  else pending = {};
  toast(`cleared ${count} ${viewMode}`);
  render();
});

onAuthStateChanged(auth, async (u) => {
  currentUser = u;
  if (!u) {
    statsEl.textContent = "sign in via the header";
    listEl.innerHTML = `<div class="empty">sign in via the header → click <b>Scan Inbox</b> to stage emails</div>`;
    pending = {};
    return;
  }
  statsEl.textContent = `signed in as ${u.email}`;
  await loadPending();
  await resumeActiveScans();
});

async function loadPending() {
  if (!currentUser) return;
  const snap = await get(ref(db, `${currentUser.uid}/email-triage/pending`));
  pending = snap.exists() ? snap.val() : {};
  selected.clear();
  render();
}

async function loadProcessed() {
  if (!currentUser) return;
  const snap = await get(ref(db, `${currentUser.uid}/email-triage/processed`));
  processed = snap.exists() ? snap.val() : {};
  render();
}

function render() {
  const source = viewMode === "processed" ? processed : pending;
  const entries = Object.entries(source);
  const counts = entries.reduce((acc, [, e]) => {
    const c = viewMode === "processed" ? (e.decision || "?") : (e.category || "unknown");
    acc[c] = (acc[c] || 0) + 1; return acc;
  }, {});

  // Rebuild domain dropdown options from current pending
  const domainSelect = $("f-domain");
  const prevVal = domainSelect.value;
  const domains = [...new Set(entries.map(([, e]) => getDomain(e)).filter(Boolean))].sort();
  const domainCounts = entries.reduce((acc, [, e]) => {
    const d = getDomain(e);
    if (d) acc[d] = (acc[d] || 0) + 1;
    return acc;
  }, {});
  domainSelect.innerHTML = `<option value="">all senders (${entries.length})</option>` +
    domains.map(d => `<option value="${d}">${d} (${domainCounts[d]})</option>`).join("");
  if (domains.includes(prevVal)) domainSelect.value = prevVal;

  // Apply all filters — category filter uses different field in processed view
  const catField = viewMode === "processed" ? "decision" : "category";
  const acctSel = $("scan-account").value;
  let filtered = entries;
  if (activeFilter !== "all") filtered = filtered.filter(([, e]) => (e[catField] || "unknown") === activeFilter);
  if (acctSel)                filtered = filtered.filter(([, e]) => e.account === acctSel);
  if (domainFilter)           filtered = filtered.filter(([, e]) => getDomain(e) === domainFilter);
  if (searchText)             filtered = filtered.filter(([, e]) => {
    const hay = ((e.subject || "") + " " + (e.snippet || "") + " " + (e.senderEmail || "") + " " + getDomain(e)).toLowerCase();
    return hay.includes(searchText);
  });
  if (dateSince !== null)     filtered = filtered.filter(([, e]) => (e.date || 0) >= dateSince);
  if (dateBefore !== null)    filtered = filtered.filter(([, e]) => (e.date || 0) <= dateBefore);

  // Sort
  const sorters = {
    "date-desc": (a, b) => (b[1].date || 0) - (a[1].date || 0),
    "date-asc":  (a, b) => (a[1].date || 0) - (b[1].date || 0),
    "sender":    (a, b) => getDomain(a[1]).localeCompare(getDomain(b[1])),
  };
  filtered.sort(sorters[sortBy] || sorters["date-desc"]);

  // Update stats
  const label = viewMode === "processed" ? "processed" : "pending";
  const shownNote = filtered.length === entries.length ? "" : ` · <b>${filtered.length}</b> shown`;
  statsEl.innerHTML = `<b>${entries.length}</b> ${label} · `
    + ["receipt","link","note","todo","delete","unknown","skip"].map(c => `${c}:${counts[c] || 0}`).join(" · ")
    + shownNote;

  if (filtered.length === 0) {
    listEl.innerHTML = `<div class="empty">nothing here — click <b>Scan Inbox</b> above to stage more, or change the filter.</div>`;
    updateBulkBar();
    return;
  }

  listEl.innerHTML = filtered.map(([key, e]) => {
    const dateStr = e.date ? new Date(e.date).toLocaleString() : "";
    const cat = viewMode === "processed" ? (e.decision || "?") : (e.category || "unknown");
    const btn = (id, label, sug) => `<button class="${sug ? 'suggested' : ''}" data-key="${key}" data-act="${id}">${label}</button>`;
    const isChecked = selected.has(key) ? "checked" : "";
    // Account → row tint class (colored left border + subtle background)
    const acct = e.account || "";
    const tintClass = (
      acct === "louman61-gmail"      ? "tint-louman61"
      : acct === "luis-personal-gmail" ? "tint-luis"
      : acct === "ses-gmail"          ? "tint-ses"
      : acct === "yahoo-throwaway"    ? "tint-yahoo"
      : acct === "outlook-personal"   ? "tint-outlook"
      : "tint-default"
    );
    return `
      <div class="row ${tintClass}" title="${escHTML(acct)}">
        <div class="head">
          <input type="checkbox" data-sel="${key}" ${isChecked}>
          <span class="badge">${cat}</span>
          <span class="domain">${getDomain(e)}</span>
          <span class="subject" title="${escHTML(e.subject || "")}">${escHTML(e.subject || "(no subject)")}</span>
          <span class="date">${dateStr}</span>
        </div>
        <div class="snippet">${escHTML((e.snippet || "").slice(0, 200))}</div>
        <div class="actions">
          ${viewMode === "processed" ? `
            <span class="stats">processed ${e.processedAt ? new Date(e.processedAt).toLocaleString() : ""} as <b>${cat}</b></span>
            ${btn("restage", "↩️ Re-stage", false)}
            ${btn("clear",   "🧹 Clear",   false)}
            ${btn("delete-final", "🗑️ Delete", false)}
          ` : `
            ${btn("receipt", "📧 Receipt", cat === "receipt")}
            ${btn("link",    "🔗 Link",    cat === "link")}
            ${btn("note",    "📝 Note",    cat === "note")}
            ${btn("todo",    "✅ Todo",    cat === "todo")}
            ${btn("delete",  "🗑️ Delete", cat === "delete")}
          `}
        </div>
      </div>`;
  }).join("");

  listEl.querySelectorAll("button[data-key]").forEach(b =>
    b.addEventListener("click", () => handleAction(b.dataset.key, b.dataset.act)));
  listEl.querySelectorAll("input[data-sel]").forEach(cb =>
    cb.addEventListener("change", () => {
      const k = cb.dataset.sel;
      if (cb.checked) selected.add(k); else selected.delete(k);
      updateBulkBar();
    }));
  updateBulkBar();
}

function escHTML(s) {
  return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// Derive display domain from senderEmail. Backwards-compat: prefer stored senderDomain
// for entries staged before the schema slim (2026-06-22).
function getDomain(e) {
  if (e.senderDomain) return e.senderDomain;
  const addr = (e.senderEmail || "").toLowerCase();
  if (!addr.includes("@")) return "";
  const d = addr.split("@")[1] || "";
  return d.replace(/^(mail|email|notify|info|noreply|no-reply|do-not-reply|news|enews|marketing|hello|contact|support|reservations|guest)\./, "");
}

function updateBulkBar() {
  const bar = $("bulk-bar");
  if (selected.size > 0) {
    bar.classList.add("visible");
    $("bulk-count").textContent = `${selected.size} selected`;
  } else {
    bar.classList.remove("visible");
  }
}

$("bulk-clear").addEventListener("click", () => {

$("bulk-delete").addEventListener("click", async () => {
  if (selected.size === 0) return;
  if (!confirm(`Delete ${selected.size} email(s) from Gmail + mark processed?`)) return;
  $("bulk-delete").disabled = true;
  const toDelete = Array.from(selected);
  let ok = 0, fail = 0;
  for (const key of toDelete) {
    const e = pending[key];
    if (!e) continue;
    try {
      if (e.imapUid && e.imapFolder && e.account) {
        const r = await fetch(`${PERSONAL_SVC}/delete-email`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ account: e.account, folder: e.imapFolder, imap_uid: String(e.imapUid) }),
        });
        const j = await r.json();
        if (!r.ok || !j.ok) { fail++; continue; }
      }
      await markProcessed(key, e, "delete", null);
      ok++;
    } catch (err) {
      fail++;
    }
  }
  $("bulk-delete").disabled = false;
  toast(`bulk: ${ok} deleted${fail ? `, ${fail} failed` : ""}`);
});

async function handleAction(key, action) {
  if (action === "clear") {
    if (!confirm("Clear this processed entry? It'll re-stage on the next scan (Gmail email untouched).")) return;
    await remove(ref(db, `${currentUser.uid}/email-triage/processed/${key}`));
    delete processed[key];
    toast("cleared — Gmail untouched, will re-stage next scan");
    render();
    return;
  }

  if (action === "delete-final") {
    const e = processed[key];
    if (!e) return;
    if (!confirm("Delete from Gmail (Trash) AND remove from triage? Permanent.")) return;
    if (e.imapUid && e.imapFolder && e.account) {
      try {
        const r = await fetch(`${PERSONAL_SVC}/delete-email`, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ account: e.account, folder: e.imapFolder, imap_uid: String(e.imapUid) }),
        });
        const j = await r.json();
        if (!r.ok || !j.ok) { toast("Gmail delete failed: " + (j.error || `HTTP ${r.status}`), "err"); return; }
      } catch (err) {
        toast("Gmail delete error: " + err.message, "err"); return;
      }
    }
    await remove(ref(db, `${currentUser.uid}/email-triage/processed/${key}`));
    delete processed[key];
    toast("deleted from Gmail + removed");
    render();
    return;
  }

  if (action === "restage") {
    const e = processed[key];
    if (!e) return;
    // Strip processing metadata and put back in pending
    const clean = { ...e };
    delete clean.decision; delete clean.destInfo; delete clean.processedAt;
    await set(ref(db, `${currentUser.uid}/email-triage/pending/${key}`), clean);
    await remove(ref(db, `${currentUser.uid}/email-triage/processed/${key}`));
    delete processed[key];
    pending[key] = clean;
    toast("re-staged to pending");
    render();
    return;
  }

  const e = pending[key];
  if (!e) return;

  if (action === "skip") { toast("skipped"); return; }

  if (action === "delete") {
    if (e.imapUid && e.imapFolder && e.account) {
      try {
        const r = await fetch(`${PERSONAL_SVC}/delete-email`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ account: e.account, folder: e.imapFolder, imap_uid: String(e.imapUid) }),
        });
        const j = await r.json();
        if (!r.ok || !j.ok) {
          toast("Gmail delete failed: " + (j.error || `HTTP ${r.status}`), "err");
          return;
        }
      } catch (err) {
        toast("Gmail delete error: " + err.message, "err");
        return;
      }
      // Gmail delete succeeded → email is in Trash, not in INBOX or All Mail.
      // Next scan can't re-find it, so no processed record needed for dedupe. Just drop.
      await remove(ref(db, `${currentUser.uid}/email-triage/pending/${key}`));
      delete pending[key];
      selected.delete(key);
      render();
      toast("deleted from Gmail");
    } else {
      // No IMAP UID — can't act on Gmail. Mark processed so dedupe blocks re-stage.
      await markProcessed(key, e, "delete", null);
      toast("marked (no IMAP UID — Gmail untouched)");
    }
    return;
  }

  openModal(action, key, e);
}

async function saveReceipt(e) {
  const name = $("m-name").value.trim();
  const amt  = parseFloat($("m-amt").value) || 0;
  const dateStr = $("m-date").value;
  const cat  = $("m-cat").value.trim();
  const desc = $("m-desc").value.trim();
  const type = $("m-type").value;
  if (!name || !amt) throw new Error("vendor and amount required");
  const dateMs = dateStr ? new Date(dateStr).getTime() : Date.now();
  const year = new Date(dateMs).getFullYear();
  const existing = await get(ref(db, `${currentUser.uid}/ledgerTx/${year}`));
  const dayKeys = existing.exists() ? Object.keys(existing.val()).filter(k => k.startsWith(`${dateMs}_`)) : [];
  const idx = dayKeys.length;
  const path = `${currentUser.uid}/ledgerTx/${year}/${dateMs}_${idx}`;
  await set(ref(db, path), {
    amt, cat, date: dateMs, desc, img: "", imgPath: "", link: "", name, sku: "", sub: "", type,
  });
  return { path, year, key: `${dateMs}_${idx}` };
}

async function saveLink(e) {
  const title = $("m-title").value.trim();
  const url   = $("m-url").value.trim();
  const cats  = $("m-cats").value.split(",").map(s => s.trim()).filter(Boolean);
  if (!url) throw new Error("URL required");
  // Match onlinelinks.html schema exactly: {url, title|null, categories|null}
  const pushed = push(ref(db, `${currentUser.uid}/links`));
  await set(pushed, {
    url,
    title: title || null,
    categories: cats.length ? cats : null,
  });
  return { path: pushed.toString(), key: pushed.key };
}

async function saveNote(e) {
  const title   = $("m-title").value.trim();
  const content = $("m-content").value.trim();
  if (!title && !content) throw new Error("title or content required");
  const pushed = push(ref(db, `${currentUser.uid}/notes`));
  await set(pushed, { title, content, createdAt: Date.now(), updatedAt: Date.now() });
  return { path: pushed.toString(), key: pushed.key };
}

async function saveTodo(e) {
  const txt    = $("m-text").value.trim();
  const due    = $("m-due").value;
  const anchor = $("m-anchor").value.trim();
  if (!txt) throw new Error("task required");
  const pushed = push(ref(db, `${currentUser.uid}/todos`));
  const todo = { text: txt, done: false, archived: false, createdAt: Date.now(), type: "oneshot" };
  if (due) todo.dueDate = due;
  if (anchor) todo.anchor = anchor;
  await set(pushed, todo);
  return { path: pushed.toString(), key: pushed.key };
}

async function markProcessed(key, e, decision, destInfo) {
  await set(ref(db, `${currentUser.uid}/email-triage/processed/${key}`),
    { ...e, decision, destInfo: destInfo || null, processedAt: Date.now() });
  await remove(ref(db, `${currentUser.uid}/email-triage/pending/${key}`));
  delete pending[key];
  selected.delete(key);
  render();
}

$("insights-btn").addEventListener("click", async () => {
  if (!currentUser) { toast("sign in first", "err"); return; }
  const source = viewMode === "processed" ? processed : pending;
  const entries = Object.values(source);
  if (entries.length === 0) { toast(`nothing in ${viewMode}`); return; }

  // Build client-side stats
  const byCategory = {}, byAccount = {}, byDomain = {}, byMonth = {};
  let withAmount = 0, totalAmount = 0;
  const now = Date.now();
  let olderThan30d = 0, last7d = 0;
  for (const e of entries) {
    const cat = viewMode === "processed" ? (e.decision || "unknown") : (e.category || "unknown");
    byCategory[cat] = (byCategory[cat] || 0) + 1;
    if (e.account)       byAccount[e.account] = (byAccount[e.account] || 0) + 1;
    const d = getDomain(e);
    if (d)               byDomain[d] = (byDomain[d] || 0) + 1;
    if (e.amount > 0)   { withAmount++; totalAmount += e.amount; }
    if (e.date) {
      const m = new Date(e.date).toISOString().slice(0, 7);
      byMonth[m] = (byMonth[m] || 0) + 1;
      const age = now - e.date;
      if (age > 30 * 86400000) olderThan30d++;
      if (age < 7 * 86400000)  last7d++;
    }
  }
  const topDomains = Object.entries(byDomain).sort((a,b) => b[1] - a[1]).slice(0, 12);
  const stats = {
    view: viewMode,
    total: entries.length,
    byCategory,
    byAccount,
    topSenders: topDomains.map(([d, n]) => `${d} (${n})`),
    withAmount, totalAmount: Math.round(totalAmount),
    olderThan30Days: olderThan30d,
    last7Days: last7d,
    monthDistribution: byMonth,
  };

  // Open modal with stats + spinner for AI section
  const bg = document.createElement("div");
  bg.className = "modal-bg";
  bg.innerHTML = `
    <div class="modal" style="max-width:720px;">
      <h3>✨ Insights — ${viewMode}</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;font-size:0.88rem;">
        <div>
          <h4 style="margin:0 0 6px;color:var(--muted);font-size:0.78rem;text-transform:uppercase;">By category</h4>
          ${Object.entries(byCategory).sort((a,b)=>b[1]-a[1]).map(([k,v]) => `<div>${k}: <b>${v}</b></div>`).join("")}
        </div>
        <div>
          <h4 style="margin:0 0 6px;color:var(--muted);font-size:0.78rem;text-transform:uppercase;">By account</h4>
          ${Object.entries(byAccount).sort((a,b)=>b[1]-a[1]).map(([k,v]) => `<div>${k.split("-")[0]}: <b>${v}</b></div>`).join("")}
        </div>
        <div>
          <h4 style="margin:0 0 6px;color:var(--muted);font-size:0.78rem;text-transform:uppercase;">Top senders</h4>
          ${topDomains.slice(0,8).map(([d,n]) => `<div>${d}: <b>${n}</b></div>`).join("")}
        </div>
        <div>
          <h4 style="margin:0 0 6px;color:var(--muted);font-size:0.78rem;text-transform:uppercase;">Money & age</h4>
          <div>With $ extracted: <b>${withAmount}</b> ($${stats.totalAmount.toLocaleString()})</div>
          <div>Older than 30d: <b>${olderThan30d}</b></div>
          <div>Last 7d: <b>${last7d}</b></div>
        </div>
      </div>
      <h4 style="margin-top:14px;color:var(--muted);font-size:0.78rem;text-transform:uppercase;">AI takeaways</h4>
      <div id="ai-insights" style="background:var(--bg);padding:10px;border-radius:6px;font-size:0.9rem;min-height:60px;">
        <em style="color:var(--muted);">asking gemma2:9b…</em>
      </div>
      <div class="actions">
        <button class="btn ctl primary" id="m-close">Close</button>
      </div>
    </div>`;
  document.body.appendChild(bg);
  $("m-close").addEventListener("click", () => bg.remove());

  // Fire AI insights call
  try {
    const r = await fetch(`${PERSONAL_SVC}/bulk-insights`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ stats }),
    });
    const j = await r.json();
    const target = document.getElementById("ai-insights");
    if (!target) return; // modal closed
    if (!r.ok || !j.ok) { target.innerHTML = `<em style="color:#fcc;">failed: ${j.error || `HTTP ${r.status}`}</em>`; return; }
    // Render markdown bullets simply
    target.innerHTML = escHTML(j.insights).replace(/\n/g, "<br>");
  } catch (e) {
    const target = document.getElementById("ai-insights");
    if (target) target.innerHTML = `<em style="color:#fcc;">error: ${e.message}</em>`;
  }
});

const ALL_SCANNABLE = ["louman61-gmail", "luis-personal-gmail", "ses-gmail", "yahoo-throwaway"];

// Scan-inbox button
$("scan-btn").addEventListener("click", async () => {
  if (!currentUser) { toast("sign in first", "err"); return; }
  const sel = $("scan-account").value;
  const targets = sel ? [sel] : ALL_SCANNABLE;
  const max = parseInt($("scan-max").value) || 50;
  $("scan-btn").disabled = true;
  $("scan-status").textContent = `starting ${targets.length} scan${targets.length>1?'s':''}…`;
  // Reset progress panel each new scan
  $("scan-panel").classList.remove("visible");
  $("scan-jobs").innerHTML = "";
  const jobIds = [];
  try {
    for (const account of targets) {
      const r = await fetch(`${PERSONAL_SVC}/scan-inbox`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ account, uid: currentUser.uid, max_per_folder: max }),
      });
      const j = await r.json();
      if (r.ok && j.ok) jobIds.push({ id: j.job_id, account });
    }
    if (jobIds.length === 0) {
      $("scan-status").textContent = "no scans started";
      $("scan-btn").disabled = false; return;
    }
    saveActiveScans(jobIds);
    pollScans(jobIds);
  } catch (e) {
    $("scan-status").textContent = "error: " + e.message;
    $("scan-btn").disabled = false;
  }
});

async function pollScans(jobs) {
  // jobs = [{id, account}, ...]
  const panel = $("scan-panel");
  const jobsEl = $("scan-jobs");
  panel.classList.add("visible");
  const maxPerFolder = parseInt($("scan-max").value) || 50;

  // Initial render — every job queued
  function renderJobs(states) {
    jobsEl.innerHTML = states.map(st => {
      const short = st.account.split("-")[0];
      const expectedTotal = maxPerFolder * 2;
      const pct = expectedTotal > 0 ? Math.min(100, Math.round((st.seen / expectedTotal) * 100)) : 0;
      const fillClass = st.status === "done" ? "done" : (st.status === "error" || st.status === "cancelled") ? "error" : "";
      const statusText = st.status === "done"      ? "✓ done"
                      : st.status === "error"     ? "✗ error"
                      : st.status === "cancelled" ? "✗ cancelled"
                      : st.status === "running"   ? "running…"
                      : st.status === "cancelling"? "cancelling…"
                      : "queued";
      const cancelable = !["done", "error", "cancelled"].includes(st.status);
      return `
        <div class="scan-job">
          <span class="label">${short}</span>
          <div class="scan-bar"><div class="scan-bar-fill ${fillClass}" style="width:${pct}%;"></div></div>
          <span class="scan-counts">${statusText} · ${st.seen}/~${expectedTotal} seen · ${st.new} new · ${st.skipped} skip</span>
          ${cancelable
            ? `<button class="cancel-btn" data-cancel-id="${st.id}">Cancel</button>`
            : `<span></span>`}
        </div>`;
    }).join("");

    // wire cancel handlers
    jobsEl.querySelectorAll("[data-cancel-id]").forEach(b => b.addEventListener("click", async () => {
      const jobId = b.dataset.cancelId;
      b.disabled = true; b.textContent = "cancelling…";
      try {
        await fetch(`${PERSONAL_SVC}/scan-inbox/${jobId}/cancel`, { method: "POST" });
        // mark locally so UI shows "cancelling…" immediately
        const idx = states.findIndex(s => s.id === jobId);
        if (idx >= 0) states[idx].status = "cancelling";
        renderJobs(states);
      } catch (e) {
        b.disabled = false; b.textContent = "Cancel";
        toast("cancel error: " + e.message, "err");
      }
    }));
  }

  // Seed with queued state
  const states = jobs.map(j => ({ ...j, status: "queued", seen: 0, new: 0, skipped: 0, error: null }));
  renderJobs(states);

  let totalNewLast = 0;
  const interval = setInterval(async () => {
    let totals = { new: 0, done: 0 };
    let allDone = true;

    for (let i = 0; i < jobs.length; i++) {
      const { id, account } = jobs[i];
      try {
        const r = await fetch(`${PERSONAL_SVC}/scan-inbox/${id}`);
        const j = await r.json();
        const s = j.stats || {};
        states[i].status  = j.status;
        states[i].seen    = s.seen    || 0;
        states[i].new     = s.new     || 0;
        states[i].skipped = s.skipped || 0;
        states[i].error   = j.error;
        totals.new += s.new || 0;
        if (j.status === "done") totals.done++;
        else if (j.status !== "error") allDone = false;
        else { allDone = allDone; } // errors count as finished
      } catch (e) {
        states[i].status = "poll-err";
        allDone = false;
      }
    }
    renderJobs(states);
    $("scan-panel-title").textContent =
      `Scan progress — ${totals.done}/${jobs.length} done · ${totals.new} new staged`;

    if (totals.new !== totalNewLast) { totalNewLast = totals.new; await loadPending(); }

    const allFinished = states.every(s => ["done", "error", "cancelled"].includes(s.status));
    if (allFinished) {
      clearInterval(interval);
      $("scan-btn").disabled = false;
      $("scan-status").textContent = `done · ${totals.new} new across ${jobs.length} scan${jobs.length>1?'s':''}`;
      localStorage.removeItem("active_scans");
      await loadPending();
    }
  }, 3000);
}

// Persist active scan jobs so a page refresh can resume the progress panel.
const ACTIVE_SCANS_KEY = "active_scans";
function saveActiveScans(jobs) {
  try { localStorage.setItem(ACTIVE_SCANS_KEY, JSON.stringify(jobs)); } catch (e) {}
}
function getActiveScans() {
  try { return JSON.parse(localStorage.getItem(ACTIVE_SCANS_KEY) || "[]"); } catch (e) { return []; }
}
async function resumeActiveScans() {
  const jobs = getActiveScans();
  if (!jobs.length) return;
  // Verify each is still alive on the server; drop dead ones
  const alive = [];
  for (const j of jobs) {
    try {
      const r = await fetch(`${PERSONAL_SVC}/scan-inbox/${j.id}`);
      if (r.ok) alive.push(j);
    } catch (e) {}
  }
  if (alive.length) {
    $("scan-btn").disabled = true;
    pollScans(alive);
  } else {
    localStorage.removeItem(ACTIVE_SCANS_KEY);
  }
}

// -- Service health banner (asks ai-launcher to start personal-svc when offline)
const LAUNCHER_SVC = location.protocol === "https:" ? null : "http://192.168.50.10:3030";
const banner   = $("svc-banner");
const hintEl   = $("svc-hint");
const startBtn = $("svc-start-btn");

async function pollSvc() {
  if (!LAUNCHER_SVC) {
    banner.style.display = "flex";
    banner.className = "svc-banner offline";
    hintEl.innerHTML = `LAN-only — <a href="http://192.168.50.10:8081/email.html" style="color:var(--accent)">open on :8081</a> for Start button`;
    startBtn.style.display = "none";
    return;
  }
  try {
    const r = await fetch(`${LAUNCHER_SVC}/status`, { signal: AbortSignal.timeout(3000) });
    const s = await r.json();
    if (s.personal && s.personal.running) {
      // Service is up — hide banner entirely (signal-only-on-problem)
      banner.style.display = "none";
    } else {
      banner.style.display = "flex";
      banner.className = "svc-banner offline";
      hintEl.textContent = "offline — Scan and Insights won't work until started";
      startBtn.style.display = "inline-block";
      startBtn.disabled = false;
      startBtn.textContent = "Start";
    }
  } catch {
    banner.style.display = "flex";
    banner.className = "svc-banner offline";
    hintEl.textContent = "ai-launcher offline on se :3030 — start it manually";
    startBtn.style.display = "none";
  }
}

startBtn.addEventListener("click", async () => {
  if (!LAUNCHER_SVC) return;
  startBtn.disabled = true;
  startBtn.textContent = "Starting…";
  try {
    await fetch(`${LAUNCHER_SVC}/start/personal`, { method: "POST", signal: AbortSignal.timeout(5000) });
  } catch {}
  // personal-svc binds :3050 in ~3-5s; poll a few times so the banner updates
  setTimeout(pollSvc, 3000);
  setTimeout(pollSvc, 7000);
  setTimeout(pollSvc, 15000);
});

pollSvc();
setInterval(pollSvc, 20000);
  </script>
